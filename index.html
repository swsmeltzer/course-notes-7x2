<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>CCEF Biblical Counseling</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --bg:#F9F9F7;--surface:#FFFFFF;--border:#E5E3DC;
  --text:#1C1C1A;--muted:#6B6B67;--hint:#A0A09C;
  --radius:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#141412;--surface:#1E1E1B;--border:#2E2E2A;--text:#F0EFE8;--muted:#9A9A96;--hint:#5A5A56;--green-light:#0a3326;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Topbar */
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:10px;height:56px}
.topbar-title{flex:1}
.topbar-title span{font-size:17px;font-weight:600;color:var(--text);display:block}
.topbar-title small{font-size:11px;color:var(--muted)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--hint);flex-shrink:0;transition:background 0.3s}
.sync-dot.syncing{background:#E8A020;animation:pulse 1s infinite}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:#C0392B}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Stats */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-cell{background:var(--surface);padding:10px 8px;text-align:center}
.stat-cell .val{font-size:18px;font-weight:600;color:var(--text);display:block}
.stat-cell .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-top:1px}
.prog-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px 10px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s ease}

/* Filters */
.filters{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg);position:relative;z-index:10}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--green);color:#fff;border-color:var(--green)}

/* Weeks */
.weeks{padding:0 16px 80px}
.week{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.week-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.week-hdr:active{background:var(--bg)}
.week-icon{width:32px;height:32px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;color:var(--green-dark)}
.week-info{flex:1;min-width:0}
.week-name{font-size:15px;font-weight:600;color:var(--text)}
.week-dates{font-size:12px;color:var(--muted);margin-top:1px}
.week-right{text-align:right;flex-shrink:0}
.week-pct{font-size:14px;font-weight:600;color:var(--green)}
.week-count{font-size:11px;color:var(--muted);margin-top:1px}
.chev{font-size:20px;color:var(--hint);transition:transform 0.2s;margin-left:4px;line-height:1}
.chev.open{transform:rotate(90deg)}
.week-body{display:none}
.week-body.open{display:block}
.week-prog{height:3px;background:var(--border)}
.week-prog-fill{height:100%;background:var(--green);transition:width 0.3s}

/* Section label */
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:12px 16px 4px}

/* Task */
.task{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-top:1px solid var(--border);-webkit-tap-highlight-color:transparent;position:relative}
.task:active{background:var(--bg)}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all 0.15s}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700;line-height:1}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;color:var(--text);line-height:1.4}
.task-name.done{color:var(--hint);text-decoration:line-through}
.task-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.task-actions{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.notes-link{font-size:13px;color:var(--green);font-weight:500;padding:6px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:rgba(29,158,117,0.15)}
.notes-link:active{opacity:0.5}
.audio-link{color:#185FA5}
@media(prefers-color-scheme:dark){.notes-link{color:#5DCAA5}.audio-link{color:#85B7EB}}

/* Action buttons on task */
.task-btn{font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;display:inline-flex;align-items:center;gap:4px;min-height:36px;position:relative;z-index:5}
.task-btn:active{background:var(--border)}
.task-btn.notes-btn{color:var(--green);border-color:var(--green-light)}
.task-btn.audio-btn{color:#185FA5;border-color:#B5D4F4}
@media(prefers-color-scheme:dark){
  .task-btn.notes-btn{color:#5DCAA5;border-color:#085041}
  .task-btn.audio-btn{color:#85B7EB;border-color:#0C447C}
}

.empty{padding:20px 16px;font-size:13px;color:var(--muted);text-align:center}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.task-check.pop{animation:pop 0.2s ease}

/* ── NOTES TABS ──────────────────────────────────────────── */
.notes-tabs{display:flex;gap:6px;padding:12px 16px 0;background:#fff;border-bottom:1px solid #e5e7eb;flex-shrink:0;}
.notes-tab{flex:1;padding:8px 4px;border:none;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;background:#f3f4f6;color:#6b7280;transition:all .15s;}
.notes-tab.active{background:var(--accent);color:#fff;}
/* ── NOTES FULL SCREEN ───────────────────────────────────── */
.notes-page{position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.notes-page.open{display:flex}
.notes-page-header{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.notes-back{font-size:15px;color:var(--green);font-weight:500;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.notes-page-title{font-size:15px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-page-body{padding:16px 16px 60px;flex:1}

/* Notebook content */
.nb-section{margin-top:16px}
.nb-section-heading{font-size:13px;font-weight:600;color:var(--green-dark);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--green-light)}
@media(prefers-color-scheme:dark){.nb-section-heading{color:#5DCAA5;border-color:#0a3326}}
.nb-item{font-size:14px;color:var(--text);line-height:1.55;padding:4px 0 4px 12px;border-left:2px solid var(--border);margin-bottom:4px}
.nb-item.scripture{font-style:italic;color:var(--muted);border-left-color:var(--green-light)}
.nb-placeholder{font-size:13px;color:var(--hint);font-style:italic;padding:4px 0 4px 12px;border-left:2px dashed var(--border)}

/* Notes textarea */
.notes-section{margin-top:20px}
.notes-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.notes-saved{font-size:11px;color:var(--green);font-weight:400;text-transform:none;letter-spacing:0;opacity:0;transition:opacity 0.3s}
.notes-saved.show{opacity:1}
.notes-area{width:100%;min-height:120px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);resize:vertical;line-height:1.6;outline:none}
.notes-area:focus{border-color:var(--green)}

/* Course Switcher */
.course-switcher{display:flex;gap:0;background:var(--surface);border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.course-switcher::-webkit-scrollbar{display:none}
.course-btn{flex:1;padding:10px 8px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.course-btn.active{color:var(--green);border-bottom-color:var(--green);background:var(--green-light);}
@media(prefers-color-scheme:dark){.course-btn.active{background:#0a3326;}}

</style>
</head>

  26: {

    sections: [

      {h:"Scripture",items:["\u201cIf we live by the Spirit, let us also keep in step with the Spirit.\u201d ~ Galatians 5:25 (ESV)", "\u201cBut I say, walk by the Spirit, and you will not gratify the desires of the flesh.\u201d    ~ Galatians 5:16 (ESV)", "\u201cBut if you are led by the Spirit, you are not under the law.\u201d ~ Galatians 5:18 (ESV)"]},

      {h:"He transforms us into the image of Christ.",items:["The Spirit is power.", "\u201cMay the God of hope fill you with all joy and peace in believing, so that by the power of the Holy Spirit you may abound in hope.\u201d ~ Romans 15:13 (ESV)", "\u201cAnd we all, with unveiled face, beholding the glory of the Lord, are being transformed into the same image from one degree of glory to another. For this comes from the Lord who is the Spirit.\u201d ~ 2 Corinthians 3:18 (ESV)", "\u201cAnd such were some of you. But you were washed, you were sanctified, you were justified in the name of the Lord Jesus Christ and by the Spirit of our God.\u201d ~ 1 Corinthians 6:11 (ESV)"]},

  28: {
    title: "Lecture 28: Skill 5 \u2013 Access Scripture Together",
    sections: [
      {h:"Access Scripture together",items:[]},
      {h:"Three reasons for this skill",items:["We would like to make more connections between a person\u2019s struggle and scripture.", "We live in an era in which scripture is often relegated to a tiny spiritual sector of our being.", "We usually don\u2019t get out our Bibles with our friends.", "How do you access scripture? What is your own strategy in accessing scripture?"]},
      {h:"Ways to access Scripture",items:["\u201cLet\u2019s pray\u201d", "When you\u2019re stumped:", "Ask your friends if there is anything important to them from Scripture recently.", "Do you have a life verse?", "Ask those you are helping if any particular Scripture has been helpful to for them.", "The better you know someone, the more their struggles become recognizable and find openings in Scripture.", "Read a New Testament book together", "Work together", "\u201cFor I decided to know nothing among you except Jesus Christ and him crucified.\u201d ~ 1 Corinthians 2:2 (ESV)", "Did you love?", "\u201cThe LORD, the LORD, a God merciful and gracious, slow to anger, and abounding in steadfast love and faithfulness, keeping steadfast love for thousands, forgiving iniquity and transgression and sin, but who will by no means clear the guilty, visiting the iniquity of the fathers on the children and the children\u2019s children, to the third and fourth generation.\u201d ~ Exodus 34:6b-7 (ESV)", "Review the classic summaries", "\u201cSince then we have a great high priest who has passed through the heavens, Jesus, the Son of God, let us hold fast our confession.\u201d ~ Hebrews 4:14 (ESV)", "WSC Question 1: What is man\u2019s chief end?", "Answer: Man\u2019s chief end is to glorify God and to enjoy him forever.", "Heidelberg Catechism Question 1: What is your only comfort in life and in death?", "Answer: That I am not my own, but belong with body and soul, both in life and in death, to my faithful Savior, Jesus Christ. He has fully paid for all my sins with his precious blood, and has set me free from all the power of the devil\u2026", "Heidelberg Catechism Question 2: What do you need to know in order live and die in the joy of this comfort?", "Answer: First, how great my sins and misery are; second, how I am delivered from all my sins and misery; third, how I am to be thankful to God for such deliverance.", "Small step: tell someone about this part of the class; ask them."]},
    ]
  },

// ── State ──────────────────────────────────────────────────
let checked={}, notesData={}, filter='all', openWeeks=new Set([1]);
let syncTimer=null, panelLecNum=null;

// ── Local storage ──────────────────────────────────────────
function localLoad(){
  try{
    const d=localStorage.getItem(LOCAL_KEY);
    if(d){const p=JSON.parse(d);checked=p.checked||{};notesData=p.notes||{};if(p.openWeeks)openWeeks=new Set(p.openWeeks);}
  }catch(e){}
}
function localSave(){
  try{localStorage.setItem(LOCAL_KEY,JSON.stringify({checked,notes:notesData,openWeeks:[...openWeeks]}));}catch(e){}
}

// ── Sync dot ───────────────────────────────────────────────
function dot(s){document.getElementById('sync-dot').className='sync-dot '+(s||'');}

// ── Supabase ───────────────────────────────────────────────
async function dbFetch(){
  const rowId = currentCourse === 'hr' ? 'main' : 'dbc';
  const r=await fetch(`${SUPABASE_URL}/rest/v1/progress?id=eq.${rowId}&select=checked,notes`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  if(!r.ok)throw new Error();
  const rows=await r.json();
  if(rows.length===0){
    // Create row if it doesn't exist yet
    await fetch(`${SUPABASE_URL}/rest/v1/progress`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({id:rowId,checked:{},notes:{}})
    });
    return {checked:{}, notes:{}};
  }
  return {checked:rows[0]?.checked||{}, notes:rows[0]?.notes||{}};
}
async function dbSave(checkedData, notesData){
  const rowId = currentCourse === 'hr' ? 'main' : 'dbc';
  const r=await fetch(`${SUPABASE_URL}/rest/v1/progress?id=eq.${rowId}`,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({checked:checkedData,notes:notesData,updated_at:new Date().toISOString()})
  });
  if(!r.ok)throw new Error();
}
async function loadFromCloud(){
  dot('syncing');
  try{
    const data=await dbFetch();
    checked=data.checked;
    notesData=data.notes;
    localSave();dot('ok');
  }
  catch(e){localLoad();dot('err');}
}
function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    dot('syncing');
    try{await dbSave(checked,notesData);localSave();dot('ok');}
    catch(e){localSave();dot('err');}
  },800);
}

// ── Helpers ────────────────────────────────────────────────
function fmtTime(t){if(t<60)return t+'min';const h=Math.floor(t/60),m=t%60;return h+'h'+(m?m+'m':'');}
function tid(wid,si,ti){return`w${wid}s${si}t${ti}`;}
function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function toggle(id,el){
  checked[id]=!checked[id];
  el.classList.toggle('checked',checked[id]);
  el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),250);
  el.closest('.task').querySelector('.task-name').classList.toggle('done',checked[id]);
  updateStats();
  updateWeekHeader(parseInt(id.match(/w(\d+)/)[1]));
  scheduleSave();
}

function toggleWeek(id){
  if(openWeeks.has(id))openWeeks.delete(id);else openWeeks.add(id);
  document.getElementById('wb-'+id)?.classList.toggle('open',openWeeks.has(id));
  document.getElementById('wc-'+id)?.classList.toggle('open',openWeeks.has(id));
  localSave();
}

function updateStats(){
  let total=0,done=0,remMins=0;
  DATA.forEach(w=>w.sections.forEach((s,si)=>s.tasks.forEach((task,ti)=>{
    total++;const id=tid(w.id,si,ti);
    if(checked[id])done++;else remMins+=task.t;
  })));
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-total').textContent=total;
  const h=Math.floor(remMins/60),m=remMins%60;
  document.getElementById('s-hrs').textContent=h>0?(h+'h'+(m?m+'m':'')):(remMins+'m');
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
}

function updateWeekHeader(wid){
  const w=DATA.find(x=>x.id===wid);if(!w)return;
  let wt=0,wd=0;
  w.sections.forEach((s,si)=>s.tasks.forEach((_,ti)=>{wt++;if(checked[tid(wid,si,ti)])wd++;}));
  const pct=wt>0?Math.round(wd/wt*100):0;
  document.getElementById('wpct-'+wid)?.textContent && (document.getElementById('wpct-'+wid).textContent=pct+'%');
  document.getElementById('wcnt-'+wid)?.textContent && (document.getElementById('wcnt-'+wid).textContent=wd+'/'+wt+' done');
  const f=document.getElementById('wfill-'+wid);if(f)f.style.width=pct+'%';
}

// ── Summaries ───────────────────────────────────────────────
const SUMMARIES = {
  1:{overview:"Ed Welch opens the Helping Relationships course by sharing his personal background and introducing the three core goals: growing in wise conversations, building a simple but powerful ministry platform, and refining church culture. He frames the course as deeply practical — designed to change your conversations that very day.",points:["Welch has taught this course at CCEF for 12 years; it was previously taught by Wayne Mack and Paul Tripp","The broad goal is to grow in 'wise conversations' — words that connect us to God and to each other","Second goal: a simple platform (pursue, know, speak) that works in every conversation, from casual to formal counseling","Third goal: that the skills learned would spread and change the culture of your church, not just your private conversations","Wise conversations bring people closer together and closer to God"],quotes:["'We want this to have an immediate effect on your conversations such that those around you can see it and point it out.'","'Wise conversations bring people together — that is their nature.'"],illustrations:["The 'stealth pastors' story: three men who committed to knowing one person each Sunday; six months later a normally reticent man jogged across the room to greet a new couple before Welch could get there","Welch's ukulele and French horn — instruments that need attention to stay alive, just like the skills in this course"],scripture:[]},
  2:{overview:"Ephesians 4 is the key passage for the entire course. Welch unpacks the twin methods of all Christian ministry: humility and love. These are not optional additions to technique but the very substance of how we care for one another.",points:["Ephesians 4:1-15 grounds everything: we are called to walk worthy, with humility, gentleness, and patience","Every believer is a minister — 'you are a pastor' — equipped by Christ's gifts to build up the body","Humility is the method: it makes you dependent on God and genuinely interested in the other person","Love is the method: it keeps you engaged, pursuing, and affected by what is happening in the other person's life","The goal of growth in ministry is maturity in Christ, not just competence in technique"],quotes:["'You are a pastor — the pastoral gift is a long-term interest in the soul of another person.'","'Humility and love are our method. Everything else is an expression of them.'"],illustrations:["Welch reflecting on his marriage to Sherry — acknowledging he still has much to learn after 40+ years"],scripture:["Ephesians 4:1-3 (ESV) — 'I therefore, a prisoner for the Lord, urge you to walk in a manner worthy of the calling to which you have been called, with all humility and gentleness, with patience, bearing with one another in love, eager to maintain the unity of the Spirit in the bond of peace.'","Ephesians 4:11-13 (ESV) — 'And he gave the apostles, the prophets, the evangelists, the shepherds and teachers, to equip the saints for the work of ministry, for building up the body of Christ, until we all attain to the unity of the faith and of the knowledge of the Son of God, to mature manhood, to the measure of the stature of the fullness of Christ.'","Ephesians 4:15 (ESV) — 'Rather, speaking the truth in love, we are to grow up in every way into him who is the head, into Christ.'"]},
  3:{overview:"Three major hindrances keep us from growing in wise conversations: a lecture-style format, the cultural tendency to undervalue ordinary conversation, and digital technology. Welch challenges students to treat conversations as a domain for serious growth.",points:["Hindrance 1: The lecture format — we rarely have aspirations for conversations, unlike for diet, exercise, or Bible reading","Hindrance 2: We undervalue ordinary, everyday conversation as the primary field of ministry","Hindrance 3: Digital culture has replaced face-to-face conversation and reduced our capacity for genuine engagement","The course aims to counteract all three by developing both vision and practical skills for conversation","Goal: what we learn in this course should affect our conversations the same day"],quotes:["'In the realm that occupies more time than anything else — the words we speak to each other — we rarely have aspirations.'"],illustrations:["Welch's observation that people make resolutions about eating, exercise, and Bible reading, but almost never about conversations"],scripture:[]},
  4:{overview:"Life in God's house is the theological foundation for all helping. We learn how to relate to people by first learning how God relates to us. The fear of the Lord and the practice of asking for help are the two postures that shape everything.",points:["The key insight: we learn how to do life with each other by doing life with God first","Fear of the Lord is not terror but reverent attentiveness — it shapes how we listen and respond","The fear of the Lord produces humility, which is the foundation of all ministry skill","'Being unimpressive is the new strength' — asking for help and prayer is the beginning of wisdom","Prayer is not a tack-on to ministry; it is the posture of ministry itself"],quotes:["'Being unimpressive is the new strength.'","'Prayer is our way of life — not the last resort but the first response.'"],illustrations:["Leviticus 14 and Deuteronomy 30 as surprising texts showing God's desire to speak into all of life","Simply saying 'help' — asking for prayer — as the fundamental act that builds community"],scripture:["Colossians 1:15-17 (ESV) — 'He is the image of the invisible God, the firstborn of all creation. For by him all things were created, in heaven and on earth, visible and invisible, whether thrones or dominions or rulers or authorities—all things were created through him and for him. And he is before all things, and in him all things hold together.'","Deuteronomy 4:10 (ESV) — 'Gather the people to me, that I may let them hear my words, so that they may learn to fear me all the days that they live on the earth, and that they may teach their children so.'","Leviticus 25:17 (ESV) — 'You shall not wrong one another, but you shall fear your God, for I am the LORD your God.'"]},
  5:{overview:"God as Father is the second key feature of life in God's house. God speaks to his children personally, warmly, and with great care. We are to imitate that way of speaking — learning to speak adorned, personal words to one another as children of the same Father.",points:["God relates to his people as a Father — our conversations should carry that same personal warmth","'Adorned words' from Proverbs: beautiful, fitting, well-chosen words that build up","The covenant relationship with God is the model: he gives himself to us and we give ourselves to him","We should ask: 'How would God speak to this person?' and then try to speak that way","Prayer is the pinnacle of relationships — the most personal act we can share with another person"],quotes:["'To be a Christian is to live in conscious, reciprocal fellowship with God.' — Geerhardus Vos"],illustrations:["John 15:13-15 — Jesus calls his disciples friends, not servants, because he has shared everything with them"],scripture:["Exodus 20:2 (ESV) — 'I am the LORD your God, who brought you out of the land of Egypt, out of the house of slavery.'","Deuteronomy 31:8 (ESV) — 'It is the LORD who goes before you. He will be with you; he will not leave you or forsake you. Do not fear or be dismayed.'","John 15:13-15 (ESV) — 'Greater love has no one than this, that someone lay down his life for his friends. You are my friends if you do what I command you. No longer do I call you servants, for the servant does not know what his master is doing; but I have called you friends, for all that I have heard from my Father I have made known to you.'"]},
  6:{overview:"The third part of life in God's house focuses on wisdom — the skill of discerning what brings life and what leads to death. Wisdom is not just knowledge; it moves out into relationships and reshapes how we see and speak to the people around us.",points:["Wisdom is about life and death — not merely practical cleverness but a way of seeing reality through God's eyes","Wisdom makes us alert to the early warning signs of trouble in our own lives and in others","'The pastor must study two books: Scripture and the human heart' — J.I. Packer","Wisdom 'moves out' — it flows into conversations, friendships, and church culture","The goal is that wisdom would spread from you to others and change the culture of your community"],quotes:["'The pastor must study two books, not just one: the book of Scripture and the book of the human heart.' — J.I. Packer"],illustrations:["The story of grandkids — wisdom in family life, seeing children's choices as windows to the heart"],scripture:["Matthew 7:3-5 (ESV) — 'Why do you see the speck that is in your brother's eye, but do not notice the log that is in your own eye? Or how can you say to your brother, \"Let me take the speck out of your eye,\" when there is a log in your own eye? You hypocrite, first take the log out of your own eye, and then you will see clearly to take the speck out of your brother's eye.'","Isaiah 2:2 (ESV) — 'It shall come to pass in the latter days that the mountain of the house of the LORD shall be established as the highest of the mountains, and shall be lifted up above the hills; and all the nations shall flow to it.'"]},
  7:{overview:"The model of care is introduced: Pursue → Know the Person → Know What God Says → Remember. We pursue others because we have been pursued by God. We seek to know them because we have been fully known by God. This flows from the gospel, not technique.",points:["We pursue people because God has pursued us — Hosea 2:8 shows a God who gives and gives even unrecognized","We seek to know people because God fully knows us — 1 Corinthians 13:12","Knowing someone is a gift you give them: it brings them out of isolation","The world often knows people better than we do — we need to learn from anyone who pays attention","Wise conversations bring people together; they are the opposite of conversations that isolate"],quotes:["'Good, wise conversation brings people together — that is what it does.'"],illustrations:["Hosea 2:8 — God lavishes gifts on Israel even while she does not recognize him"],scripture:["Hosea 2:8 (ESV) — 'And she did not know that it was I who gave her the grain, the wine, and the oil, and who lavished on her silver and gold, which they used for Baal.'","1 Corinthians 13:12 (ESV) — 'For now we see in a mirror dimly, but then face to face. Now I know in part; then I shall know fully, even as I have been fully known.'"]},
  8:{overview:"The heart has three layers: natural desires (for life and love), moral desires (good and evil), and Godward desires (toward or away from God). Understanding these layers helps us engage the whole person, not just surface behavior.",points:["Jeremiah 17 and Proverbs 20:5 establish that the heart is deep and complex — it takes wisdom to draw it out","Natural desires: life, love, food, companionship — the basic hungers Scripture affirms","Moral desires: the good and evil paths diverge here — Matthew 15:19 lists what comes from the heart","Emotions are windows into natural desires — they reveal what a person longs for and fears losing","Knowing someone's desires is not prying; it is the way to truly understand and help them"],quotes:["'The Spirit searches everything, even the depths of God.' — 1 Corinthians 2:10"],illustrations:["Matthew 15:19 — the list of what comes from the heart","Proverbs 13:12 — desire as longing; hope deferred as heartsickness"],scripture:["Jeremiah 17:9 (ESV) — 'The heart is deceitful above all things, and desperately sick; who can understand it?'","Proverbs 20:5 (ESV) — 'The purpose in a man's heart is like deep water, but a man of understanding will draw it out.'","1 Corinthians 2:10-11 (ESV) — 'For the Spirit searches everything, even the depths of God. For who knows a person's thoughts except the spirit of that person, which is in him? So also no one comprehends the thoughts of God except the Spirit of God.'","Matthew 15:19 (ESV) — 'For out of the heart come evil thoughts, murder, adultery, sexual immorality, theft, false witness, slander.'","Proverbs 13:12 (ESV) — 'Hope deferred makes the heart sick, but a desire fulfilled is a tree of life.'"]},
  9:{overview:"The third layer of the heart is the Godward layer — every person either lives toward God or away from him. Welch introduces the three categories covering all counseling: saints, sufferers, and sinners. Every person is all three simultaneously.",points:["Godward desires are the deepest layer: we were made for God, and our hearts are restless until they rest in him","Saints: every believer has the Spirit, is growing, and is a recipient of God's grace","Sufferers: hardship, loss, and pain are a central part of every person's story","Sinners: we are all in patterns of sin that need to be addressed with gentleness","Every person you help is simultaneously a saint, a sufferer, and a sinner"],quotes:["'You have made us for yourself, and our heart is restless until it finds its rest in you.' — Augustine"],illustrations:["Paul's thankfulness in 1 Corinthians 1:4-6 — looking for grace before addressing problems"],scripture:["Ephesians 4:6 (ESV) — 'one God and Father of all, who is over all and through all and in all.'","1 Corinthians 1:4-6 (ESV) — 'I give thanks to my God always for you because of the grace of God that was given you in Christ Jesus, that in every way you were enriched in him in all speech and all knowledge—God thus confirming our testimony about Christ among you.'"]},
  10:{overview:"The second half of the care model is introduced: knowing what God says. We offer Scripture personally and humbly in the spirit of 'we' — doing this together. The crucial postscript: remembering people and following up over time.",points:["We offer Scripture as fellow travelers, not consultants — 'we' language expresses humility and solidarity","The question: not just 'what does Scripture say?' but 'how do I offer it to this person, in this moment?'","The postscript to the model: remembering — following up weeks or months later","The woman who walked her dog and remembered her neighbors became the center of her community","The man at church who asked for one prayer request and followed up months later"],quotes:["'Humility says we — we will do this together, and it will be good for both of our souls.'","'To truly be a pastor there is a long-term interest in the soul of another person.'"],illustrations:["The woman who walked her dog, listened, prayed, and remembered — beloved by her entire neighborhood","The man at church who asked 'what is one thing I can pray for?' and followed up months later"],scripture:["Lamentations 3:22-24 (ESV) — 'The steadfast love of the LORD never ceases; his mercies never come to an end; they are new every morning; great is your faithfulness. “The LORD is my portion,” says my soul, “therefore I will hope in him.”'","Ephesians 1:17-18 (ESV) — 'that the God of our Lord Jesus Christ, the Father of glory, may give you the Spirit of wisdom and of revelation in the knowledge of him, having the eyes of your hearts enlightened, that you may know what is the hope to which he has called you.'","Colossians 1:9 (ESV) — 'And so, from the day we heard, we have not ceased to pray for you, asking that you may be filled with the knowledge of his will in all spiritual wisdom and understanding.'"]},
  11:{overview:"Skill 1 for knowing people is accumulating wisdom about conversation. Welch invites students to reflect on what they already know — then adds three key insights: collapse triangles, ask theological questions personally, and build your lists of things to do and not do.",points:["Accumulating wisdom means being a student of your own conversations — what has worked and what hasn't","Collapse triangles: when someone talks about a third party, gently bring the focus back to them","Theological questions are personal questions — 'what do you believe about God?' is a deeply human question","Build your list of 'things not to do': interrupting, quick fixes, minimizing, advice before listening","Build your list of 'things to do': ask good questions, follow the person, pray, slow down"],quotes:["'The best conversations involve someone who is genuinely curious about you.'"],illustrations:["Ephesians 4 as the frame: humility and love are the source of all skill"],scripture:["Ephesians 4:2 (ESV) — 'with all humility and gentleness, with patience, bearing with one another in love.'"]},
  12:{overview:"Skill 2 is moving conversations toward life and love and away from death and distance. The key tools are genuine enjoyment of the person, a habit of prayer for them, and simple questions like 'how are you?' asked with real interest.",points:["The first question: do you actually like this person? Your enjoyment of them comes through","Look for hints of what matters to the person — every conversation gives you clues","'How are you?' asked with genuine curiosity is one of the most powerful openers","Keep looking for what is important to the person — let their interests guide the conversation","Prayer for the person you are about to talk to changes how you see them before you even speak"],quotes:["'Lord, have mercy' — the prayer underneath all conversations with those who are struggling"],illustrations:["The dying plant analogy: a conversation heading nowhere needs water — find what the person cares about","The 'best and worst thing in your week' question as a simple way to move into real territory"],scripture:[]},
  13:{overview:"Skill 3 addresses when and how to share yourself in conversations and counseling. Self-disclosure is not about making the conversation about you — it is about being genuinely responsive and revealing that you are affected by what the other person shares.",points:["Life in God's house is knowing and being known — this challenges professional distance","We reveal ourselves through our responsiveness: your joy at their joy, your weight at their pain","We disclose ourselves when we ask for help or prayer — this is modeled, not just taught","In counseling, self-disclosure should serve the person, not satisfy your need to be known","Better than matching stories: express empathy, ask a question, offer a response that serves their next step"],quotes:["'We value a life that doesn't hide — but that doesn't mean we share everything with everyone.'"],illustrations:["Welch's wife texting a woman who hadn't been at church — the woman responded with rare warmth"],scripture:[]},
  14:{overview:"Skill 4 (Part 1) is to follow the person and slow down at just the right moment. The key tool is listening for what is important and not rushing past it. Welch covers slowing down with joys, hardships, and dark things like suicidal thoughts.",points:["Follow the person: don't redirect the conversation according to your agenda; follow theirs","Slow down with pleasures and joys — we often rush past what is going well to get to problems","Slow down with hardships: don't immediately try to fix, explain, or comfort — listen first","With mental illness: know the person's concrete experience behind the diagnosis","Dark things — suicidal thoughts, addiction, deep shame — require the most careful slowing down"],quotes:["'Don't be thrown off when someone makes light of something important — that is when you slow down more, not less.'"],illustrations:["The grandson swimming story: slowing down to be present to a moment of joy"],scripture:[]},
  15:{overview:"Skill 4 (Part 2) continues with slowing down — specifically to notice and linger in the work of the Spirit. The Spirit's work is sometimes obvious and sometimes subtle. Welch trains students to see both.",points:["Slow down when you see the Spirit working — don't rush past signs of grace to get to problems","The Spirit's work can be subtle: a flicker of faith, a moment of gratitude, a small act of trust","Paul models looking for the grace given in Christ before addressing problems — 1 Corinthians 1:4","Train your eye to see the Spirit's fingerprints in the person's story","We often miss the Spirit's work because we are looking for our preferred kind of response"],quotes:["'The work of the Spirit can sometimes be more subtle than we anticipate.'"],illustrations:["A person who keeps showing up despite doubt — that persistence is the Spirit's work","Paul's pattern in his letters: always leading with grace before addressing problems"],scripture:["1 Corinthians 1:4 (ESV) — 'I give thanks to my God always for you because of the grace of God that was given you in Christ Jesus.'"]},
  16:{overview:"Skill 5 challenges the habit of over-relying on questions. Sometimes questions demand too much, create the wrong dynamic, or close off the conversation. Welch offers alternatives: observations, statements, and simply being present.",points:["Questions have power — they put the burden on the other person and can feel interrogative","Sometimes avoid questions entirely: just be present, make an observation, or offer a statement","When you play teacher or litigator in a conversation, the relationship becomes unequal","The best alternative to a question is often an observation that names what you're seeing","Turn questions into invitations: 'You seem tired...' rather than 'Are you tired?'"],quotes:["'What skilled interviewers look for is a conversation, not an interrogation.'"],illustrations:["Roles we inhabit in conversation: teacher, judge, litigator — each shuts down rather than opens up"],scripture:[]},
  17:{overview:"Skill 6 (Part 1) is to know the concrete experience behind technical psychiatric words. When someone says 'depression' or 'bipolar,' you need to break it into their actual lived experience so you can truly know them and connect Scripture to their life.",points:["Technical psychiatric language belongs to a guild — it can create a partition between you and the person","Discover the concrete experiences of the individual person described by a psychiatric word","Ask: 'When you say depression, what does that feel like for you? What is a day like?'","Schizophrenia, bipolar, trauma, PTSD — each can be broken down into describable human experience","Once you know the concrete experience, Scripture comes alive because it speaks to that exact territory"],quotes:["'Your care for people will share space with the secular mental health world — you need to know how to navigate it.'"],illustrations:["The word 'trauma': once an ordinary word, now claimed by a discipline with technical connotations"],scripture:[]},
  18:{overview:"Skill 6 (Part 2) continues with how to translate psychiatric descriptions into human experience that Scripture can address — depression, borderline personality disorder, trauma/PTSD. Knowing the person well makes Scripture come alive.",points:["Depression: once you know the person's experience, the Psalms light up — almost all of them","Borderline personality disorder: break it into concrete experiences — emptiness, fears of abandonment, volatile emotions","Trauma/PTSD: a brush with death, things stored in hidden compartments — the Psalms become accessible","The goal is not to use psychiatric categories but to go through them into the person's real experience","Suffering tends to isolate — very few people knock on that door; our skill is to knock"],quotes:["'Suffering tends to isolate, and very few people knock on that door to try to get in. That's what we're trying to do.'"],illustrations:["The woman crying because no one had ever taken time to understand what her experience was like"],scripture:["Psalm 62:8 (ESV) — 'Trust in him at all times, O people; pour out your heart before him; God is a refuge for us.'"]},
  19:{overview:"Skill 7 is to connect the details of daily life to the person's life before God (coram Deo). Every behavior, reaction, and attitude in daily life is a window into the person's heart — and into their relationship with God.",points:["Coram Deo: we all live before the face of God — nothing in daily life is spiritually neutral","Watch behavior, not just doctrine: how a person reacts when cut off in traffic reveals the heart","The details of daily life — work, relationships, private behavior, boredom — are spiritual data","Help the person see how the details of their life reveal their heart toward the Lord","This skill requires self-application first: how do your own worst days and private moments reveal your heart?"],quotes:["'Our everyday behavior is an expression of how we live before God.'"],illustrations:["Ed's internet browsing history — his own example of daily life revealing the heart","Old grievances: how long-held bitterness became an opportunity to see one's heart before God"],scripture:[]},
  20:{overview:"Skill 8 is to simplify the complex details of a person's life into a representative word, image, or story. This shows someone that you have truly heard them — and opens the door to Scripture speaking into their story.",points:["People's lives are complex and chaotic — your job is to bring clarity by naming what you see","A representative word or image captures what a person can't quite name themselves","'You are at war with each other' — said to a couple: it named something they could see but hadn't said","The representative image should be accurate, honest, and offered with love — not as a verdict but a gift","Once you have the simple picture, Scripture can enter in and reframe it"],quotes:["'How can you, in a word or even a picture, capture what you just saw?'"],illustrations:["The married couple fighting: 'You are at war with each other' — named the chaos in a way they could hear","The older woman whose life story was 'stubbornly enduring by faith in Christ'"],scripture:[]},
  21:{overview:"Skill 9 introduces the distinction between content (what is said) and process (how it is said and the relational dynamic). Process attends to the relationship itself — not just the words. Attending to process transforms conversations.",points:["Content = the words, the topic, the transcript of a conversation","Process = the relationship between speakers: the tone, the unspoken dynamics, how words land","Most of us are trained in content — we focus on what to say, not what's happening between us","Process questions attend to the relationship: 'How are you doing?' vs. 'Do you understand the content?'","The best helpers balance content and process — attending to what is happening between them and the person"],quotes:["'Are you walking together with the other person in the same direction? That is the process question.'"],illustrations:["The classroom example: 'Do you understand the material?' (content) vs. 'How are you doing in this class?' (process)","The pastor who wept at two congregants quarreling — his compassion was his method, not his words"],scripture:["2 Corinthians 7:2-3 (ESV) — 'Make room in your hearts for us. We have wronged no one, we have corrupted no one, we have taken advantage of no one. I do not say this to condemn you, for I said before that you are in our hearts, to die together and to live together.'"]},
  22:{overview:"Skill 10 is to pause when you are lost or confused in a conversation. Rather than pretending you know what to say, you stop, name what you're experiencing, and trust the person and God to guide the next step.",points:["When you don't know what to say, say that — 'I don't know' is a genuine theological category","Follow the person: when in doubt, go back to them rather than to your own agenda","Naming confusion or uncertainty is itself a form of humility and builds trust","Simple moves: 'Let's pray,' 'Can you tell me more?', 'I'm not sure what to do with what you've just said'","Pausing to pray together is often the most powerful thing you can do when stuck"],quotes:["'I don't know is an important theological category — it expresses humility before God and the person.'","'When in doubt, follow the person.'"],illustrations:["The map metaphor: getting out the map together rather than pretending you know the way"],scripture:[]},
  23:{overview:"This lecture opens the second half of the course — knowing what God says. Skill 1 is to accumulate wisdom in knowing and giving Scripture to others. Welch introduces Kuyper's 'not a square inch' and the roadmap Scripture takes us on: from lament to rest to celebration to joy.",points:["God speaks in Scripture to all of life — not a square inch is outside his word's reach (Kuyper)","Accumulate wisdom about Scripture the same way you accumulate wisdom about people: by paying attention","How has Scripture been unusually alive for you? Those moments are your teachers","The best Scripture-givers have been personally affected by the passage — you can feel it","What not to say: 'Stop it' and 'Just...' — these bypass the heart and rush to the solution"],quotes:["'There is not a square inch in the whole domain of our human existence over which Christ does not cry, Mine!' — Abraham Kuyper"],illustrations:["Psalm 22 as the roadmap: from abandonment to proclamation to worship — Scripture takes us somewhere","The preacher whose soul has been rearranged by the passage before he gives it to others"],scripture:["Psalm 22:29-31 (ESV) — 'All the prosperous of the earth eat and worship; before him shall bow all who go down to the dust, even the one who could not keep himself alive. Posterity shall serve him; it shall be told of the Lord to the coming generation; they shall come and proclaim his righteousness to a people yet unborn, that he has done it.'"]},
  24:{overview:"Skill 2 in knowing Scripture is to be personal with the personal God. Scripture is not an ancient text to be analyzed — it is the living words of a personal God who expects a response. Handle Scripture in a way that reflects this personal relationship.",points:["Scripture is a sub-heading of the Spirit — when you read it, you are hearing God speak","The Westminster Confession: 'The Holy Spirit speaking in Scripture is our authority'","Scripture expects a response — it is not a history book; it is a letter","Be personal: let Scripture affect your own heart before you bring it to someone else","The words of God are good words — pleasantness, peace, life (Proverbs 3:17-18)"],quotes:["'Christ meets and refreshes me everywhere in those books.' — Augustine","'O Lord, thou didst strike my heart with thy word, and I loved thee.' — Augustine"],illustrations:["Welch's story of receiving letters from Sherry before they were married — reading them three times, savoring every word"],scripture:["Deuteronomy 8:3 (ESV) — 'And he humbled you and let you hunger and fed you with manna, which you did not know, nor did your fathers know, that he might make you know that man does not live by bread alone, but man lives by every word that comes from the mouth of the LORD.'","Proverbs 3:17-18 (ESV) — 'Her ways are ways of pleasantness, and all her paths are peace. She is a tree of life to those who lay hold of her; those who hold her fast are called blessed.'","Isaiah 52:7 (ESV) — 'How beautiful upon the mountains are the feet of him who brings good news, who publishes peace, who brings good news of happiness, who publishes salvation, who says to Zion, \"Your God reigns.\"'","Isaiah 55:1-2 (ESV) — 'Come, everyone who thirsts, come to the waters; and he who has no money, come, buy and eat! Come, buy wine and milk without money and without price. Why do you spend your money for that which is not bread, and your labor for that which does not satisfy? Listen diligently to me, and eat what is good, and delight yourselves in rich food.'"]},
  25:{overview:"Skill 3 in knowing Scripture is to know everyday language for theological terms. Abstract theological words need to be translated into concrete, colored pictures — images the person can see and feel.",points:["G.K. Chesterton: 'Don't believe anything that can't be told in colored pictures' — the standard for theological translation","Saved: rescued — rescued from what? From death, the devil, the bondage of sin","Converted: reborn (John 3), or dry bones brought to life (Ezekiel) — images that recover the word's punch","United with Christ: the Lord is your keeper, your shade, your right hand — concrete images of closeness","The distinction between abstract (available to the mind) and concrete (available to the senses) — aim for concrete"],quotes:["'Don't believe anything that can't be told in colored pictures.' — G.K. Chesterton"],illustrations:["Saved → rescued (from what? from whom?); Converted → reborn or dry bones brought to life"],scripture:["Psalm 121:5 (ESV) — 'The LORD is your keeper; the LORD is your shade on your right hand.'","Isaiah 41:13 (ESV) — 'For I, the LORD your God, hold your right hand; it is I who say to you, \"Fear not, I am the one who helps you.'","Exodus 15:11 (ESV) — 'Who is like you, O LORD, among the gods? Who is like you, majestic in holiness, awesome in glorious deeds, doing wonders?'"]},
  26:{overview:"Skill 4 (Part 1) is to keep in step with the Spirit. The Spirit has three works: he illumines the text, he convicts of sin, and he gives assurance of union with Christ. Welch focuses on how the Spirit brings Scripture alive.",points:["The Spirit illumines: when Scripture becomes alive to you, that is the Spirit's work — not just good exegesis","The Spirit convicts: he brings specific conviction about specific sins, not just general guilt","The Spirit gives assurance: he testifies with our spirit that we are children of God (Romans 8:16)","Keeping in step means attending to what the Spirit is already doing in the person's life","We cannot manufacture the Spirit's work — we can only present Scripture humbly and pray"],quotes:["'The Spirit searches everything, even the depths of God.' — 1 Corinthians 2:10","'When Scripture becomes alive, that is the Spirit — and we are on holy ground.'"],illustrations:["The difference between reading Scripture as a duty and receiving it as a letter from God"],scripture:["Romans 8:16 (ESV) — 'The Spirit himself bears witness with our spirit that we are children of God.'","1 Corinthians 2:10 (ESV) — 'For the Spirit searches everything, even the depths of God.'","Galatians 4:6 (ESV) — 'And because you are sons, God has sent the Spirit of his Son into our hearts, crying, \"Abba! Father!\"'"]},
  27:{overview:"Skill 4 (Part 2) focuses on the Spirit's work of giving assurance of union with Christ — confidence that God loves them, sins are forgiven, and they belong to Christ. One of the most significant gifts we can help someone receive.",points:["The Spirit's assurance is built on two arguments: the character of God and the evidence of grace in you","First argument: consider the character of God — is this the kind of God who would abandon you?","Second argument: look at yourself — are you turned toward God, even imperfectly? That turn is the Spirit's work","An active conscience reminds you that you are a sinner — draw near anyway, because Hebrews 4:16 commands it","Fight to draw near — the Spirit gives us the 'Abba, Father' cry that brings us close"],quotes:["'Let us then with confidence draw near to the throne of grace.' — Hebrews 4:16"],illustrations:["1 John 5:7-8 — three witnesses: the Spirit, the water (baptism), and the blood (the cross)"],scripture:["Galatians 4:6 (ESV) — 'And because you are sons, God has sent the Spirit of his Son into our hearts, crying, \"Abba! Father!\"'","Hebrews 4:16 (ESV) — 'Let us then with confidence draw near to the throne of grace, that we may receive mercy and find grace to help in time of need.'","1 John 5:7-8 (ESV) — 'For there are three that testify: the Spirit and the water and the blood; and these three agree.'","Luke 11:11-13 (ESV) — 'What father among you, if his son asks for a fish, will instead of a fish give him a serpent; or if he asks for an egg, will give him a scorpion? If you then, who are evil, know how to give good gifts to your children, how much more will the heavenly Father give the Holy Spirit to those who ask him!'"]},
  28:{overview:"Skill 5 in knowing Scripture is to access it together with the person. Rather than coming with a ready-made answer, you invite collaboration: 'Let's look at this together.' Welch offers many practical ways to do this.",points:["Access Scripture collegially — 'Let's look at this together' rather than 'Here is the answer'","Three reasons: connect person to Scripture, counter its reduction to a tiny spiritual sector, and we rarely open our Bibles with friends","Ways to access: 'Let's pray'; ask if they have a life verse; ask what Scripture has been helpful; read a passage together","The better you know someone, the more their struggles find openings in specific texts","Review classic summaries together: Westminster Shorter Catechism, Heidelberg Catechism Q1-2"],quotes:["'The better you know someone, the more their struggles become recognizable and find openings in Scripture.'"],illustrations:["Welch's original plan: memorize a text for every human struggle — he forgot the first five before he got to the tenth"],scripture:["1 Corinthians 2:2 (ESV) — 'For I decided to know nothing among you except Jesus Christ and him crucified.'","Exodus 34:6-7 (ESV) — 'The LORD, the LORD, a God merciful and gracious, slow to anger, and abounding in steadfast love and faithfulness, keeping steadfast love for thousands, forgiving iniquity and transgression and sin, but who will by no means clear the guilty.'","Hebrews 4:14 (ESV) — 'Since then we have a great high priest who has passed through the heavens, Jesus, the Son of God, let us hold fast our confession.'"]},
  29:{overview:"Skill 6 in knowing Scripture is to distinguish between Scripture and advice. Both have their place, but they are categorically different — one carries the authority of God, the other carries human wisdom. Confusing them misleads people.",points:["Advice = human wisdom, experience-based; helpful but carries only human authority","Scripture = God's own words; they carry divine authority and can do what advice cannot","Paul models the distinction in 1 Corinthians 7: 'I say this, not the Lord' vs. 'the Lord commands'","Problems with advice: it can be wrong, feel prescriptive, and crowd out Scripture","Keep them separate: offer Scripture as Scripture and advice as advice"],quotes:["'I say this as a concession, not a command.' — Paul in 1 Corinthians 7"],illustrations:["1 Corinthians 7 — Paul's careful distinction between his own judgment and the Lord's command in the same letter"],scripture:["1 Corinthians 7:6-7 (ESV) — 'Now as a concession, not a command, I say this. I wish that all were as I myself am. But each has his own gift from God, one of one kind and one of another.'","1 Corinthians 7:12 (ESV) — 'To the rest I say (I, not the Lord) that if any brother has a wife who is an unbeliever, and she consents to live with him, he should not divorce her.'","1 Corinthians 7:25 (ESV) — 'Now concerning the betrothed, I have no command from the Lord, but I give my judgment as one who by the Lord's mercy is trustworthy.'"]},
  30:{overview:"Skill 7 (Part 1) addresses caring for sinners — an under-used skill in the church. We learn how Scripture speaks to sin: not with condemnation first but with invitation. Understanding the story of sin from Genesis to Revelation helps us speak with greater depth.",points:["Caring for sinners is under-used — we avoid it because we fear offense or don't know how","How does love go on a wise rescue mission? With humility, gentleness, and patience","Guidelines: approach with humility; move with gentleness; bear the burden of sin with the person","Does it sound good? Ask yourself before you speak: would this draw someone in or push them away?","The story of sin: we were given everything, chose outside the boundaries, blamed, descended into idolatry"],quotes:["'Bear the burden of sin with the person — it is one of the privileges we have in standing alongside them.'"],illustrations:["Isaiah 1:18-20 — 'Come, let us reason together' — God's invitation even in the face of great sin"],scripture:["James 5:19-20 (ESV) — 'My brothers, if anyone among you wanders from the truth and someone brings him back, let him know that whoever brings back a sinner from his wandering will save his soul from death and will cover a multitude of sins.'","Isaiah 1:18-19 (ESV) — 'Come now, let us reason together, says the LORD: though your sins are like scarlet, they shall be as white as snow; though they are red like crimson, they shall become like wool. If you are willing and obedient, you shall eat the good of the land.'","Galatians 6:1 (ESV) — 'Brothers, if anyone is caught in any transgression, you who are spiritual should restore him in a spirit of gentleness. Keep watch on yourself, lest you too be tempted.'"]},
  31:{overview:"Skill 7 (Part 2) develops the art of saying hard things — both indirectly and directly. Jesus in Mark's gospel is the master of indirect speech. Direct speech, done well, is rarely expressed in anger.",points:["Indirect speech: questions, stories, observations — these open up without confronting head-on","Jesus in Mark uses indirect speech constantly: questions, challenges, children as object lessons","When stuck: 'I'm not sure what to say' is valid; 'Let's pray' is always available","Direct speech: personal, surprising, not in anger — often best when prepared for in advance","Ask the person for help: 'How can I say this in a way that you can hear it?' is both humble and powerful"],quotes:["'Done well, direct speech is rarely expressed in anger.'"],illustrations:["Jesus in Mark: 'Why are you thinking these things?' (2:8), sitting a child among the Twelve (9:33-37)","Asking the person to help you say hard things to them — the disarming power of that invitation"],scripture:["Mark 2:8-9 (ESV) — 'Why do you question these things in your hearts? Which is easier, to say to the paralytic, \"Your sins are forgiven,\" or to say, \"Rise, take up your bed and walk\"?'","Mark 9:33-35 (ESV) — 'And they came to Capernaum. And when he was in the house he asked them, \"What were you discussing on the way?\" But they kept silent, for on the way they had argued with one another about who was the greatest. And he sat down and called the twelve. And he said to them, \"If anyone would be first, he must be last of all and servant of all.\"'","Galatians 6:1 (ESV) — 'Brothers, if anyone is caught in any transgression, you who are spiritual should restore him in a spirit of gentleness. Keep watch on yourself, lest you too be tempted.'"]},
  32:{overview:"Skill 8 is caring for sufferers. Suffering is the most common reason people seek help, and the church is often weakest here. Welch covers the story of suffering in Scripture, what not to say, and what actually draws sufferers close.",points:["Suffering is always connected to sin, death, and Satan — it will be with us until Christ returns","We live in an intensely personal world — God says 'tell me' and gives us the Psalms as words to speak to him","Love and humility are the guide: compassion is moved by the sufferer; humility knows it cannot fix death and Satan","What not to say: anything that lacks humility and compassion — including true-ish Scripture quoted too quickly","What draws sufferers close: being present, being affected, bearing the burden with them, not minimizing"],quotes:["'Trust in him at all times, O people; pour out your heart before him.' — Psalm 62:8"],illustrations:["Romans 8:28 offered too quickly — true, but used to minimize rather than to comfort","1 Thessalonians 5:18 used wrongly — 'give thanks in all circumstances' as a way to bypass the person's suffering"],scripture:["Psalm 62:8 (ESV) — 'Trust in him at all times, O people; pour out your heart before him; God is a refuge for us.'","Romans 8:22-23 (ESV) — 'For we know that the whole creation has been groaning together in the pains of childbirth until now. And not only the creation, but we ourselves, who have the firstfruits of the Spirit, groan inwardly as we wait eagerly for adoption as sons, the redemption of our bodies.'","Romans 8:28-29 (ESV) — 'And we know that for those who love God all things work together for good, for those who are called according to his purpose. For those whom he foreknew he also predestined to be conformed to the image of his Son.'","1 Thessalonians 5:18 (ESV) — 'give thanks in all circumstances; for this is the will of God in Christ Jesus for you.'"]},
  33:{overview:"Skill 9 is the summary skill: retelling the person's story. All ministry can be understood as reframing and retelling — Scripture wraps itself around a person's story and turns it into something they did not anticipate. Repentance is a retelling. Psalm 73 is a retelling.",points:["All ministry is, in some sense, retelling — helping someone see their story through God's larger story","Repentance is a retelling: 'I was right and they were wrong' becomes 'I was foolish and God is merciful'","Psalm 73: a person envying the wicked is taken into the sanctuary and their story is completely reframed","The process: 'What's on your heart?' → details → cry for help → confession of truth","Psalm 10, PTSD, addiction — all cases where the story needs to be entered and retold with Jesus in it"],quotes:["'All ministry, in some ways, can be understood as reframing — retelling our stories.'"],illustrations:["Psalm 73: from 'God is not worth it' to 'whom have I in heaven but you?'","Paul in Philippians 3: original story 'I am blameless'; retold story 'I count it all as rubbish for Christ'"],scripture:["Psalm 73:25-26 (ESV) — 'Whom have I in heaven but you? And there is nothing on earth that I desire besides you. My flesh and my heart may fail, but God is the strength of my heart and my portion forever.'","Philippians 3:7-8 (ESV) — 'But whatever gain I had, I count as loss for the sake of Christ. Indeed, I count everything as loss because of the surpassing worth of knowing Christ Jesus my Lord.'","Galatians 2:20 (ESV) — 'I have been crucified with Christ. It is no longer I who live, but Christ who lives in me. And the life I now live in the flesh I live by faith in the Son of God, who loved me and gave himself for me.'","Psalm 10:1 (ESV) — 'Why, O LORD, do you stand far away? Why do you hide yourself in times of trouble?'","Psalm 10:16-18 (ESV) — 'The LORD is king forever and ever; the nations perish from his land. O LORD, you hear the desire of the afflicted; you will strengthen their heart; you will incline your ear to do justice to the fatherless and the oppressed, so that man who is of the earth may strike terror no more.'"]},
  34:{overview:"The closing lecture recaps the three goals of the course and sends students out with the full model: pursue → know the person → know what God says → remember. Welch ends with a challenge to carry these skills into church culture.",points:["Goal 1: we have grown in wise conversations — conversations that bring people closer to God and each other","Goal 2: we have a simple platform (pursue/know/speak/remember) that works in every situation","Goal 3 remains: bring this model into your church in a way that refines its culture over time","The skills you have learned are enough to last a lifetime — they will always have room to grow","The Buechner quote: the holy moment when someone actually answers 'How are you?'"],quotes:["'I said to this fellow, How are you? knowing, of course, how he was. And there was what seemed to me an unbearable moment when he didn't answer. And I thought, My God! He's going to tell me!' — Frederick Buechner"],illustrations:["The Buechner story — the holy terror of a conversation that goes somewhere real"],scripture:["Ephesians 4:15 (ESV) — 'Rather, speaking the truth in love, we are to grow up in every way into him who is the head, into Christ.'","James 5:19-20 (ESV) — 'My brothers, if anyone among you wanders from the truth and someone brings him back, let him know that whoever brings back a sinner from his wandering will save his soul from death and will cover a multitude of sins.'"]},
  35:{overview:"Role Play 1: Ed Welch interviews Megan Wong, demonstrating in real time the skills of pursuit, knowing the person, following, slowing down, and attending to process as well as content.",points:["Welch models genuine curiosity: 'I just want news — the things that are better and the things that are harder'","He slows down with Andrew: asking specifically about the child as a person","He follows Megan's language: picking up her exact words and returning them as an invitation to go deeper","He attends to process: noticing when something matters and lingering there rather than moving on","Good helping starts with genuine interest in the whole person, not just their problems"],quotes:["'I just want news — what's happening, and the things that are better and the things that are harder.'"],illustrations:["Andrew's hair at birth — Welch's delight demonstrates what pursuing the whole person looks like","COVID pregnancy: Megan describes isolation; Welch slows down and names it rather than moving past it"],scripture:[]},
  36:{overview:"Role Play 2: The interview continues with Megan sharing her background, an eating disorder, a broken engagement, and the care she received from a counselor named Darby at CCEF. Welch models following the person into difficult and dark territory.",points:["Welch follows Megan into her hardest territory: the eating disorder, the broken engagement","He models slowing down with dark things: not rushing past pain to solutions or silver linings","He notices and names what the Spirit seems to be doing in Megan's story","The warmth between them is itself part of the model","Megan on Darby: 'She really loves you — and when you speak, she is affected.' That is the model."],quotes:["'I've had 10 different counselors over 15 years. The great ones are the ones who really love you.'","'She's heard every thought I've ever had that's weird, and has never judged me for them. That's rare.'"],illustrations:["The broken engagement and the Holy Spirit's provision through community, a job, and a college roommate arriving at exactly the right moment"],scripture:[]},
  37:{overview:"Role Play 3: The interview concludes with Megan sharing about her path to marriage, her healing, and the Holy Spirit's work throughout her story. Welch models retelling — helping Megan see her story as one of providence, redemption, and ongoing grace.",points:["Welch helps Megan see her story as a retold story: suffering → provision → healing → marriage","The convergence of gifts (job, roommate, timing) is God speaking personally into her story","Megan: 'The great counselors are the ones who really love you — and their love is visible'","The session closes with the wedding — 'the Spirit will be with you to do these things'","The whole interview is a lived demonstration of the entire course: pursue, know, speak, remember, retell"],quotes:["'There's something about those convergences that are so blatantly the love of Christ for you as if there's nobody else in the universe.'"],illustrations:["Original wedding date June 8th; new wedding date June 9th — 'Not just a little redemptive, it's redemptive'","Standing at the altar hearing: 'the Spirit will be with you' — that is the whole course in one moment"],scripture:[]}
};

// ── Notes Panel ────────────────────────────────────────────
let activeTab = 'summary';

function openNotes(lecNum, taskName){
  panelLecNum = lecNum;
  // For DBC, look up the notebook key; for HR, use numeric key
  let title = taskName;
  if(currentCourse === 'hr'){
    const nb = NOTEBOOK[lecNum];
    if(nb) title = nb.title;
  } else {
    const key = DBC_LEC_KEYS[lecNum];
    if(key) title = key;
  }
  document.getElementById('panel-title').textContent = title;

  // Decide default tab
  const sm = currentCourse === 'hr' ? SUMMARIES[lecNum] : null;
  activeTab = sm ? 'summary' : 'outline';

  renderNotesContent(lecNum);
  document.getElementById('notes-page').classList.add('open');
  window.scrollTo(0,0);
}

function switchTab(tab){
  activeTab = tab;
  renderNotesContent(panelLecNum);
}

function renderNotesContent(lecNum){
  const sm = currentCourse === 'hr' ? SUMMARIES[lecNum] : null;
  const noteKey = 'lec-'+lecNum;
  const savedNote = notesData[noteKey] || '';

  // Tab bar
  const tabs = `
    <div class="notes-tabs">
      ${sm ? `<button class="notes-tab${activeTab==='summary'?' active':''}" onclick="switchTab('summary')">Summary</button>` : ''}
      <button class="notes-tab${activeTab==='outline'?' active':''}" onclick="switchTab('outline')">Outline</button>
      <button class="notes-tab${activeTab==='mynotes'?' active':''}" onclick="switchTab('mynotes')">My Notes</button>
    </div>`;

  let body = '';

  if(activeTab === 'summary' && sm){
    body += `<div class="nb-section">`;
    body += `<div class="nb-section-heading">Overview</div>`;
    body += `<div class="nb-item">${escHtml(sm.overview)}</div>`;
    body += `</div>`;
    if(sm.points && sm.points.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Key Teaching Points</div>`;
      sm.points.forEach(p=>{body += `<div class="nb-item">• ${escHtml(p)}</div>`;});
      body += `</div>`;
    }
    if(sm.quotes && sm.quotes.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Key Quotes</div>`;
      sm.quotes.forEach(q=>{body += `<div class="nb-item scripture">${escHtml(q)}</div>`;});
      body += `</div>`;
    }
    if(sm.illustrations && sm.illustrations.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Illustrations & Stories</div>`;
      sm.illustrations.forEach(i=>{body += `<div class="nb-item">• ${escHtml(i)}</div>`;});
      body += `</div>`;
    }
    if(sm.scripture && sm.scripture.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Scripture References</div>`;
      sm.scripture.forEach(s=>{body += `<div class="nb-item scripture">${escHtml(s)}</div>`;});
      body += `</div>`;
    }
  } else if(activeTab === 'outline'){
    if(currentCourse === 'hr'){
      // HR uses {sections: [{h, items}]} format
      const nb = NOTEBOOK[lecNum];
      if(nb && nb.sections.length){
        nb.sections.forEach(s=>{
          body += `<div class="nb-section">`;
          body += `<div class="nb-section-heading">${escHtml(s.h)}</div>`;
          if(s.items.length===0){
            body += `<div class="nb-placeholder">Fill in during lecture…</div>`;
          } else {
            s.items.forEach(item=>{
              const isScrip = item.includes('~') || item.includes('(ESV)') || item.includes('(NIV)');
              body += `<div class="nb-item${isScrip?' scripture':''}">${escHtml(item)}</div>`;
            });
          }
          body += `</div>`;
        });
      } else {
        body += `<div class="nb-placeholder">No outline available for this session.</div>`;
      }
    } else {
      // DBC uses DBC_NOTEBOOK["Lecture Title"] = [items] format
      const key = DBC_LEC_KEYS[lecNum];
      const items = key ? DBC_NOTEBOOK[key] : null;
      if(items && items.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Course Notebook Outline</div>`;
        items.forEach(item=>{
          const isScrip = item.includes('(ESV)') || item.includes('(NIV)') || item.includes('Psalm') || item.includes('Proverbs');
          body += `<div class="nb-item${isScrip?' scripture':''}">${escHtml(item)}</div>`;
        });
        body += `</div>`;
      } else {
        body += `<div class="nb-placeholder">No outline available for this session.</div>`;
      }
    }
  } else {
    // My Notes tab
    body += `<div class="notes-section">
      <div class="notes-label">
        My notes
        <span class="notes-saved" id="notes-saved-indicator">Saved ✓</span>
      </div>
      <textarea class="notes-area" id="notes-ta" placeholder="Type your notes here…" oninput="saveNote(${lecNum},this.value)">${escHtml(savedNote)}</textarea>
    </div>`;
  }

  document.getElementById('panel-body').innerHTML = tabs + body;
}

function closePanel(){
  document.getElementById('notes-page').classList.remove('open');
  panelLecNum = null;
}

let noteTimer = null;
function saveNote(lecNum, val){
  notesData['lec-'+lecNum] = val;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(()=>{
    const ind = document.getElementById('notes-saved-indicator');
    if(ind){ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),2000);}
    scheduleSave();
  }, 800);
}

function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const container=document.getElementById('weeks');
  container.innerHTML='';

  DATA.forEach(w=>{
    let wTotal=0,wDone=0,bodyHTML='';
    w.sections.forEach((s,si)=>{
      let secHTML='',hasVisible=false;
      s.tasks.forEach((task,ti)=>{
        const id=tid(w.id,si,ti);
        const isDone=!!checked[id];
        const show=(filter==='all')||(filter===s.type)||(filter==='remaining'&&!isDone);
        wTotal++;if(isDone)wDone++;
        if(!show)return;
        hasVisible=true;

        const pills=[
          `<span class="pill pill-time">${fmtTime(task.t)}</span>`,
          task.due?`<span class="pill pill-due">Due ${task.due}</span>`:'',
          task.pts?`<span class="pill pill-pts">${task.pts} pts</span>`:'',
        ].filter(Boolean).join('');

        // Action buttons
        let actions = '';
        if(task.lec){
          actions += `<a class="notes-link" href="#" onclick="event.preventDefault();openNotes(${task.lec},'${task.n.replace(/'/g,"\\'")}')">📓 Outline &amp; Notes</a>`;
        }
        if(task.lec && AUDIO[task.lec]){
          actions += `<a class="notes-link audio-link" href="${AUDIO[task.lec]}" target="_blank">▶ Play Audio</a>`;
        }

        secHTML+=`<div class="task">
          <div class="task-check${isDone?' checked':''}" onclick="toggle('${id}',this)"></div>
          <div class="task-body">
            <div class="task-name${isDone?' done':''}">${task.n}</div>
            <div class="task-meta">${pills}</div>
            ${actions?`<div class="task-actions">${actions}</div>`:''}
          </div>
        </div>`;
      });
      if(hasVisible)bodyHTML+=`<div class="sec-lbl">${s.label}</div>${secHTML}`;
    });

    const pct=wTotal>0?Math.round(wDone/wTotal*100):0;
    const isOpen=openWeeks.has(w.id);
    const div=document.createElement('div');div.className='week';
    div.innerHTML=`
      <div class="week-hdr" onclick="toggleWeek(${w.id})">
        <div class="week-icon">W${w.id}</div>
        <div class="week-info"><div class="week-name">${w.title}</div><div class="week-dates">${w.dates}</div></div>

function switchCourse(course, btn){
  if(currentCourse === course) return;
  currentCourse = course;
  LOCAL_KEY = course === 'hr' ? LOCAL_KEY_HR : LOCAL_KEY_DBC;
  document.querySelectorAll('.course-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(course === 'hr'){
    window.DATA = HR_DATA;
    window.NOTEBOOK = HR_NOTEBOOK;
    window.AUDIO = HR_AUDIO;
    document.getElementById('course-title').textContent = 'Helping Relationships';
    document.getElementById('course-subtitle').textContent = 'CCEF Biblical Counseling · June–August 2025';
  } else {
    window.DATA = DBC_DATA;
    window.NOTEBOOK = DBC_NOTEBOOK;
    window.AUDIO = {};
    document.getElementById('course-title').textContent = 'Dynamics of Biblical Change';
    document.getElementById('course-subtitle').textContent = 'CCEF Biblical Counseling · 10 Weeks';
  }
  checked={};notesData={};filter='all';openWeeks=new Set([1]);
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.remove('active');if(b.textContent==='All')b.classList.add('active');});
  localLoad();
  loadFromCloud().then(()=>render());
}
