  24: {
    thesis: "Because Scripture consists of God's own personal letters to us, expecting and inviting genuine response, we should offer it the way we would share words from someone deeply loved — and we should remember and communicate that, despite our fears, His words are always good.",
    summary: "Welch develops the skill of being personal with the personal God in two parts. First, Scripture is not a history book or mere information but a letter that anticipates response — illustrated by Welch's memory of treasuring early love letters from his wife, by Augustine and the Westminster Confession's language of Scripture as living divine speech, and by his own admission of failing to actually 'talk to' God during a severe panic attack despite meditating on truth about Him. He asks pointedly whether Scripture currently lands as personal and reshaping, or remains merely appreciated information, illustrated by reflections on Acts 13:48 and John 21's 'do you love me?' Second, God's words — even hard ones — are always good, contrary to the serpent's ancient insinuation ('did he really say...?'). Welch illustrates this with Proverbs 3 and Isaiah 52 and 55's invitations ('come, come'), 1 John 5:3's assurance that His commands are not burdensome, and a pastoral illustration of framing the hard call to love an unloving spouse as itself good news because it draws a person closer to Christ.",
    flow: [
      "Part 1: Scripture as letters that anticipate response, not mere information or history.",
      "Personal illustration: treasuring and re-reading early love letters from his wife — an image for how we should receive Scripture.",
      "Westminster Confession and Augustine on Scripture as living divine speech, not a static text.",
      "Self-examination: does Scripture currently land personally for you? Illustrated with Acts 13:48 (Gentiles rejoicing over the word) and John 21 ('do you love me?').",
      "Personal story: during a severe panic attack, Welch meditated on truths about God but never actually spoke to Him directly — illustrating the gap between knowing about God and personally addressing Him.",
      "Part 2: God's words, even rebukes, are always good — countering the serpent's ancient insinuation, 'did he really say...?'",
      "Proverbs 3:17-18 and Isaiah 52:7, 55:1-2 as Scripture's own testimony to the goodness and beauty of God's words.",
      "1 John 5:3 — His commands are not burdensome.",
      "Pastoral illustration: framing the hard call to love an unloving spouse as itself good news, because it draws a person closer to Christ's own pattern of loving more than He is loved in return.",
      "Closing image: Welch's Christmas gift-giving style (tossing some gifts like a Frisbee, presenting others with ceremony) as an analogy for how Scripture deserves to be presented with special honor.",
    ],
    notes: [
      { heading: "1. Scripture as personal letters that anticipate response", points: [
        "Deuteronomy 8:3 — manna symbolizes that we live by the very words of God, not bread alone; John 15:15 — Jesus has revealed all He heard from the Father.",
        "Westminster Confession: 'the Holy Spirit speaking in scripture is our authority' — Scripture is living, present divine speech, not a static historical document.",
        "Personal illustration: Welch's practice of re-reading early letters from his then-girlfriend (now wife) multiple times, illustrating how we listen differently to someone who loves us.",
      ]},
      { heading: "2. Self-examination: does Scripture land personally?", points: [
        "Question: 'what has landed on your heart?' — distinguishing appreciating or knowing a passage from having it genuinely reshape you (illustrated by David Powlison's discovery that only a handful of Psalms had truly 'possessed' him, despite his deep familiarity with all of them).",
        "Welch's own example: being unexpectedly moved to tears reading Acts 13:48, and noticing how John 21's 'do you love me?' had become newly personal to him over the past year.",
      ]},
      { heading: "3. The gap between knowing about God and speaking to Him", points: [
        "Personal story: during one of his most severe panic attacks, Welch meditated extensively on truths about God's presence and lack of reason for fear, but realized afterward he never actually spoke to God directly — he thought about Him in the third person rather than addressing Him.",
        "This illustrates that 'personal' engagement with God requires actual address, not just accurate theological reflection.",
      ]},
      { heading: "4. God's words are always good, despite ancient suspicion", points: [
        "The serpent's original strategy ('did he really say...?') persists: God's words can feel oppressive, restrictive, or inconsistent with freedom and love.",
        "Proverbs 3:17-18 (wisdom's ways are pleasantness and peace) and Isaiah 52:7 (beautiful feet bringing news that 'your God reigns') affirm Scripture's own self-testimony to its goodness.",
        "Isaiah 55:1-2's repeated 'come, come' invitation reflects God's persistent, generous invitation rather than a withholding posture.",
        "1 John 5:3 explicitly anticipates that God's commands might seem burdensome and directly counters this: 'his commands are not burdensome.'",
      ]},
      { heading: "5. Pastoral application: framing hard words as good news", points: [
        "Illustration: calling a man to love his unloving spouse according to Christ's example, while acknowledging directly that this is a hard path, framing it nonetheless as 'the very best of words' because it draws him close to Jesus both now and in eternity.",
        "Principle offered to those struggling: 'if God's words to you ever sound like a fence keeping you from good things, just yell' — opening a channel for honest pushback rather than assuming compliant agreement.",
      ]},
      { heading: "6. Presenting Scripture with appropriate honor", points: [
        "Personal illustration: Welch's habit of distributing Christmas presents differently depending on the gift — tossing minor gifts casually, but presenting more significant ones with ceremony and affectionate words.",
        "Applied to Scripture: God's words are not to be merely tossed to someone, but offered with the ceremony and honor due to 'the very words of Christ.'",
      ]},
    ],
    terms: [
      { term: "Scripture as letter", def: "Welch's central image for this skill: Scripture as personal divine communication that anticipates genuine response, not merely historical information." },
      { term: "Did he really say...?", def: "The ancient serpent's strategy of casting doubt on the goodness of God's words, which persists as a temptation to receive Scripture as burdensome rather than good." },
    ],
    takeaways: [
      "Ask yourself honestly: does Scripture currently feel like a living letter to you, or mostly like appreciated but inert information?",
      "Notice the difference between meditating on truths about God and actually speaking directly to Him.",
      "When offering a hard truth from Scripture, consider explicitly naming why it is, in fact, good news, even though it's difficult.",
      "Practice presenting Scripture to others (and to yourself) with deliberate honor, rather than casually tossing it into a conversation.",
    ],
    questions: [
      "Which passage of Scripture currently feels most like it has 'possessed' you, the way David Powlison described with the Psalms?",
      "Have you experienced the gap Welch describes between knowing truths about God and actually speaking to Him directly?",
      "Where in your own life have you suspected, even subtly, that God's commands are burdensome rather than good?",
      "What would it look like for you to present Scripture to someone with more deliberate ceremony or honor than you usually do?",
    ],
  },
  25: {
    thesis: "Because abstract theological words easily lose their evocative power, wise care should translate them into vivid, concrete, colorable pictures — following Scripture's own pattern of speaking in images rather than abstractions — so that truths like salvation, holiness, and forgiveness become visible and memorable rather than merely propositional.",
    summary: "Welch develops the skill of translating theological vocabulary into 'colored pictures,' quoting G.K. Chesterton's principle that we shouldn't believe anything that can't be told in colored pictures. He works through several key terms — saved/rescued, converted/reborn (using Ezekiel's dry bones), distance (sin as moving far from God, faith as drawing near, illustrated by the bleeding woman of Luke 8), union with Christ (holding hands, being inseparably stuck together, drawing on Psalm 121 and Isaiah 41:13), holiness (illustrated by Jesus' own ordinary-yet-amazing presence in Mark 9), sanctification (progressive nearness), and forgiveness (a transaction in which Christ takes our death and gives us His righteousness, as in the bleeding woman's healing and the Old Testament scapegoat). He closes with the concrete/abstract distinction itself, illustrated by a poignant failure and surprising success in caring for a brain-injured young man who could not 'see' the abstract idea of blame until Welch simply read him Matthew 7:3-5's vivid image of the log and the speck, at which point conviction came immediately.",
    flow: [
      "G.K. Chesterton's principle: don't believe anything that can't be told in colored pictures — applied to translating theological language.",
      "Working through 'saved' (now an evocatively flat word) toward 'rescued' — rescued from what, by whom, and at just the right time.",
      "'Converted' and 'reborn' reanimated through Ezekiel's image of dry bones brought to life by the Spirit's breath.",
      "The image of distance: sin as moving far from God (the prodigal son, the unclean camped outside the tabernacle); faith as drawing near (the bleeding woman of Luke 8 touching Jesus' garment).",
      "Union with Christ: holding hands with the living God, drawing on Psalm 121 (the Lord as keeper and shade) and Isaiah 41:13 (the Lord holding our right hand).",
      "Holiness: Moses' song in Exodus 15 ('who is like you, majestic in holiness?'), and Jesus' own ordinary-yet-amazing presence (Mark 9) as the concrete picture of what God's holiness looks like.",
      "Holiness in us: being brought close enough to share in and spread that holiness, illustrated by 1 Corinthians 7's instruction regarding marriage to an unbeliever.",
      "Sanctification reframed as progressive nearness to God, analogous to growing closeness in human marriage over time.",
      "Forgiveness as transaction: the bleeding woman's healing (Luke 8) and the Old Testament scapegoat both picture sin's consequences being transferred rather than simply disappearing; 1 Peter 3:18 ('the righteous for the unrighteous... to bring us to God').",
      "Closing story: a brain-injured young man who could not 'see' the abstract concept of blame until Matthew 7:3-5's vivid image (the log and the speck) was simply read to him, producing immediate conviction.",
    ],
    notes: [
      { heading: "1. Chesterton's principle and the need for colored pictures", points: [
        "G.K. Chesterton: 'don't believe anything that can't be told in colored pictures' — applied here as a discipline for translating theological abstractions into vivid, visualizable images.",
        "The image of God (sonship/offspring, or its corruption in the prodigal son) is offered as a model of an already-vivid, colorable theological term.",
      ]},
      { heading: "2. Reanimating flattened words: saved, converted, reborn", points: [
        "'Saved,' though common, has lost its evocative force; 'rescued' reopens the question of from what (death, the devil, the bondage of sin) and at just the right time.",
        "'Converted' (a word that to outsiders may only evoke electricity) and 'reborn' (already vivid in John, but now flattened by familiarity) are reanimated through Ezekiel's striking image of dry bones brought to life by the Spirit's breath.",
      ]},
      { heading: "3. The image of distance: sin and faith", points: [
        "Sin pictured as increasing distance from the Lord — the unclean camped outside the tabernacle, the prodigal son's literal journey 'a long way off.'",
        "Faith pictured as drawing near — illustrated by the bleeding woman in Luke 8 who simply seeks enough closeness to touch the hem of Jesus' garment.",
      ]},
      { heading: "4. Union with Christ: holding hands", points: [
        "Union with Christ pictured concretely as holding hands with the living God — inseparable, intimate, 'stuck.'",
        "Psalm 121 ('the Lord is your keeper... the shade on your right hand') and Isaiah 41:13 ('I the Lord hold your right hand') supply the biblical grounding for this image.",
      ]},
      { heading: "5. Holiness pictured concretely", points: [
        "Moses' song (Exodus 15): 'who is like you, majestic in holiness?' establishes that holiness is not ordinary difference but awesome, glorious otherness.",
        "Jesus himself, in Mark 9, embodies holiness in a way that produces amazement upon merely hearing he was coming — ordinary in appearance, yet unmistakably different the more He is known.",
        "Holiness in us means having been brought close enough to share in His perfections; 1 Corinthians 7's counsel about marriage to an unbeliever pictures holiness as something that can be carried outward and spread, not merely guarded.",
      ]},
      { heading: "6. Sanctification as progressive nearness", points: [
        "Rather than an abstract 'growth,' sanctification is pictured as progressively increasing nearness to God, analogous to how a married couple can grow closer over time despite already being married.",
      ]},
      { heading: "7. Forgiveness as transaction, not mere erasure", points: [
        "Luke 8's healing of the bleeding woman pictures a kind of exchange: Jesus takes on the consequence (the 'death' symbolized in her disease) and she receives His righteousness (symbolized in healing).",
        "The Old Testament scapegoat similarly pictures that sin's consequences cannot simply vanish into the atmosphere — something must bear them.",
        "1 Peter 3:18 ('Christ died for sins, the righteous for the unrighteous, to bring us to God') is offered as a passage that has personally 'taken ownership' of Welch, crystallizing the directionality of the gospel: we are far, and we are being brought near.",
      ]},
      { heading: "8. Closing story: blame made visible through Scripture's own image", points: [
        "A brain-injured young man consistently blamed others (especially his father) for his difficulties, and direct conversation about 'blame' as an abstract concept produced no lasting change.",
        "Simply reading Matthew 7:3-5 (the speck and the log) without further commentary produced an immediate, vivid reaction ('I have an entire forest in my eye') and apparent conviction — illustrating that Scripture's own concrete images can succeed where abstract explanation fails.",
        "Welch's reflection: the failure was his own, not Scripture's — he had been trying to make blame abstract and explainable rather than trusting Scripture's already-vivid, concrete picture to do its own work.",
      ]},
    ],
    terms: [
      { term: "Colored pictures (Chesterton's principle)", def: "The discipline of translating abstract theological language into vivid, visualizable images so that truths become memorable and accessible rather than merely propositional." },
      { term: "Concrete vs. abstract", def: "Concrete is available to the senses (touchable, visualizable); abstract exists only as a mental concept. Scripture and Jesus' own teaching favor the concrete." },
      { term: "Forgiveness as transaction", def: "The biblical picture of forgiveness not as mere erasure but as an exchange — consequences transferred to another (the scapegoat, ultimately Christ) so that we receive His righteousness in return." },
    ],
    takeaways: [
      "When a theological word feels flat or abstract, look for Scripture's own vivid images (dry bones, holding hands, the log and the speck) to reanimate it.",
      "Try restating an abstract spiritual idea (like 'union with Christ' or 'sanctification') in a way you could draw or visualize.",
      "Remember that forgiveness is pictured in Scripture as a real transaction, not simply an erasure — something is genuinely transferred.",
      "When explanation isn't working, consider whether simply presenting Scripture's own concrete image (without added commentary) might succeed where abstract argument has failed.",
    ],
    questions: [
      "Which theological word do you personally find hardest to 'see' or visualize, and what image might help?",
      "How does picturing union with Christ as 'holding hands' change how you think about your relationship with Him day to day?",
      "Why might forgiveness as 'transaction' (rather than mere erasure) matter for how you understand the cross?",
      "Can you recall a time a vivid image succeeded in convicting or moving you where a longer explanation had failed?",
    ],
  },
  26: {
    thesis: "The Holy Spirit, far from being the shy member of the Trinity, is actively and powerfully at work uniting us to Christ, transforming us through what feels like a real battle, and giving us confidence in our standing — and naming this work specifically should shape both our own walk and how we care for others.",
    summary: "Welch begins a substantial treatment of 'keeping in step with the Spirit,' identifying three primary works of the Spirit to trace through the rest of this and the following lecture. First, the Spirit unites us to Christ and mediates ongoing fellowship with Him — illustrated through Acts 16's repeated references to the Spirit speaking and guiding, and Ephesians 1 and 3's prayers for growing knowledge of Christ's love. Second, the Spirit transforms us into Christ's likeness through a process that, contrary to popular images of simply 'letting go,' actually feels like active warfare — illustrated by Ephesians 6:12, Romans 7's tension, and the active commands to flee and to make every effort. Welch applies this to two real pastoral cases: a pastor's physical panic and a woman's fear of assault, both of whom relied on self-reassuring information rather than on the Spirit's mediated presence of Christ — contrasted with Welch's own experience of immediate comfort upon hearing his father's promise, 'I'll take care of it,' after a car accident. The lecture introduces Robert Murray McCheyne's prayer ('make me as holy as it is possible for a redeemed sinner to be') and previews questions for application: what are Satan's devices in your own life, and where do you see opportunity for 'mortification' — a slower, more extended repentance than mere quick confession.",
    flow: [
      "Framing: the Spirit is not the 'shy member of the Trinity' but powerfully and visibly at work; the skill is helping others see that work.",
      "Background image: the Spirit walks with and leads us on a path (Galatians 5:16-18, 25; Romans 8:14), like a good walking companion who knows the way and sets a sustainable pace.",
      "First work: the Spirit mediates Christ's presence and fellowship — illustrated by Acts 16's repeated references to the Spirit speaking and guiding Paul's team.",
      "Trinitarian framing: Ephesians 1:17 (the Father gives the Spirit of wisdom) and Ephesians 3:16-19 (being strengthened by the Spirit to know the breadth of Christ's love) establish this as a fully Trinitarian work, not the Spirit acting alone.",
      "Second work: the Spirit transforms us into Christ's likeness — illustrated by 2 Corinthians 3's image of unveiled, ever-increasing glory (contrasted with Moses' fading, veiled glory).",
      "Reframing 'transformation' away from passive images (letting go, surrender) toward active battle imagery: Ephesians 6:12, Romans 7's internal tension, 1 Corinthians 6's call to flee, Philippians 3's 'make every effort.'",
      "Pastoral application 1: a pastor's physical panic, managed through self-reassuring facts ('I'm not going to die from this') rather than through the Spirit's mediated presence of Christ.",
      "Pastoral application 2: a woman's fear of home invasion, met by her husband with statistical reassurance rather than the promise of Christ's presence.",
      "Contrast: Welch's own car accident, where his father's simple promise 'I'll take care of it' immediately calmed his fears — illustrating how the right person's presence, not mere information, quiets fear.",
      "Closing: Robert Murray McCheyne's prayer, 'Lord, make me as holy as it is possible for a redeemed sinner to be,' as a model for confident yet humble prayer regarding transformation.",
    ],
    notes: [
      { heading: "1. The Spirit is not shy — He speaks and acts powerfully", points: [
        "Acts 16 repeatedly shows the Holy Spirit (also called 'the Spirit of Jesus') actively forbidding, guiding, and directing Paul's missionary team — far from a passive or merely background presence.",
        "The image of walking together: the Spirit walks with us, sets the pace, and knows the way — contrasted with Welch's own experience of accidentally walking ahead of his family on hikes and ending up alone.",
      ]},
      { heading: "2. First work: uniting us to Christ and mediating fellowship", points: [
        "Ephesians 1:17 — Paul's prayer that the Father would give 'the spirit of wisdom and revelation in the knowledge of him,' extending to knowledge of our inheritance and God's power at work in us.",
        "Ephesians 3:16-19 — being strengthened with power through the Spirit specifically so that we might know the breadth, length, height, and depth of Christ's love, which surpasses knowledge.",
        "This is explicitly Trinitarian — the Father gives the Spirit, who unites us to the Son — not a work the Spirit performs independently of the Father and Son.",
      ]},
      { heading: "3. Second work: transformation into Christ's likeness", points: [
        "2 Corinthians 3 contrasts Moses' veiled, fading glory with believers' unveiled, ever-increasing transformation 'from one degree of glory to another' by the Spirit.",
        "Popular images of transformation (letting go, surrender, 'lay your life on the altar') capture something true but are often too passive; Scripture's dominant imagery is instead active battle.",
      ]},
      { heading: "4. Transformation as active battle", points: [
        "Ephesians 6:12 — 'we do not wrestle with flesh and blood, but against... the spiritual forces of evil' — establishing real spiritual warfare as the context for growth.",
        "Romans 7's tension ('the things I want to do, I don't; the things I don't want to do, I do') is read as describing Paul's ongoing, present experience, not merely his pre-conversion past.",
        "Active commands reinforce this: 1 Corinthians 6 commands fleeing sexual immorality (recalling Joseph's example); Philippians 3 calls for 'every effort,' using language elsewhere translated as relentless pursuit or even persecution of an enemy.",
      ]},
      { heading: "5. Pastoral application: information versus the Spirit's presence", points: [
        "A pastor coping with physical panic relied on self-reassuring facts ('I'm not going to die from this') — true but, by itself, insufficient, since it bypasses the Spirit's mediated presence of Christ.",
        "A woman fearful of assault was met by her husband's statistical research (no reported incidents in their area) — again true but ultimately unhelpful, since it offers no actual guarantee and forgets that comfort in fear comes from the right person being present, not mere information.",
      ]},
      { heading: "6. Contrast: the comfort of the right person's presence", points: [
        "Personal story: after his own first car accident, simply hearing his father say 'I'll take care of it' — without any explanation of how — immediately calmed Welch's fears, because of his father's track record of faithfulness.",
        "Applied theologically: the Spirit's central message to fearful people is not a set of facts but the assurance that Christ is present — 'I am with you' — which is the deepest answer Scripture offers to virtually every human struggle, including loss ('I will make things right; for now, grieve with faith and hope').",
      ]},
      { heading: "7. Closing: confidence without presumption", points: [
        "Robert Murray McCheyne's prayer — 'Lord, make me as holy as it is possible for a redeemed sinner to be' — offered as a model for praying about transformation with both confidence (it is God's will) and appropriate humility (acknowledging ongoing sinfulness).",
        "J.I. Packer's summary is invoked: 'Jesus is here, personally approaching and addressing me' as the heart of what we want to communicate to our own souls and to those we care for.",
      ]},
    ],
    terms: [
      { term: "Keep in step with the Spirit", def: "Galatians 5:25's image, used as the title for this whole section — walking alongside the Spirit, who leads, sets the pace, and empowers our transformation." },
      { term: "Transformation as battle", def: "Welch's reframing of sanctification away from passive imagery (surrender, letting go) toward Scripture's dominant active, warfare-based language." },
      { term: "The Spirit's mediated presence", def: "The Spirit's specific work of making Christ's actual presence and comfort real and available to us, as distinct from merely supplying reassuring facts or information." },
    ],
    takeaways: [
      "When fear arises (in yourself or someone you're caring for), notice whether the response offered is mere information or the actual, mediated presence of Christ through the Spirit.",
      "Reframe your own expectations of spiritual growth: expect it to feel like an active battle, not merely a process of passive surrender.",
      "Consider praying McCheyne's prayer — 'make me as holy as possible for a redeemed sinner to be' — as a way to hold confidence and humility together.",
      "Ask yourself: in my own life, is comfort in fear coming primarily from facts, or from trust in a specific, faithful Person?",
    ],
    questions: [
      "Where in your own life have you relied on self-reassuring facts rather than on the presence of Christ when afraid?",
      "How does reframing transformation as 'battle' rather than mere 'surrender' change how you expect your own growth to feel?",
      "What does it mean practically that the Spirit's favorite topic, according to Welch, is the love of Christ for you?",
      "Who in your life has, like Welch's father, earned enough trust that their simple presence and promise calms your fears?",
    ],
  },
  27: {
    thesis: "Beyond uniting us to Christ and empowering our transformation, the Spirit's third great work is persuading us with settled confidence that we genuinely belong to God and are loved by Him — a confidence meant to grow stronger even as our awareness of ongoing sin increases, not in spite of it.",
    summary: "Welch completes his treatment of the Spirit's work by focusing on the Spirit's role in producing assurance — confidence that we belong to God and are loved by Him, especially important because spiritual growth often increases our awareness of remaining sin rather than decreasing it. He probes common but mistaken pictures of facing Christ (anticipating disappointment or grudging acceptance) and roots confidence instead in the historical pattern of God's covenant-making, which repeatedly goes to great lengths (including renewed covenants after human unfaithfulness) to assure His people of His commitment. The Spirit functions as a legal witness (1 John 5:7-8) testifying to the reliability of Christ's work, and Welch illustrates the difference settled confidence makes with a moving story of a man who, after years of insecurity in an unfaithful first marriage, wept uncontrollably on his first business trip away from his new, faithful wife — finally experiencing what settled trust actually feels like. Practical markers for assessing this confidence include considering the direction (not the distance) of one's spiritual walk, and the lecture closes by urging that growing in this confidence is itself part of the ongoing 'fight,' to be pursued through prayer (Luke 11's father giving good gifts, much more the Spirit) and deliberate nearness to Christ (Hebrews 4:16).",
    flow: [
      "Recap of two prior works (uniting to Christ, transforming us) and introduction of the third: the Spirit gives confidence and certainty that we belong to God.",
      "Why this matters: as we grow, awareness of remaining sin and conflict tends to increase, which can be misread as spiritual immaturity rather than genuine growth.",
      "Self-examination: are you confident that God loves you? Personal illustration: years of asking 'why do you love me?' rather than simply trusting his wife's love revealed a deeper insecurity about Christ's love.",
      "Probing common, mistaken pictures of facing Christ — anticipating disappointment, an eye-roll, grudging technical acceptance.",

    flow: [

    notes: [
      { heading: "1. Indirect versus direct speech defined", points: [

  32: {
    thesis: "Suffering, woven throughout Scripture's larger story alongside sin, death, and Satan, calls for love and humility above all — and most unhelpful responses to sufferers fail not because they're false but because they lack genuine compassion and the humble admission that we cannot fix what's broken.",
    summary: "Welch turns to growing in skill with sufferers, first sketching suffering's larger biblical story: its entrance alongside sin and death, the intensely personal invitation to 'speak to me' (Psalm 62:8), God's presence amid suffering in the wilderness, the particular weight of shame from others' sins against us, and the suffering servant motif climaxing in Christ, whose people now follow His pattern from suffering into glory. He then turns to practical care, anchored in love and humility, illustrated by two ambiguous, instructive stories — a pastor whose request to stop sending unsolicited treatments for his daughter's cancer was repeatedly overridden by well-meaning church members, and a family who asked to be left alone during a crisis and ended up feeling abandoned — both showing that love and humility don't resolve into simple formulas. The bulk of the lecture catalogs what not to say: anything starting with 'just,' offering scripture 'like a pill' without adornment, the falsely curious 'what is God teaching you?', misapplied gratitude language (1 Thessalonians 5:18 doesn't mean being thankful for death itself), and especially minimizing comparisons ('at least...', 'others have it worse') that implicitly suggest God rations compassion according to a hierarchy of pain.",
    flow: [
      "The story of suffering: entering alongside sin and death and Satan (Romans 8:22-23); never finally separated from God's care despite appearances.",
      "The intensely personal invitation to speak (Psalm 62:8) as a defining feature of how Scripture treats sufferers.",
      "Suffering in the wilderness: death surrounds, but God is genuinely present; the enemy is aroused both by death and by God's presence.",
      "The particular weight of shame from others' sins against us, distinct from suffering we bring on ourselves.",
      "Isaiah's suffering servant motif climaxing in the 'Lamb of God,' and the principle that 'as the king goes, so go the people' — Christians suffer with the rest of humanity, but not meaninglessly.",
      "Two stories illustrating the irreducible complexity of love and humility: a pastor's repeatedly overridden request to stop unsolicited cancer treatments; a family whose request for space during crisis led to isolation rather than help.",
      "What not to say: anything beginning with 'just' (just pray, just believe); Scripture offered 'like a pill' without adornment; the falsely curious 'what is God teaching you?'; misapplied gratitude ('be thankful in all things' does not mean thankfulness for death itself).",
      "The especially dangerous category of minimizing comparison ('at least he's in a better place,' 'others have it worse') — implying God rations compassion according to a hierarchy of loss.",
      "What to say instead: sharing the burden, asking what's been helpful, asking for one specific way to pray.",

    notes: [
      { heading: "1. Suffering's place in Scripture's larger story", points: [

      { heading: "2. Suffering in the wilderness: death surrounds, but so does God", points: [

      ]},
      { heading: "3. Shame from others' sins against us", points: [
        "Beyond suffering we bring on ourselves or that simply happens to us, Scripture identifies a particular weight — shame — that results specifically from others' sins against us, leaving a sense of contamination that no human effort can cleanse.",
        "Only God's cleansing and adoption can address this; this becomes one of the critical themes for understanding how Scripture speaks to victims of abuse or sin committed against them.",
      ]},
      { heading: "4. The suffering servant and 'as the king goes, so go the people'", points: [

        "Two friends facing terminal diagnoses are quoted as models of this perspective: 'nothing has changed' (God's character remains constant) and 'he got me into this, and he's going to have to take me through it' (suffering reframed as God's responsibility, not the sufferer's own problem to solve).",

      { heading: "5. Two ambiguous stories about love and humility", points: [

        "Story 2: a different family's request to 'stay away' during a crisis was honored literally by their community, leaving them feeling abandoned — illustrating that love sometimes requires creative persistence (cards, texts, offers) even when a literal request for distance has been made.",

      { heading: "6. What not to say: a growing list", points: [

    document.getElementById('model-btn-wrap').style.display = 'block';
  } else {
    document.getElementById('model-btn-wrap').style.display = 'none';
  }

  localLoad();
  render();
  loadFromCloud();
});
</script>
