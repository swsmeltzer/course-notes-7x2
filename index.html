// ── Notes Panel ────────────────────────────────────────────
let activeTab = 'summary';

function openNotes(lecNum, taskName){
  panelLecNum = lecNum;
  // For DBC, look up the notebook key; for HR, use numeric key
  let title = taskName;
  if(currentCourse === 'hr'){
    const nb = NOTEBOOK[lecNum];
    if(nb) title = nb.title;
  } else {
    const key = DBC_LEC_KEYS[lecNum];
    if(key) title = key;
  }
  document.getElementById('panel-title').textContent = title;

  // Default tab is always Outline
  activeTab = 'outline';

  renderNotesContent(lecNum);
  document.getElementById('notes-page').classList.add('open');
  window.scrollTo(0,0);
}

function switchTab(tab){
  activeTab = tab;
  renderNotesContent(panelLecNum);
}

function renderNotesContent(lecNum){
  const sm = currentCourse === 'hr' ? SUMMARIES[lecNum] : null;
  const noteKey = 'lec-'+lecNum;
  const savedNote = notesData[noteKey] || '';

  // Tab bar
  // Check for detailed notes
  const det = (currentCourse === 'dbc') ? (DBC_DETAILED[lecNum] || null) : (HR_DETAILED[lecNum] || null);

  const tabs = `
    <div class="notes-tabs">
      <button class="notes-tab${activeTab==='outline'?' active':''}" onclick="switchTab('outline')">Outline</button>
      ${sm ? `<button class="notes-tab${activeTab==='summary'?' active':''}" onclick="switchTab('summary')">Summary</button>` : ''}
      ${det ? `<button class="notes-tab${activeTab==='detailed'?' active':''}" onclick="switchTab('detailed')">Detailed Notes</button>` : ''}
      <button class="notes-tab${activeTab==='mynotes'?' active':''}" onclick="switchTab('mynotes')">My Notes</button>
    </div>`;

  let body = '';

  if(activeTab === 'summary' && sm){
    body += `<div class="nb-section">`;
    body += `<div class="nb-section-heading">Overview</div>`;
    body += `<div class="nb-item">${escHtml(sm.overview)}</div>`;
    body += `</div>`;
    if(sm.points && sm.points.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Key Teaching Points</div>`;
      sm.points.forEach(p=>{body += `<div class="nb-item">• ${escHtml(p)}</div>`;});
      body += `</div>`;
    }
    if(sm.quotes && sm.quotes.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Key Quotes</div>`;
      sm.quotes.forEach(q=>{body += `<div class="nb-item scripture">${escHtml(q)}</div>`;});
      body += `</div>`;
    }
    if(sm.illustrations && sm.illustrations.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Illustrations & Stories</div>`;
      sm.illustrations.forEach(i=>{body += `<div class="nb-item">• ${escHtml(i)}</div>`;});
      body += `</div>`;
    }
    if(sm.scripture && sm.scripture.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Scripture References</div>`;

      // Lecture Flow

        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Lecture Flow</div>`;
        det.flow.forEach(f=>{body += `<div class="nb-item">• ${escHtml(f)}</div>`;});
        body += `</div>`;
      }
      // Detailed Notes
      if(det.notes && det.notes.length){
        det.notes.forEach(n=>{

          body += `<div class="nb-section-heading">${escHtml(n.heading)}</div>`;
          n.points.forEach(p=>{body += `<div class="nb-item">• ${escHtml(p)}</div>`;});
          body += `</div>`;
        });
      }
      // Key Terms
      if(det.terms && det.terms.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Key Terms</div>`;
        det.terms.forEach(t=>{body += `<div class="nb-item"><strong>${escHtml(t.term)}</strong> — ${escHtml(t.def)}</div>`;});

      if(det.takeaways && det.takeaways.length){

        body += `<div class="nb-section-heading">Practical Takeaways</div>`;

      if(nb && nb.sections.length){
        nb.sections.forEach(s=>{
          body += `<div class="nb-section">`;
          body += `<div class="nb-section-heading">${escHtml(s.h)}</div>`;
          if(s.items.length===0){
            body += `<div class="nb-placeholder">Fill in during lecture…</div>`;

          body += `</div>`;

        body += `<div class="nb-placeholder">No outline available for this session.</div>`;

      // DBC uses DBC_NOTEBOOK["Lecture Title"] = [items] format

let currentDraftId = null;
let draftTimer = null;

function openDraft(taskId, taskName){
  currentDraftId = taskId;
  document.getElementById('draft-page-title').textContent = taskName;
  const ta = document.getElementById('draft-textarea');
  ta.value = draftsData[taskId] || '';
  updateWordCount(ta.value);
  renderAssignmentPrompt(taskName);
  document.getElementById('draft-page').classList.add('open');
  window.scrollTo(0,0);
}

function buildAssignmentTemplate(taskName){
  const a = HR_ASSIGNMENTS[taskName];
  if(!a) return '';
  let lines = [];
  const addQ = (q)=>{ lines.push(q); lines.push(''); lines.push(''); };
  if(a.questions && a.questions.length){
    a.questions.forEach(addQ);
  }
  if(a.sections && a.sections.length){
    a.sections.forEach(s=>{
      lines.push(s.heading.toUpperCase());
      lines.push('');
      if(s.questions && s.questions.length){
        s.questions.forEach(addQ);
      } else {
        lines.push('');
        lines.push('');
      }
    });
  }
  return lines.join('\n').trim();
}

function useTemplate(){
  const ta = document.getElementById('draft-textarea');
  if(ta.value.trim() && !confirm('This will replace your current draft text with the question template. Continue?')){
    return;
  }
  const template = buildAssignmentTemplate(document.getElementById('draft-page-title').textContent);
  ta.value = template;
  saveDraft(template);
  ta.focus();
}

function renderAssignmentPrompt(taskName){
  const a = HR_ASSIGNMENTS[taskName];
  const box = document.getElementById('draft-prompt-box');

  // Special case: Extended Conversation prompts pull full weekly detail from ECP_WEEKLY
  const ecpMatch = taskName.match(/^Extended Conversation, Week (\d+) Prompt$/);
  if(ecpMatch && typeof ECP_WEEKLY !== 'undefined' && ECP_WEEKLY[ecpMatch[1]]){
    const wk = ECP_WEEKLY[ecpMatch[1]];
    let html = '';
    html += `<div class="prompt-meta">`;
    if(a && a.due) html += `<span class="prompt-pill">📅 Due ${escHtml(a.due)}</span>`;
    html += `</div>`;
    html += `<div class="prompt-instructions">Meet with your ECP this week. Use the prompts below if you're unsure where to lead the conversation — feel free to guide things naturally instead.</div>`;
    if(wk.skills && wk.skills.length){
      html += `<div class="prompt-section-heading">Skills to Practice</div>`;
      html += `<ul class="prompt-questions">`;
      wk.skills.forEach(s=>{html += `<li>${escHtml(s)}</li>`;});
      html += `</ul>`;
    }
    html += `<div class="prompt-section-heading">Conversation Prompts</div>`;
    html += `<ul class="prompt-questions">`;
    wk.prompts.forEach(p=>{html += `<li>${escHtml(p)}</li>`;});
    html += `</ul>`;
    html += `<div class="prompt-section-heading">Questions for Reflection (after your meeting)</div>`;
    html += `<ul class="prompt-questions">`;
    wk.reflection.forEach(r=>{html += `<li>${escHtml(r)}</li>`;});
    html += `</ul>`;
    html += `<div class="prompt-format"><strong>Log:</strong> after reflecting on your time, summarize your thoughts in 3-5 sentences below.</div>`;
    box.innerHTML = html;
    box.style.display = 'block';
    return;
  }

  if(!a){
    box.innerHTML = `<div class="nb-placeholder">No specific instructions loaded yet for this assignment. Write freely below — your draft still saves and syncs.</div>`;
    box.style.display = 'block';
    return;
  }
  let html = '';
  html += `<div class="prompt-meta">`;
  if(a.due) html += `<span class="prompt-pill">📅 Due ${escHtml(a.due)}</span>`;
  if(a.points) html += `<span class="prompt-pill">${escHtml(a.points)}</span>`;
  html += `</div>`;
  html += `<div class="prompt-instructions">${escHtml(a.instructions)}</div>`;

  if(a.sections){
    a.sections.forEach(s=>{
      html += `<div class="prompt-section-heading">${escHtml(s.heading)}</div>`;
      html += `<div class="prompt-instructions">${escHtml(s.body)}</div>`;
      if(s.questions){
        html += `<ul class="prompt-questions">`;
        s.questions.forEach(q=>{html += `<li>${escHtml(q)}</li>`;});
        html += `</ul>`;
      }
      if(s.pageCount) html += `<div class="prompt-pagecount">Page count: ${escHtml(s.pageCount)}</div>`;
    });
  }

  if(a.questions){
    html += `<ul class="prompt-questions">`;
    a.questions.forEach(q=>{html += `<li>${escHtml(q)}</li>`;});
    html += `</ul>`;
  }

  const hasFillableQuestions = (a.questions && a.questions.length) || (a.sections && a.sections.some(s=>s.questions && s.questions.length));
  if(hasFillableQuestions){
    html += `<button class="filter-btn" style="background:var(--green);color:#fff;border:none;margin-top:4px;" onclick="useTemplate()">📋 Insert Questions into Draft</button>`;
  }

  if(a.requirements && a.requirements.length){
    html += `<div class="prompt-section-heading">Requirements</div>`;
    html += `<ul class="prompt-questions">`;
    a.requirements.forEach(r=>{html += `<li>${escHtml(r)}</li>`;});
    html += `</ul>`;
  }

  if(a.format){
    html += `<div class="prompt-format">Format: typed, 12-pt Times New Roman, 1" margins, double-spaced, page numbers in footer. Type your name at the top of page 1. Cite sources per the Canvas Citation & Formatting Guide. You may be downgraded for exceeding the page limit or not following format.</div>`;
    html += `<div class="prompt-format"><strong>Writing tip:</strong> Be personal (processed and responded to, not just information), thoughtful (synthesize material, connect to Scripture and other lectures), and specific (concrete real-life detail, not general statements). E.g. instead of "I have learned how conflict can be destructive," try "I see how I avoid and 'go silent' when my wife confronts me..."</div>`;
  }

  if(a.isMeeting){
    html += `<div class="prompt-format">This is a meeting-based assignment — use this space to draft your reflection notes or log entry afterward.</div>`;
  }

  box.innerHTML = html;
  box.style.display = 'block';
}

async function exportDraftToWord(){
  const title = document.getElementById('draft-page-title').textContent;
  const text = document.getElementById('draft-textarea').value;
  if(!text.trim()){
    alert('Your draft is empty — write something first!');
    return;
  }
  if(typeof docx === 'undefined'){
    alert('The Word export library failed to load. Check your internet connection and try again.');
    return;
  }
  try{
    const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;
    const paragraphs = [
      new Paragraph({
        heading: HeadingLevel.HEADING_1,
        children: [new TextRun(title)],
      }),
      new Paragraph({ children: [new TextRun("")] }),
    ];
    const blocks = text.split(/\n\s*\n/);
    blocks.forEach(block=>{
      const lines = block.split('\n');
      lines.forEach(line=>{
        paragraphs.push(new Paragraph({ children: [new TextRun(line)] }));
      });
      paragraphs.push(new Paragraph({ children: [new TextRun("")] }));
    });

    const doc = new Document({
      styles: {
        default: { document: { run: { font: "Calibri", size: 24 } } },
        paragraphStyles: [
          { id: "Heading1", name: "Heading 1", basedOn: "Normal", next: "Normal", quickFormat: true,
            run: { size: 32, bold: true, font: "Calibri" },
            paragraph: { spacing: { before: 240, after: 240 }, outlineLevel: 0 } },
        ]
      },
      sections: [{
        properties: {
          page: {
            size: { width: 12240, height: 15840 },
            margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
          }
        },
        children: paragraphs
      }]
    });

    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const safeName = title.replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '');
    a.download = safeName + '.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }catch(e){
    alert('Something went wrong creating the Word file: ' + e.message);
  }
}

function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(){
  const container=document.getElementById('weeks');
  container.innerHTML='';

  DATA.forEach(w=>{
    let wTotal=0,wDone=0,bodyHTML='';
    w.sections.forEach((s,si)=>{
      let secHTML='',hasVisible=false;
      s.tasks.forEach((task,ti)=>{
        const id=tid(w.id,si,ti);
        const isDone=!!checked[id];
        const show=(filter==='all')||(filter===s.type)||(filter==='remaining'&&!isDone);
        wTotal++;if(isDone)wDone++;
        if(!show)return;
        hasVisible=true;

        const pills=[
          `<span class="pill pill-time">${fmtTime(task.t)}</span>`,
          task.due?`<span class="pill pill-due">Due ${task.due}</span>`:'',
          task.pts?`<span class="pill pill-pts">${task.pts} pts</span>`:'',
        ].filter(Boolean).join('');

        // Action buttons
        let actions = '';
        if(task.lec){
          actions += `<a class="notes-link" href="#" onclick="event.preventDefault();openNotes(${task.lec},'${task.n.replace(/'/g,"\\'")}')">📓 Outline &amp; Notes</a>`;
        }
        if(task.lec && AUDIO[task.lec]){
          actions += `<a class="notes-link audio-link" href="${AUDIO[task.lec]}" target="_blank">▶ Play Audio</a>`;
        }
        if(task.draft){
          const did=tid(w.id,si,ti);
          actions += `<a class="notes-link draft-link" href="#" onclick="event.preventDefault();openDraft('${did}','${task.n.replace(/'/g,"\\'")}')">📝 Draft</a>`;
        }

        secHTML+=`<div class="task">
          <div class="task-check${isDone?' checked':''}" onclick="toggle('${id}',this)"></div>
          <div class="task-body">
            <div class="task-name${isDone?' done':''}">${task.n}</div>
            <div class="task-meta">${pills}</div>
            ${actions?`<div class="task-actions">${actions}</div>`:''}
          </div>
        </div>`;
      });
      if(hasVisible)bodyHTML+=`<div class="sec-lbl">${s.label}</div>${secHTML}`;
    });

    // Reading button for DBC weeks with required reading
    if(currentCourse === 'dbc' && DBC_READINGS[w.id] && (filter==='all'||filter==='read')){
      bodyHTML += `<div class="sec-lbl">Reading</div>
        <div class="task" onclick="openReading(${w.id})" style="cursor:pointer;">
          <div class="task-check" style="background:transparent;border-color:var(--green);display:flex;align-items:center;justify-content:center;color:var(--green);font-size:14px;">📚</div>
          <div class="task-body">
            <div class="task-name">Required Reading — Week ${w.id}</div>
            <div class="task-meta"><span class="pill pill-time">${DBC_READINGS[w.id].length} article${DBC_READINGS[w.id].length>1?'s':''}</span></div>
          </div>
        </div>`;
    }

    const pct=wTotal>0?Math.round(wDone/wTotal*100):0;
    const isOpen=openWeeks.has(w.id);
    const div=document.createElement('div');div.className='week';
    div.innerHTML=`
      <div class="week-hdr" onclick="toggleWeek(${w.id})">
        <div class="week-icon">W${w.id}</div>
        <div class="week-info"><div class="week-name">${w.title}</div><div class="week-dates">${w.dates}</div></div>
        <div class="week-right"><div class="week-pct" id="wpct-${w.id}">${pct}%</div><div class="week-count" id="wcnt-${w.id}">${wDone}/${wTotal} done</div></div>
        <div class="chev${isOpen?' open':''}" id="wc-${w.id}">›</div>
      </div>
      <div class="week-prog"><div class="week-prog-fill" id="wfill-${w.id}" style="width:${pct}%"></div></div>
      <div class="week-body${isOpen?' open':''}" id="wb-${w.id}">${bodyHTML||'<div class="empty">No items match this filter.</div>'}</div>`;
    container.appendChild(div);
  });
  updateStats();
}

function switchCourse(course, btn){
  if(currentCourse === course) return;
  currentCourse = course;
  LOCAL_KEY = course === 'hr' ? 'hrCourse_v1' : 'dbcCourse_v1';
  document.querySelectorAll('.course-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(course === 'hr'){
    DATA = HR_DATA;
    NOTEBOOK = HR_NOTEBOOK;
    AUDIO = HR_AUDIO;
    document.getElementById('course-title').textContent = 'Helping Relationships';
    document.getElementById('course-subtitle').textContent = 'CCEF Biblical Counseling · June–August 2025';
  } else {
    DATA = DBC_DATA;
    NOTEBOOK = DBC_NOTEBOOK;
    AUDIO = DBC_AUDIO;
    document.getElementById('course-title').textContent = 'Dynamics of Biblical Change';
    document.getElementById('course-subtitle').textContent = 'CCEF Biblical Counseling · 10 Weeks';
  }
  checked={};notesData={};filter='all';openWeeks=new Set([1]);
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.remove('active');if(b.textContent==='All')b.classList.add('active');});
  localLoad();
  loadFromCloud().then(()=>render());
}

  10: {
    thesis: "To understand people wisely, ministry must develop a practical theology of the \u201csituation\u201d: the heat is significant, concrete, and diverse, but it never finally determines the heart\u2019s response.",
    summary: "The lecture opens with Be Still, My Soul, a hymn of sorrow and trust by Katharina von Schlegel. Powlison notes that the hymn gives only one concrete loss, \u201cwhen dearest friends depart,\u201d while using many metaphors for suffering: a cross, thorny ways, waves and winds, and a dark valley. The hymn becomes a pastoral model. It is not primarily a hymn about sin but a hymn about sorrow. The singer speaks to her own soul, calling it to patience, stillness, and confidence in the Lord who remains faithful and leads through grief toward a joyful end. Powlison then introduces the need for a practical theology of the situation. Christian teaching often speaks richly about God, sin, and righteousness, but can neglect the actual world in which people live: losses, temptations, voices, bodies, suffering, enemies, memories, and hopes. He shows that different biblical books assume different situational backdrops. Ephesians addresses misleading counsel and false values; 1 Peter addresses being sinned against by those who misuse power; James addresses various trials such as poverty, sickness, and interpersonal conflict. The central image is the cup illustration. When a cup is struck, tilted, or squeezed, what spills out matters. The situation matters; it may provoke, pressure, or expose. But what comes out finally reveals what is already in the cup. The situation is significant, but not determinative.",
    flow: [
      "0:00-13:15 - Opening hymn and prayer: Be Still, My Soul frames the lecture around sorrow, loss,",
      "13:20-16:00 - Why the \u201csituation\u201d needs theology: people live in concrete settings, not abstract",
      "16:00-30:00 - Biblical backdrops: Ephesians, 1 Peter, and James each portray different kinds of heat.",
      "31:00-38:30 - The cup illustration: pressure explains the occasion, but the contents explain what spills",
      "38:40-43:40 - The situation is significant, not determinative; past, present, and future all matter.",
      "43:50-58:30 - Diverse situational factors: culture, nurture, body, trauma, lies, general hardship, and",
      "58:30-1:02:51 - Pastoral patience: God works over years, decades, lifetimes, and even centuries in the",
    ],
    notes: [
      { heading: "1. The hymn teaches how sorrow speaks to faith", points: [
        "Be Still, My Soul is a hymn about suffering, not a hymn that explicitly names sin. Its one named circumstance is bereavement: \u201cwhen dearest friends depart.\u201d The hymn then expands that grief through general and metaphorical language so that many sufferers can find their own story in it. Powlison highlights the hymn\u2019s pastoral method: it addresses the soul directly. The singer does not merely describe sorrow; she counsels herself to be still, bear patiently, leave matters to God, and trust the Lord who remains faithful. The hymn uses Scripture-shaped images: a cross for anguish, thorny ways for a hard path, waves and winds for storm, and a dark valley for the valley of the shadow of death. These images invite sufferers to locate their hardship within God\u2019s care.",
      ]},
      { heading: "2. We need a practical theology of the situation", points: [
        "Powlison argues that Christian nurture often teaches about God, sin, and righteousness more clearly than it teaches about the concrete life context in which those realities are lived. Yet the Bible is never abstract or dislocated. It speaks into real times, places, dangers, losses, voices, bodies, relationships, and temptations. The situation is the stage on which faith, unbelief, love, fear, sin, and wisdom appear. A person\u2019s context does not explain the person finally, but it must be understood if ministry is to be wise, patient, and concrete.",
        "Lecture Notes: Understanding the Situation, Part 1",
      ]},
      { heading: "3. Different biblical books assume different kinds of heat", points: [
        "Ephesians addresses the situational pressure of falsehood. Its backdrop includes misleading counsel, empty words, winds of teaching, false values, and the devil as liar. This form of heat often works like fog: people may not come saying, \u201cI am deceived,\u201d but wise ministry learns to notice the voices and images shaping them. 1 Peter addresses pointed personal suffering: being wronged, reviled, intimidated, and oppressed by those who misuse power. The devil appears here as a devourer, the murderer behind human cruelty. This book is especially relevant when people are sinned against. James addresses \u201cvarious trials,\u201d including poverty, sickness, and interpersonal conflict. These are general hardships of life rather than only deception or abuse. James also exposes how our desires, pride, and conflict resonate with the devil\u2019s purposes. Powlison briefly connects Proverbs with the Ephesians pattern of voices and companions, and Psalms with the 1 Peter pattern of enemies, threats, and refuge. The point is pastoral: the same Bible gives different kinds of situational wisdom for different kinds of heat.",
      ]},
      { heading: "4. The cup illustration: pressure reveals contents", points: [
        "Powlison uses a cup of water to explain the relationship between the situation and the heart. If a cup is struck and water spills, the striking matters. But the reason water spills, rather than gasoline or orange juice, is that water was already in the cup. The situation may be the occasion, instrument, or pressure point. A betrayal, a lie, a sickness, a disability, or a loss can truly provoke and expose. But the final explanation of the response lies in what the person brings to that moment. This distinction protects two truths at once. The situation is significant; suffering, deception, abuse, and bodily weakness really matter. Yet the situation is not determinative; faith, love, fear, bitterness, courage, refuge, or unbelief reveal the person before God.",
        "Lecture Notes: Understanding the Situation, Part 1",
      ]},
      { heading: "5. The situation includes past, present, and future", points: [
        "Powlison pushes back against the modern tendency to treat the past as the only significant context. The remembered past matters, but so do the currently experienced present and the anticipated future. This is why the earlier example of a five-year-old anxious about a school play mattered. The feared situation had not yet happened, but the anticipated future was still powerful enough to shape her body, emotions, complaints, and desire to escape.",
      ]},
      { heading: "6. The situation is diverse", points: [
        "The heat includes many kinds of pressure: misleading cultural voices, personal betrayal, general hardship, poverty, sickness, conflict, bodily weakness, trauma, family patterns, social conditioning, and anticipated threats. Powlison warns against intellectual fads that overemphasize one kind of factor. The secular world often over-determines people by nature, nurture, biology, or trauma. Christians may react by underweighting the situation and becoming moralistic. Biblical wisdom refuses both errors. The body matters. Culture matters. Family history matters. Social mistreatment matters. But none of these removes the person from the active drama of faith, love, sin, fear, hope, refuge, repentance, and obedience.",
      ]},
      { heading: "7. Pastoral implications", points: [
        "Wise ministry chooses Scripture and counsel in view of the person\u2019s actual situation. Ephesians may be especially apt when false values and deceptive voices dominate. 1 Peter may be more apt where someone is being violated or oppressed. James may be apt where general trials, conflict, sickness, or poverty are in view. In severe suffering, the immediate sanctification issue may not first be the sufferer\u2019s internal response. In the case of a young child being harmed, the call may first fall on the community: protect, intervene, nurture, and embody mercy. Powlison closes with a long view of change. God is content to work in individuals over years and decades, and in the church over centuries. This patience frees ministry from quick fixes without lowering the call to faith, hope, love, and wisdom.",
        "Lecture Notes: Understanding the Situation, Part 1",

  13: {
    thesis: "James exposes the heart beneath ordinary trials and interpersonal conflict: worldly wisdom turns desires, ambitions, pleasures, pride, and judgment into wars and fightings, but the God who is generous giver, final judge, jealous lover, and purposeful sovereign gives more grace so His people can humble themselves, draw near, and become wise peacemakers.",
    summary: "The lecture begins with Be Thou My Vision, which gives the positive aim of biblical change. Powlison reminds students that looking honestly at sin and the heart is never an end in itself. The goal is a heart that has God as its vision, wisdom, treasure, protection, and hope. The main lecture turns to the book of James because James speaks broadly to the scattered people of God, teaches through both general patterns and concrete examples, and begins with the real hardships of daily life. \u201cVarious trials\u201d include money pressure, differences of wealth and status, illness, and strained relationships. Powlison then focuses on James 3:13-4:12. This passage contrasts the beautiful life of wisdom from above with the disorder created by bitter jealousy and selfish ambition. James\u2019s language about quarrels and fights is broader than anger; conflict may include aggression, fear, appeasement, withdrawal, alliance-building, gossip, and judgment. The core pastoral movement is from blaming the heat to opening the books of the heart. James says wars and fightings arise from passions at war within us. He exposes bad zeal, selfish ambition, cravings, pleasures, worldliness, pride, demonic resemblance, double-mindedness, and the God-playing that judges one\u2019s neighbor. The turning point is James 4:6: \u201cBut He gives more grace.\u201d God does not merely diagnose the heart; He gives wisdom and grace. Powlison presents God as generous giver, fair and final judge, jealous lover of His people, and purposeful sovereign. God\u2019s holy jealousy is not petty possessiveness but intense love for His children\u2019s true welfare and loyal love. The lecture closes by tracing this grace through the whole Bible: the blessing of Numbers 6, the life of David, the Psalms, Isaiah 55, and ultimately Jesus Christ, full of grace and truth. Christ is for us, before us, and in us, forming His people to become grace-givers in the very relationships where conflict once ruled.",

      "33:40-41:25 - Question 2 - the thorns: conflict shows itself through poisoned speech, disorder, dirty hands, quarrels,",
      "41:25-58:55 - Question 3 - the heart: James opens the books and exposes bitter zeal, selfish ambition, cravings,",
      "58:55-1:13:55 - Question 5 - God gives more grace: James reveals God as generous giver, final judge, jealous lover, and",

    notes: [
      { heading: "1. The opening hymn gives the positive goal of heart change", points: [
        "\uf0b7 The lecture opens with Be Thou My Vision because biblical self-examination is never meant to terminate on the self. The goal is a heart that loves, worships, seeks, and serves God. \uf0b7 Powlison describes the hymn as a kind of submissive imperative: believers ask God to be their vision, wisdom, presence, shield, and treasure, while yielding themselves to His glory and love. \uf0b7 The hymn also exposes idolatry by contrast. If riches or human approval become the ruling vision, they function as false wisdom, false light, false security, and false refuge. \uf0b7 This prepares the class to examine the heart not morbidly but worshipfully: the turn from God is the mirror image of the turn back to God.",
      ]},
      { heading: "2. James is a uniquely practical book for biblical change", points: [
        "\uf0b7 James addresses the twelve tribes in the dispersion, which Powlison reads as a wide address to the scattered, recovered people of God from all nations. \uf0b7 The letter repeatedly moves from a general paradigm to concrete examples. It names broad categories, then shows how those categories appear in ordinary life. \uf0b7 This makes James pastorally useful because each example invites personal application: even when the specific example is not our own, the larger pattern is.",
      ]},
      { heading: "3. \u201cVarious trials\u201d are ordinary contexts where wisdom or folly appears", points: [
        "\uf0b7 James begins with general life hardships: various trials, difficulties, limitations, and troubles. \uf0b7 Counting trials as joy only makes sense because God places a larger purpose around His people\u2019s lives. He is at work to produce steadfastness, maturity, wisdom, and faith. \uf0b7 Powlison highlights James\u2019s gentle wording: \u201cIf any of you lacks wisdom\u201d means, in plain terms, that all of us discover folly under pressure. \uf0b7 The book emphasizes God as generous giver. He gives wisdom and grace without reproaching His people for their need.",
      ]},
      { heading: "4. James gives concrete examples of the heat", points: [
        "\uf0b7 Money pressure appears throughout the letter. Poverty, trying to make ends meet, and the fragility of financial life are among the most basic human hardships. \uf0b7 James also addresses the differences created by money, power, and status. Rich and poor, strong and weak, honored and dishonored stand eye to eye before God. \uf0b7 Interpersonal conflict is another central form of heat. James names frayed relationships, hostile words, gossip, judgment, and speaking against a brother or sister. \uf0b7 Later in the letter, illness also appears as another form of common human vulnerability.",
        "Lecture Notes: Practical Application: James, Part 1",

      { heading: "5. James 3:13-4:12 contrasts two wisdoms", points: [

      { heading: "6. Conflict is broader than anger", points: [
        "\uf0b7 Powlison notes that James says wars and fightings rather than simply anger. Anger is often central, but conflict includes more than one emotion or strategy. \uf0b7 A person at war may attack, fear, appease, withdraw, build allies, use propaganda, or run. In a family conflict, one person may be dominated by hostility while another is dominated by fear. \uf0b7 This matters pastorally because conflict cannot be reduced to \u201can anger problem.\u201d James\u2019s language gives room to describe the whole concrete pattern of war-making.",

      { heading: "7. The heart question opens the books", points: [
        "\uf0b7 When people are asked why they are upset, they naturally point to the heat: the other person, the situation, the provocation, or the hardship. \uf0b7 James asks a deeper question: What causes quarrels and fights among you? His answer is not finally the other person but the passions at war within us. \uf0b7 Powlison uses the image of two closed books colliding. Each book blames the other, but James opens the books and shows what is written inside. \uf0b7 If we participate in the war, we are agents in the war. The issue is not denying the other person\u2019s sin but seeing our own heart before God.",

      { heading: "8. James exposes several angles on sinful motivation", points: [

  14: {

    summary: "Powlison begins by returning to Question 4, the issue of consequences. James speaks with ultimate seriousness: proud, adulterous, self-exalting life meets God\u2019s opposition, and sin gives birth to death. These final realities also cast shadows in daily life whenever relationships chill, trust breaks, or conflict grows. The lecture then turns to Question 6, the new heart. Scripture does not only make the bad vivid; it makes the good vivid. James names the root of a beautiful life as the meekness of wisdom: strength, desire, will, and capacity brought under the reign, voice, and help of the living God. Powlison emphasizes that repentance and faith are living transactions with God. James 4:6-10 does not give abstract ideals but concrete movements: humble yourself, submit to God, resist the devil, draw near, cleanse your hands, purify your heart, mourn over sin, and receive the Lord\u2019s lifting grace. The lecture also warns against pastoral boilerplate. Even true emphases such as the cross and grace of Christ can become dull code if used mechanically. Wise pastoral care brings the many-sided revelation of God - His judgment, jealousy, mercy, blessing, nearness, and cross - to the specific need of a specific person. Question 7 turns to the visible fruit of wisdom from above. Powlison highlights peacemaking graces such as purity, peaceableness, gentleness, openness to reason, mercy, good fruits, impartiality, and sincerity. Peacemaking may require constructive conflict, but it never becomes destructive war-making. The closing movement considers Question 8, the blessing side of consequences. James points to the crown of life and the Lord\u2019s compassion and mercy, while ordinary stories of relational repair give small foretastes of life: weapons laid down, people coming out of the cave, conversation restored, Scripture shared, and joy beginning to grow.",

  15: {
    thesis: "Voices, images, role models, and cultural value systems are a powerful form of heat: they teach people to attach false meaning to real differences and to climb ladders to nowhere, but Scripture reorients the heart by revealing God as Creator, no-partiality Judge, refuge for the needy, and Redeemer who comes down to carry His people into true Christlike life.",
    summary: "The lecture opens with Amazing Grace, which gives a truthful interpretive voice for life. It tells the story of lostness, awakening, trouble, death, and everlasting joy, placing a believer\u2019s small life inside God\u2019s larger history. Powlison uses this to introduce the importance of the voices that teach people how to interpret their lives. The main topic is the heat of voices, images, and role models. Powlison argues that sociocultural influence is one of the most neglected parts of counseling. People live awash in value statements that teach them what is meaningful, shameful, successful, beautiful, important, or worthless. He describes many cultural influences as disinformation: facts or observations arranged so that people draw false conclusions and respond wrongly. Examples include alarmist news, political propaganda, media images, Christian subculture expectations, and even ministry strengths that become \u201cin-house idols.\u201d The lecture\u2019s central case study is physical appearance. A male-pattern-baldness infomercial illustrates a comic but serious false gospel, while the discussion of female beauty standards shows how perfection, body shape, wealth, lifestyle, race, and age create a no-win game of universal stigma. Powlison then broadens the issue to all human differences. People differ in wealth, power, ability, health, appearance, personality, age, education, opportunity, and gifts. The problem is that fallen hearts and cultures turn horizontal differences into vertical ladders of value and stigma. The final movement gives a biblical reorientation. God creates differences, shows no partiality, dignifies need, exposes the temporary nature of status, and gives one true ladder that goes somewhere: likeness to God. Christ Himself comes down into our plight, bears shame and guilt, and carries His people upward by mercy.",

        "\uf0b7 Powlison opens with Amazing Grace because the hymn tells a true story about human life: lostness, blindness, awakening, danger, toil, death, and eternal joy. \uf0b7 The hymn locates small and fleeting lives inside a larger history that begins before the foundation of the world and continues into eternity. \uf0b7 This matters for counseling because people do not merely need facts. They need a truthful interpretive voice that teaches them how to weigh hardship, purpose, mercy, hope, and despair. \uf0b7 No competing cultural voice gives this same truthful account of the unfolding pattern of a redeemed life before God.",

  16: {
    thesis: "Trustworthy voices, images, and role models are a powerful form of redemptive influence: through love, knowing, confidentiality, truth, Christ-centered wisdom, mutuality, and consistency, they invite honest speech and wise change, reflecting in human relationships the mercy and truth of the living God.",
    summary: "This lecture reverses the previous discussion of misleading voices, false images, and ladders to nowhere. Powlison now asks what it looks like when voices, images, and role models teach people how to live wisely and orient them toward true value, good, truth, and Christlike purpose. He intentionally begins from the bottom up, using student papers on the question, Who do I trust? The result is a lived theology of trust: ordinary relationships reveal what Scripture teaches about love, knowledge, confidentiality, truth, and wisdom. The papers show that trustworthy care most often appears in ordinary relationships: spouses, friends, parents, family members, pastors, mentors, coworkers, counselors, and therapists. Formal counseling matters, but much ministry happens through the normal fabric of life in the body of Christ. Trust can be easy where reliable love has been present, or difficult where a person has been hurt, rejected, used, or self-protective. Powlison repeatedly connects wise human trust to deeper trust in the Lord, who alone is finally and fully trustworthy. The central qualities that make people trustworthy are common ground, active love, being for the other person, forgiveness, deep knowledge, attentive listening, confidentiality, safe relational space, truth in love, Christ-centered counsel, prayer, humility, mutuality, and consistency over time. Powlison finally connects these qualities to the counseling process: walk, love, know, speak, and do. The struggler implicitly asks, Do I trust you? Will I be honest? Will I listen? Will I embrace Christ's purposes? The lecture closes by asking whether we trust God this honestly and whether we are becoming trustworthy for others.",

      { heading: "1. The lecture reverses the previous discussion of false voices", points: [

      { heading: "2. Powlison works from life up toward Scripture", points: [
        "\uf0b7 Rather than beginning with abstract principles and then applying them, Powlison intentionally starts from concrete human experience and then presses upward toward biblical truth. \uf0b7 He notes that Scripture itself often works this way: creation is described from the point of view of human life, and redemption unfolds in the midst of real-world trouble. \uf0b7 This bottom-up method does not replace Scripture. It helps students recognize that what makes real relationships trustworthy is precisely what Scripture teaches about love, wisdom, and Christlike care. \uf0b7 The result is a pastoral theology that is not thin or formulaic. It has the color, texture, and specificity of lived relationships.",

      { heading: "4. Trust may be easy, difficult, or rebuilt by grace", points: [
        "\uf0b7 Some students immediately knew whom they trusted because they had long experienced steady, caring, faithful relationships. \uf0b7 Others described trust as difficult because they had been hurt, rejected, used, abused, or disappointed. Some carried cynicism, fear of rejection, or self-protective control. \uf0b7 Powlison highlights the connection between trusting God and learning to trust people wisely. Trust in the Lord can rebuild the capacity to move toward others rather than flinching, hiding, or running away.",

      { heading: "5. Common ground often opens the door to trust", points: [
        "\uf0b7 Trust often begins in shared life: family, marriage, friendship, school, roommate situations, church, ministry, or a common history of suffering and faith. \uf0b7 Some described common interests in arts, culture, college fellowship, shared Christian background, or mutual experiences of church hurt and restored faith. \uf0b7 Common ground is not enough by itself, but it provides the setting in which trust can grow through repeated experiences of love, honesty, and reliability. \uf0b7 In counseling and ministry, common ground helps establish initial contact, but the deeper question remains whether the helper is actually trustworthy.",

      { heading: "6. Love is the central reason people trust", points: [
        "\uf0b7 The most common theme was simple and profound: I know he loves me, or I know she loves me. \uf0b7 This love is active. It pursues, notices, asks, cares, reads tone of voice, gives time, seeks the other person's good, and communicates, I am on your side. \uf0b7 Trusted love has redemptive patience. It forgives wrongs, does not keep grudges, keeps moving toward the person, and remains committed even when the other person is struggling or self-destructive. \uf0b7 Powlison notes that these are living pictures of the redemptive humanity of Christ: mercy, pursuit, patience, tenderness, and committed love toward sinners and sufferers.",

      { heading: "7. Trustworthy people know, listen, and understand", points: [
        "\uf0b7 People trust those who know them deeply and seek to know them better. Many students wrote, She knows me, he understands me, or she knows me better than I know myself. \uf0b7 Listening is central to this knowledge. Trusted people have a great ear, listen intently, ask good questions, and try to understand even when the speaker is confused or irrational. \uf0b7 Good listening is not passive technique. It is loving attention that pursues real knowledge of another person for that person's good. \uf0b7 Powlison connects this to God's own knowledge of His people. Human relationships are partial but real reflections of being known and loved before God.",

      { heading: "8. Trust requires safety and confidentiality", points: [
        "\uf0b7 Many students emphasized that the trusted person keeps confidences and does not gossip. \uf0b7 A safe place means a person can speak without fear of contempt, public exposure, judgmentalism, or betrayal. \uf0b7 This does not mean confidentiality is absolute. Serious criminal acts or unrepentant destructive sin may require loving disclosure. But most pastoral moments call for discretion and protection. \uf0b7 Trustworthy ministry shields another person's reputation rather than using their weakness for power, curiosity, gossip, or self-importance.",

        "\uf0b7 The trusted people in the papers were not merely accepting listeners. They clarified error, called out sin, confronted, admonished, asked hard questions, and tackled hard issues. \uf0b7 The key is the combination: no rejection, contempt, or harsh judgment - yet real honesty. This is Ephesians 4:15 lived out as truth spoken in love. \uf0b7 People trust correction when they know the speaker is for them, knows them, keeps confidences, and seeks their good. \uf0b7 A trustworthy person can say what is hard to hear because the relationship has already communicated mercy, patience, and commitment.",
      ]},
      { heading: "10. Christ-centeredness and mutuality deepen trust", points: [
        "\uf0b7 Many students said the trusted person points them to Christ, loves Scripture, prays, walks humbly with God, and offers counsel grounded in biblical truth.",
        "Lecture Notes: Influences of the Heart, Part 2",
        "\uf0b7 This is not detached expertise. The trusted person is often open, human, willing to ask forgiveness, able to weep or laugh, and ready to receive feedback. \uf0b7 Powlison resists the image of the counselor as omnicompetent guru. Even formal counseling benefits from a mutual corrective dynamic: What am I missing? What is helping? What is not helping? \uf0b7 Mutuality does not erase roles, but it keeps ministry relational, humble, and human rather than clinical, controlling, or abstract.",

  17: {
    thesis: "The heart names the vertical dimension of human life before God: what we love, fear, trust, worship, crave, and serve. Scripture exposes desires and fears as the ruling God-substitutes behind sinful behavior, but redemption in Christ changes not only what people do, but what they want.",
    summary: "Powlison begins with Joy to the World to place sin, sorrows, thorns, and the curse inside the larger story of Christ's present reign and final blessing. This guards self-counseling from collapsing into introspection and keeps the focus on the living Redeemer. The lecture shifts from the heat of life to the heart. Circumstances matter and must be taken seriously, but they are not causative. What comes out of a person flows from the heart, the vertical dimension of worship, trust, fear, love, and desire before God. Powlison then focuses on desire language - lusts, cravings, demands, felt needs, and I want. Desire is helpful because it becomes concrete: what did you want, fear, protect, or demand in the moment? Many desires are for good things: marriage faithfulness, children who follow the Lord, friendship, health, financial stability, or being understood. The evil is often not in the object itself, but in wanting it too much, so that a gift becomes a ruler. The lecture stresses the deceitfulness and complexity of desires. One desire can produce many outward sins, and one outward sin can be driven by many different desires. Wise ministry therefore probes carefully rather than assuming motives. Powlison closes by insisting that desires can change. Redemption is not only behavior management; the Holy Spirit reorients what people love and seek. The old cravings still fight, but a new affection in Christ can displace them.",
    flow: [
      "0:00-8:54 - Opening hymn and prayer: Joy to the World frames sin and suffering inside Christ's reigning mercy, His",
      "8:54-14:24 - The heart as the main focus: the semester has often entered through the heat, but the situation is",
      "14:24-24:52 - Desire language: Powlison explains lust, craving, demand, felt need, and I want as vivid biblical ways to",
      "24:52-35:14 - Good desires can become ruling desires: the evil is often not the object wanted, but that it is wanted too",
      "35:14-43:53 - Why people do not see it: desires are deceitful, secular psychologies misread them, and sin often",
      "43:53-49:31 - Heart as relational metaphor: the heart names the vertical dimension - what we worship, love, fear,",

      "1:01:31-1:09:57 - Questions about motivation: people have multiple lusts, behavior reveals inordinate desire, only God",
      "1:09:57-1:18:27 - Can desires change? Powlison argues yes. Redemption renews what people want, reorients fear of",

    notes: [
      { heading: "1. Joy to the World locates sin inside the reign of Christ", points: [
        "\uf0b7 The lecture opens with Joy to the World, not merely as a Christmas carol, but as a comprehensive hymn about Christ's present reign, His mercy, and the final reach of His blessing. \uf0b7 Powlison notes that the hymn includes sin, sorrows, thorns, and the curse, but it places them inside the larger reality that the Savior reigns and comes to make His blessings flow. \uf0b7 This guards self-counseling from unhealthy tunnel vision. The point is not to become preoccupied with hurt, failure, guilt, or introspection, but to turn outward toward Christ. \uf0b7 The prayer that follows names both human frailty and God's mercy: people are dust, vulnerable, weak, blind, and prone to sin, yet God invades with light and life and completes what He begins.",
      ]},
      { heading: "2. The situation matters, but it does not cause sin", points: [
        "\uf0b7 Earlier lectures entered through the heat because people often begin by describing what is happening around them, and biblical ministry wisely meets them there. \uf0b7 Powlison now clarifies that the heat is significant but not determinative. It pressures, reveals, tempts, and occasions response, but it does not create the moral direction of the person. \uf0b7 From the earthly side of human experience, life and death flow out of the heart. Chesterton's answer to the world's problem - I am - captures the biblical insight that the deepest trouble is within people, not merely around them. \uf0b7 The familiar thorn bush and fruit tree picture becomes shorthand for foolishness and wisdom, sinful reaction and righteous response, hatred and love, laziness and diligence, all with both vertical and horizontal dimensions.",
      ]},
      { heading: "3. The two great commandments expose the heart", points: [
        "\uf0b7 Powlison treats the law of God as the great mirror for the heart. The first commandment asks whom or what a person loves; the second asks how that love is lived toward others. \uf0b7 The X-ray questions are many ways of asking the same basic question: what masters you, rules you, controls you, or stands in the control room of your life? \uf0b7 No single diagnostic term should become a boilerplate answer. Unbelief, idolatry, false love, pride, fear of man, craving, trust, refuge, and worship each name real angles on the same vertical struggle. \uf0b7 The goal is pastoral flexibility: to understand the concept behind the terms and use the biblical doorway that best illumines the actual person and situation.",
      ]},
      { heading: "4. Desire language gives specificity to the heart", points: [
        "\uf0b7 Powlison focuses especially on desire, lust, craving, demand, felt need, and I want. These terms reveal the hijackers of the heart because desires have objects. \uf0b7 Unbelief erases God, pride exalts the self, and fear of man exalts others. Desire language lets the pastor ask the concrete question: what exactly do you want? \uf0b7 In conflict, that question almost always exposes something important. People fight because there is something they want, expect, protect, fear losing, or demand from another person. \uf0b7 This is why James 4 is so radical. It does not explain conflict first by the other person, but by the passions and desires that wage war within the person.",
        "Lecture Notes: Sin and the Heart",
      ]},
      { heading: "5. Scripture repeatedly links desires to behavior and consequences", points: [
        "\uf0b7 Galatians 5 contrasts the desires of the flesh with the desires of the Spirit, and then links each lordship to visible works or fruit. \uf0b7 Titus 2 says that grace trains believers to renounce ungodliness and worldly passions and to live self-controlled, upright, and godly lives in the present age. \uf0b7 2 Timothy 2:22 calls believers to flee youthful passions. Powlison expands this beyond sexual temptation to include the obvious, urgent, driving desires that often dominate young people and still operate in adults. \uf0b7 James 1 gives the heart-to-hands-to-death pattern: a person is lured by desire; desire gives birth to sin; sin brings forth death. Romans 13 similarly calls believers to cast off works of darkness and make no provision for the flesh.",
      ]},
      { heading: "6. Good desires become evil when they become inordinate", points: [
        "\uf0b7 A major pastoral question is why apparently good desires can wreck people: wanting friendship, a spouse's love, children who follow the Lord, health, a job, or financial stability. \uf0b7 Powlison paraphrases Calvin: the evil in our desires is often not what we want, but that we want it too much. \uf0b7 This distinction explains why two parents can both want their children to turn out well, while one family becomes suspicious and domineering and another becomes loving, wise, and constructive. \uf0b7 The issue is the status of the desire. Natural affections become polluted lusts when they become ruling things that produce anxiety, anger, fear, obsession, manipulation, despair, escapism, or control.",
      ]},
      { heading: "7. The marriage case shows desire turning into control", points: [
        "\uf0b7 Powlison tells of a marriage where the wife had committed adultery, repented, and the couple had done months of hard rebuilding. \uf0b7 The husband had forgiven the past, but he remained tense, suspicious, and surveilling because he wanted to guarantee that betrayal would never happen again. \uf0b7 His cry - What is wrong with wanting my wife to love me? - illustrates the pastoral precision needed. Nothing is wrong with wanting fidelity; something goes wrong when the desire becomes ultimate and controlling. \uf0b7 The good desire for marital faithfulness had become an impossible demand to secure the future. That inordinate desire made him fearful, suspicious, and increasingly destructive.",
      ]},
      { heading: "8. Desires deceive and sin is often blind willfulness", points: [
        "\uf0b7 Powlison emphasizes Ephesians 4:22: lusts are deceitful. They do not announce themselves as deadly; they appear plausible, reasonable, and even righteous. \uf0b7 Secular psychologies and popular counseling systems often misread desires as needs, drives, instincts, or neutral appetites. They do not see the diseases of lust because they do not reckon with God. \uf0b7 The lecture draws on Augustine and Calvin to say that sin is not only conscious, deliberate malice. Much sin is blind willfulness: people stumble in the dark while not fully knowing what they are doing. \uf0b7 This keeps pastoral care from being naive or simplistic. People may fail despite good intentions, because their own desires have deceived and mastered them.",
      ]},
      { heading: "9. The heart is a relational category before God", points: [
        "\uf0b7 Powlison uses heart in a focused way as a metaphor for the vertical dimension, not merely as a psychological interior. \uf0b7 In the broader Bible, heart can name the whole inner life. In this lecture's model, heart especially names what a person is doing with God: worshiping, fearing, loving, trusting, taking refuge, wanting, and serving. \uf0b7 This matters because human desires are always with respect to God. A desire either moves with God's will or against Him: Thy will be done or my will be done. \uf0b7 Interpersonal problems are therefore never merely horizontal. A conflict with a spouse, child, friend, or church member also reveals what is happening vertically before God.",
      ]},
      { heading: "10. The lusts of the flesh are broader than sex, money, and power", points: [
        "\uf0b7 The phrase lust of the flesh can sound strange, but Powlison values it because it has not been fully co-opted by secular categories. \uf0b7 The danger is that Christians often narrow the term to sexual sin, or perhaps sex, money, and power. Scripture uses the category more broadly.",
        "Lecture Notes: Sin and the Heart",
        "\uf0b7 A lust of the flesh may be a desire for vindication, human approval, control, comfort, escape, being understood, being admired, being safe, or being proved right. \uf0b7 Fear of man is one form of lust of the flesh when a proper regard for others' opinions becomes monstrous and ruling.",

  18: {
    thesis: "Biblical sanctification is not God doing one part and believers doing another part, nor is it God acting while believers remain passive; the Holy Spirit works wholly in and through believers so that they actively abide, repent, pray, obey, bear fruit, wait on the Lord, and rejoice in the change He produces.",
    summary: "The lecture zooms in on the connection between question five and question six in the eight-question, three-trees model: the living water flowing from the cross into the heart, renewing allegiance, worship, desire, and response to the Lord. The speaker begins with a provocative question: when a Christian changes, how much of the work belongs to God and how much belongs to the believer? Several common answers capture partial truths: 100 percent God and 0 percent me, 50/50 cooperation, 90/10 dependence, or 10/90 human effort with divine help. The lecture argues that Scripture is best summarized by a 100/100 model. Christian growth is wholly God\u2019s work and wholly the believer\u2019s active response. The Holy Spirit does not bypass or replace the person; He changes the person so that new loves, new choices, new prayers, and new acts of obedience genuinely become the believer\u2019s own. John 15 provides the central biblical picture. The Father is the vinedresser, Christ is the true vine, and believers are branches. Branches bear fruit only by abiding in Christ, yet the fruit is truly borne by the branch. Pruning and cleansing are expressions of the Father\u2019s loving care and are ordered toward greater fruitfulness. The lecture then uses an ordinary witnessing example to show how the Spirit works organically through many strands: a sermon on God\u2019s mercy, encouragement at work, the sobering uncertainty of a mother\u2019s health, and devotional meditation on Psalm 1. The Spirit prepares the heart through ordinary providence and means of grace before fruit appears in a concrete moment. The final pastoral implications are practical: believers must not sit back and wait passively for God to change them, but neither should they treat change as self-powered moral effort. They actively wait, pray, repent, seek, obey, and press forward, and they may also take humble, thankful joy when the Spirit\u2019s work becomes visible in their own lives. Prepared from the uploaded transcript Lecture Notes: The Holy Spirit's Role in Sanctification",

    notes: [
      { heading: "1. The lecture connects question five to question six", points: [
        "\uf0b7 The lecture focuses on the place where God\u2019s redemptive work becomes personal and active in the heart. \uf0b7 Question five concerns who God is and what He is doing through Christ. Question six asks how the heart responds to Him in faith, allegiance, worship, loyalty, and love. \uf0b7 The \u201cliving water\u201d image helps frame the Spirit\u2019s work: Christ does not remain outside the person as an abstract doctrine; He moves into the heart, renewing the person at the deepest level. \uf0b7 Sanctification therefore cannot be reduced to better behavior. The Spirit changes what a person loves, wants, trusts, fears, prays, and pursues.",

  6: {
    thesis: "Life in God's house has real content — discerning life from death, good from better, and the devices of Satan — and as wisdom matures it grows ever more discriminating, personal, and outward-bound into the wise conversations we have with others.",

  7: {
    thesis: "Before we can know a person, we must first pursue them — taking the initiative in love the way God himself has relentlessly pursued us — and then we move into truly knowing them as individuals, which is itself one of the deep pleasures of life in God's house.",
    summary: "Welch introduces the two-part model of care (knowing the person, knowing what God says) but prefaces it with an essential first move: pursuit. Counseling tends to be responsive (people come to us), but normal life and ministry require us to initiate, following God's own pattern of pursuing Adam and Eve out of the garden, Cain, and ultimately all of humanity (Hosea 2's picture of God caring for unfaithful Gomer). Welch illustrates pursuit with his grandson welcoming a lonely new student at recess, and with his own experience of finding a fully-engaged church where 'there was no one to pursue' because everyone was already pursuing each other. He then begins 'knowing the person' by emphasizing that we are not just a corporate 'we' but an individual 'I' known intimately by God (Psalm 139, the Good Shepherd, Jesus with Nathanael and the Samaritan woman) — and that being known is a universal human pleasure, illustrated by Welch's wife's daily 'tell me everything' ritual with their daughter and grandchildren, and a sobering story about a man who felt more accurately understood by a secular diagnosis than by his own church community.",
    flow: [
      "Transition: before 'knowing people,' we must first 'pursue as we have been pursued.'",
      "Contrast: professional counseling is responsive; church life calls us to take the initiative.",
      "The biblical story of pursuit: God follows Adam and Eve out of the garden, pursues Cain, walks with Enoch, and is identified in Hosea 2:8 as caring for unfaithful Gomer even while she was with other men.",
      "1 John 4:19 — we love because He first loved us; pursuit is the nature of love itself.",
      "Story: Welch's fourth-grade grandson welcomes a lonely new Ukrainian student at recess.",
      "Story: a church gathering where 'there was no one to pursue' because everyone was already engaged — described as 'heavenly.'",
      "Transition into 'knowing the person': we are not only a corporate 'we' but also an individual 'I,' known and crafted by God (Psalm 139, the Good Shepherd image).",
      "Jesus knowing individuals: Nathanael under the fig tree (John 1), the Samaritan woman at the well (John 4) — both report feeling fully known.",
      "1 Corinthians 13:12 — Paul's anticipation of being fully known as he is now known in part.",
      "Story: Welch's wife and her daily 'tell me everything' ritual — the natural human pleasure of being known.",
      "Story: a man who felt more accurately understood by a secular ADHD diagnosis than by years in the church — a caution about what it means to truly know someone.",
      "Story: a father and his pre-teen daughter Lisa, learning together how to move past surface-level daily reports toward genuinely knowing each other.",
    ],
    notes: [
      { heading: "1. Pursuit precedes knowing — we move first", points: [
        "Counseling, as Welch experiences it professionally, tends to be reactive — people call, make appointments, seek him out. Church life works differently: we are called to pursue.",
        "Pursuit is grounded in how we ourselves have been treated: God follows Adam and Eve out of the garden rather than waiting for their return; He speaks to and protects Cain; Enoch 'walked with God.'",
        "Hosea 2:8 — even while Gomer (representing unfaithful Israel, and us) was living with other men, the Lord was the one quietly providing for her, even though she didn't recognize it.",
      ]},
      { heading: "2. Love itself moves first", points: [
        "1 John 4:19: 'we love because he first loved us' — God acts and initiates, and we respond; this becomes the ground for our own initiative with others.",
        "Story: Welch's fourth-grade grandson, unprompted, invited a new, English-limited Ukrainian classmate to play at recess — a small act that the new boy 'will remember for the rest of his life.'",
        "Story: a church gathering where Welch found 'no one to pursue' because every person was already engaged in conversation with someone else — he calls this experience 'heavenly.'",
      ]},
      { heading: "3. We are known as individuals, not merely as a corporate body", points: [
        "We belong to a corporate identity (family, church, royal priesthood) but Scripture equally emphasizes the individual 'I' — God knows us by name, crafted each of us, and has specific compassion for each one (Psalm 139).",
        "The Good Shepherd image: He watches the flock as a whole but specifically notices and carries the vulnerable individual lamb.",
        "John 1: Jesus tells Nathanael 'I saw you under the fig tree' — a remark that could only be said meaningfully to that one person.",
        "John 4: the Samaritan woman's testimony after her conversation with Jesus — 'he told me all I ever did' — captures the experience of feeling completely known.",
      ]},
      { heading: "4. Being known is a universal human pleasure", points: [
        "1 Corinthians 13:12 — Paul anticipates fully knowing as he is fully known; this is part of the believer's hope, not just a counseling technique.",
        "Story: Welch's wife's daily ritual of asking their daughter 'tell me everything' about her day — described as a mutual delight, not a chore.",
        "Welch reflects on saying to his own wife that she is 'a servant of God' (a title shared with Moses and Joshua) as an attempt to know and honor her at a deeper level than routine affirmation.",
      ]},
      { heading: "5. Caution: being known well matters more than labels", points: [

      { heading: "6. Practicing 'knowing' with family — the Lisa story", points: [

      "With someone close to you, has your knowledge of them grown recently, or has it gone stagnant?",

  8: {
    thesis: "Beneath every person's circumstances lies the human heart — a place of real depth where natural desires for life and love operate, and learning to move from circumstances to the heart, and to recognize the moral direction of those desires, is essential to truly knowing a person.",

    flow: [
      "Opening illustrations: Sherry drawing out a reluctant granddaughter by sharing her own story first; the family dog Smalls sensing and comforting a sick grandson — animal empathy as illustration.",
      "Moving from circumstances to small talk that opens the heart: contrasting 'my coach was an Olympian' with 'what did you enjoy about gymnastics?'",
      "Introducing the heart: 'the real you who lives before God' — the things most dear, most loved, most feared.",
      "Feature 1: the heart has depth (Jeremiah 17's bush with hidden roots, Proverbs 20's deep well, 1 Corinthians 2:10-11 on the spirit knowing a person's own thoughts).",
      "Feature 2: the heart's basic activity is desire — what you want, love, trust, fear, worship.",
      "Emotions as the window into desire: fear (desire at risk), anger (desire fighting for itself), depression (desire lost), shame (desire for community lost), joy (desire satisfied).",

      { heading: "1. From circumstances to the heart: better small talk", points: [

  9: {
    thesis: "At the deepest level, the human heart lives before God, and every act of disobedience or obedience is ultimately a response to Him — which means that wise care, when it sees suffering or sin clearly, has an unprecedented opportunity to trace it back to its true root and to speak directly of Christ.",
    summary: "Welch moves to the third and deepest layer of the heart: that we live coram Deo, before the face of God, whether we recognize it or not. Drawing on Ephesians 4:6, Augustine's restless heart, and Romans 1:21, he shows that sin clouds our awareness of God without erasing the fact that everyone already lives in relationship to Him. Crucially, our access to this deepest layer often opens precisely when life isn't working — illustrated by neighbors who kept their distance from the Welches' overt faith until hardship hit, then welcomed prayer every time. Two main applications follow: first, when we see evidence of Christ's work in someone (even an unbeliever's specific act of obedience or faith), we name it and give thanks, following Paul's pattern in his letters; second, when we see disobedience, we trace it to its relational root rather than stopping at the behavior — illustrated by Welch's own confession to his wife reframed as betrayal of God, and a man who could not answer why he believed he had a right to be angry at God himself. The lecture closes by reframing 'talking about Jesus' (rather than mere morality) as the most realistic, profound thing we can do with anyone, and connects this to the deep satisfaction of corporate worship and gratitude.",
    flow: [
      "Transition: at the heart's deepest level, we live before God — this is true of every person who has ever lived.",
      "Ephesians 4:6 and Augustine's Confessions ('our heart is restless until it finds its rest in you') establish that life before God is the human condition.",
      "Sin clouds awareness of God (illustrated by Adam and Eve's shifted focus to shame before each other rather than before God) even though Romans 1:21 and Psalm 19 affirm that everyone already knows Him.",
      "Access point: people's awareness of God becomes less suppressed exactly when life isn't working — illustrated by initially distant, then prayer-receptive, secular neighbors.",
      "Application 1: when we see Christ's work in someone, we name it and give thanks, following Paul's pattern (1 Corinthians 1:4-5).",
      "Application 2: when we see disobedience, we trace it to its root in the person's relationship with God, not just the behavior — illustrated by Welch's reframed confession to his wife and a man's unexamined anger at God.",
      "Talking about Jesus directly (not just 'being good') is identified as the most profound, realistic thing we can do with someone — illustrated by a church member's family devotions centered on Jesus rather than morality.",

    notes: [

      { heading: "3. Naming and giving thanks for evidence of Christ's work", points: [

        "Paul models this throughout his letters: 'I always thank God for you, because of the grace given you in Christ Jesus' (1 Corinthians 1) — even toward churches with real, serious problems.",

  19: {

  20: {
    thesis: "People living amid the chaos of complex problems need someone who can simplify their scattered details into a coherent, memorable story or image — a skill that mirrors how we come to understand Scripture itself, and one that, done well, gives a person more understanding of themselves, not less.",

    notes: [
      { heading: "1. The skill: organizing chaos into a coherent story", points: [

  21: {
    thesis: "Beyond the content of what we say, the relationship undergirding our words — what professional counseling calls 'process' as distinct from 'content' — must itself be attended to, since the same true words can build up or fail to connect depending on whether they flow from a relationship of genuine, growing affection.",
    summary: "Welch introduces the distinction between content (the words spoken) and process (the relationship and manner in which they're spoken), borrowing useful vocabulary from professional counseling while grounding it biblically. He poses self-reflective questions (do you have growing affection for the person? are you trying to impress them? are you bored?) and other-directed questions (what does the person say after you speak — are they engaged, or did the conversation derail?). He illustrates extensively: a young man's question about marrying one of Welch's daughters reveals their mutual affection; a family meal devotional revealed in its content-only form as dead despite a fine biblical passage, contrasted with a more inviting, humility-laced introduction; a classroom example contrasting a content-only appeal ('it's important to understand') with a process-aware one ('how are you doing in this class?'); a marital example contrasting a content-only response to being hurt ('I didn't mean anything by it') with a process-aware one ('I am so sorry, could we talk about this more?'); and a preacher's public confession of preoccupation with his own reputation mid-sermon. The lecture closes with Paul's appeal in 2 Corinthians ('make room for us in your hearts') as a scriptural model of attending explicitly to relationship, not just teaching content.",
    flow: [
      "Introducing the distinction: content (the words/topic) versus process (the relationship and manner undergirding those words).",
      "Self-reflective questions: do you have growing affection for the person? Are you trying to impress them? Are you bored with the conversation?",
      "Story: a young man's question, 'would you let me marry one of your daughters?', revealing his sense of mutual, growing affection with Welch.",
      "Other-directed question: what does the person say after you speak — are they engaged and building on it, or did the conversation derail?",
      "Story: a family meal devotional, content-correct but relationally flat, contrasted with a more inviting, humility-laced introduction ('I am going to need your help on this one').",
      "Classroom illustration: 'it's important to understand what we are doing' (content) versus 'how are you doing in this class so far?' (process).",
      "Marital illustration: responding to 'I was hurt by what you said' with self-defense and explanation (content) versus immediate apology and invitation to talk more (process).",
      "Story: a preacher publicly confessing, mid-sermon, his preoccupation with his own reputation over an earlier illustration — modeling process-awareness from the pulpit.",
      "Scriptural anchor: Paul's appeal in 2 Corinthians ('make room for us in your hearts ... we would live or die with you') as relational appeal distinct from teaching content.",
      "Closing story: a pastor moved to tears mid-mediation between two quarreling congregants, modeling compassion as method.",
    ],
    notes: [
      { heading: "1. Defining content versus process", points: [
        "Content is the words spoken, the topic discussed — what a transcript would capture.",
        "Process is the relationship undergirding those words: tone, manner, mutual affection, and how the words are actually received — what a transcript alone would miss.",
        "Both true and good content can fail to land if the underlying relational process is amiss.",
      ]},
      { heading: "2. Self-reflective questions about process", points: [
        "Is there a growing affection for the person you're speaking with? Story: a young man's hypothetical question, 'would you let me marry one of your daughters?', revealed his sense that Welch's good opinion of his character mattered to him — evidence of mutual, growing affection.",
        "Are you trying to impress the person, making the conversation more about your own reputation than humble, loving help?",
        "Are you bored with the conversation? Boredom suggests both indifference to the person and a deficient sense of God's presence in the moment.",

      { heading: "3. Other-directed questions about process", points: [
        "What does the person say after you speak — do they engage on-topic, build on what you said, and pass it back, or does the conversation drift?",
        "If they're not attending to your agenda, the general rule is to follow them rather than insist on your own topic, since any path with them can still lead to Christ.",

      { heading: "4. Illustration: the family meal devotional", points: [

        "A more process-aware introduction — 'I am going to need your help on this one' — invites genuine participation by signaling shared need and humility rather than simply delivering an assignment.",

      { heading: "5. Illustration: classroom and marital examples", points: [

        "Marriage: responding to 'I was hurt by what you said' with 'I didn't mean anything by it' (content-only, historical, defensive — and conversation-killing) versus 'I am so sorry, the last thing I want is to hurt you — could we talk about this more?' (process-aware, relationally engaged, conversation-opening).",
      ]},
      { heading: "6. Illustration: a preacher's public process-awareness", points: [
        "Story: a preacher stopped his own sermon mid-stream to confess that he had become preoccupied with how a recent illustration would be received, asking forgiveness for prioritizing his reputation over his congregation — an unusually memorable, relationship-deepening moment precisely because it attended to process rather than only content.",

      { heading: "7. Scripture itself attends to process, not just content", points: [

        "Story: a pastor mediating a quarrel between two congregants fell silent and was found crying, simply saying, 'here are two people I love, and I watch them trying to destroy each other' — compassion itself functioning as method, potentially changing everything in the room.",

    terms: [

  22: {
    thesis: "Wise care will inevitably lead to moments of being thoroughly lost or befuddled, and the skill is not avoiding confusion but responding to it with humility, shared prayer, and a willingness to retrace the conversational map together rather than retreating into a confident-sounding but disconnected sermon.",
    summary: "Welch closes the 'knowing the person' section with a skill for handling the inevitable experience of being lost in a conversation — not knowing where to go next, what's most important, or how to respond. He shares his own early-career story of panicking when a counselee's words all seemed equally weighted, and his mistake of retreating into a 'safe' but disconnected mini-sermon on anxiety from Philippians 4 the moment a familiar word appeared. His proposed alternative: talk about the confusion together ('I am not sure what's most important — could you help me?'), pray together explicitly acknowledging the uncertainty, and get out a 'map' of where the conversation has been and currently stands, even a rough one, as a way of helping a person who also feels lost. He illustrates the map technique with a young man whose excitement about moving out had been undercut by unmet dreams, and closes by reframing uncertainty itself as a normal, even fruitful feature of ministry that calls forth deeper reliance on the Spirit rather than performed confidence.",

      "Alternative 2: pray together explicitly, naming the uncertainty and asking the Spirit for direction.",

    notes: [
      { heading: "1. The reality of getting lost", points: [
