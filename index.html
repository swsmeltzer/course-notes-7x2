  4: {
    thesis: "Biblical change comes through a living, relational turn to God that reorients the heart and produces specific love in ordinary situations, so even a focused 'laboratory' like Clyde's ethics committee — or a traffic jam — can reveal and transform the whole person.",
    summary: "This lecture finishes the opening case-study unit on Clyde by showing how one concrete part of a person's life can become a wise starting point for ministry. Powlison explains why Clyde's ethics committee was chosen as a counseling 'laboratory': it contained the same motives and reactions appearing elsewhere, but in a more contained and workable form. Psalm 40 becomes a central Scripture, holding together suffering, sin, God's promises, and the living act of crying out to God. Biblical change is not merely remembering true ideas or passively beholding Christ — it is relational: the person turns to the living God who speaks, acts, helps, forgives, and delivers. The lecture broadens to an eight-question framework: the first four describe the vicious circle (situation, reaction, motive, consequences), the final four describe the gracious circle (God's intervention, a living turn to Him, constructive response in love, and new consequences).",

    notes: [
      { heading: "1. Why start with the ethics committee?", points: [

      { heading: "2. Psalm 40 as a Scripture anchor", points: [

// ── Notes Panel ────────────────────────────────────────────
let activeTab = 'summary';

function openNotes(lecNum, taskName){
  panelLecNum = lecNum;
  // For DBC, look up the notebook key; for HR, use numeric key
  let title = taskName;
  if(currentCourse === 'hr'){
    const nb = NOTEBOOK[lecNum];
    if(nb) title = nb.title;
  } else {
    const key = DBC_LEC_KEYS[lecNum];
    if(key) title = key;
  }
  document.getElementById('panel-title').textContent = title;

  // Default tab is always Outline
  activeTab = 'outline';

  renderNotesContent(lecNum);
  document.getElementById('notes-page').classList.add('open');
  window.scrollTo(0,0);
}

function switchTab(tab){
  activeTab = tab;
  renderNotesContent(panelLecNum);
}

function renderNotesContent(lecNum){
  const sm = currentCourse === 'hr' ? SUMMARIES[lecNum] : null;
  const noteKey = 'lec-'+lecNum;
  const savedNote = notesData[noteKey] || '';

  // Tab bar
  // Check for detailed notes
  const det = (currentCourse === 'dbc') ? (DBC_DETAILED[lecNum] || null) : (HR_DETAILED[lecNum] || null);

  const tabs = `
    <div class="notes-tabs">
      <button class="notes-tab${activeTab==='outline'?' active':''}" onclick="switchTab('outline')">Outline</button>
      ${sm ? `<button class="notes-tab${activeTab==='summary'?' active':''}" onclick="switchTab('summary')">Summary</button>` : ''}
      ${det ? `<button class="notes-tab${activeTab==='detailed'?' active':''}" onclick="switchTab('detailed')">Detailed Notes</button>` : ''}
      <button class="notes-tab${activeTab==='mynotes'?' active':''}" onclick="switchTab('mynotes')">My Notes</button>
    </div>`;

  let body = '';

  if(activeTab === 'summary' && sm){
    body += `<div class="nb-section">`;
    body += `<div class="nb-section-heading">Overview</div>`;
    body += `<div class="nb-item">${escHtml(sm.overview)}</div>`;
    body += `</div>`;
    if(sm.points && sm.points.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Key Teaching Points</div>`;
      sm.points.forEach(p=>{body += `<div class="nb-item">• ${escHtml(p)}</div>`;});
      body += `</div>`;
    }
    if(sm.quotes && sm.quotes.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Key Quotes</div>`;
      sm.quotes.forEach(q=>{body += `<div class="nb-item scripture">${escHtml(q)}</div>`;});
      body += `</div>`;
    }
    if(sm.illustrations && sm.illustrations.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Illustrations & Stories</div>`;
      sm.illustrations.forEach(i=>{body += `<div class="nb-item">• ${escHtml(i)}</div>`;});
      body += `</div>`;
    }
    if(sm.scripture && sm.scripture.length){
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Scripture References</div>`;
      sm.scripture.forEach(s=>{body += `<div class="nb-item scripture">${escHtml(s)}</div>`;});
      body += `</div>`;
    }
  } else if(activeTab === 'detailed'){
    const det = (currentCourse === 'dbc') ? DBC_DETAILED[lecNum] : HR_DETAILED[lecNum];
    if(det){
      // Thesis
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Thesis</div>`;
      body += `<div class="nb-item scripture">${escHtml(det.thesis)}</div>`;
      body += `</div>`;
      // Executive Summary
      body += `<div class="nb-section">`;
      body += `<div class="nb-section-heading">Executive Summary</div>`;
      body += `<div class="nb-item">${escHtml(det.summary)}</div>`;
      body += `</div>`;
      // Lecture Flow
      if(det.flow && det.flow.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Lecture Flow</div>`;
        det.flow.forEach(f=>{body += `<div class="nb-item">• ${escHtml(f)}</div>`;});
        body += `</div>`;
      }
      // Detailed Notes
      if(det.notes && det.notes.length){
        det.notes.forEach(n=>{
          body += `<div class="nb-section">`;
          body += `<div class="nb-section-heading">${escHtml(n.heading)}</div>`;
          n.points.forEach(p=>{body += `<div class="nb-item">• ${escHtml(p)}</div>`;});
          body += `</div>`;
        });
      }
      // Key Terms
      if(det.terms && det.terms.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Key Terms</div>`;
        det.terms.forEach(t=>{body += `<div class="nb-item"><strong>${escHtml(t.term)}</strong> — ${escHtml(t.def)}</div>`;});
        body += `</div>`;
      }
      // Practical Takeaways
      if(det.takeaways && det.takeaways.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Practical Takeaways</div>`;
        det.takeaways.forEach(t=>{body += `<div class="nb-item">• ${escHtml(t)}</div>`;});
        body += `</div>`;
      }
      // Discussion Questions
      if(det.questions && det.questions.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Discussion Questions</div>`;
        det.questions.forEach((q,i)=>{body += `<div class="nb-item">${i+1}. ${escHtml(q)}</div>`;});
        body += `</div>`;
      }
    } else {
      body += `<div class="nb-placeholder">Detailed notes not yet available for this lecture.</div>`;
    }
    } else if(activeTab === 'outline'){
    if(currentCourse === 'hr'){
      // HR uses {sections: [{h, items}]} format
      const nb = NOTEBOOK[lecNum];
      if(nb && nb.sections.length){
        nb.sections.forEach(s=>{
          body += `<div class="nb-section">`;
          body += `<div class="nb-section-heading">${escHtml(s.h)}</div>`;
          if(s.items.length===0){
            body += `<div class="nb-placeholder">Fill in during lecture…</div>`;
          } else {
            s.items.forEach(item=>{
              const isScrip = item.includes('~') || item.includes('(ESV)') || item.includes('(NIV)');
              body += `<div class="nb-item${isScrip?' scripture':''}">${escHtml(item)}</div>`;
            });
          }
          body += `</div>`;
        });
      } else {
        body += `<div class="nb-placeholder">No outline available for this session.</div>`;
      }
    } else {
      // DBC uses DBC_NOTEBOOK["Lecture Title"] = [items] format
      const key = DBC_LEC_KEYS[lecNum];
      const items = key ? DBC_NOTEBOOK[key] : null;
      if(items && items.length){
        body += `<div class="nb-section">`;
        body += `<div class="nb-section-heading">Course Notebook Outline</div>`;
        items.forEach(item=>{
          const isScrip = item.includes('(ESV)') || item.includes('(NIV)') || item.includes('Psalm') || item.includes('Proverbs');
          body += `<div class="nb-item${isScrip?' scripture':''}">${escHtml(item)}</div>`;
        });
        body += `</div>`;
      } else {
        body += `<div class="nb-placeholder">No outline available for this session.</div>`;
      }
    }
  } else {
    // My Notes tab
    body += `<div class="notes-section">
      <div class="notes-label">
        My notes
        <span class="notes-saved" id="notes-saved-indicator">Saved ✓</span>
      </div>
      <textarea class="notes-area" id="notes-ta" placeholder="Type your notes here…" oninput="saveNote(${lecNum},this.value)">${escHtml(savedNote)}</textarea>
    </div>`;
  }

  document.getElementById('panel-body').innerHTML = tabs + body;
}

function closePanel(){
  document.getElementById('notes-page').classList.remove('open');
  panelLecNum = null;
}

function openReading(weekId){
  const articles = DBC_READINGS[weekId];
  document.getElementById('reading-page-title').textContent = `Week ${weekId} Reading`;
  let html = '';
  if(articles && articles.length){
    articles.forEach(art=>{
      html += `<div class="nb-section">`;
      html += `<div class="nb-section-heading">${escHtml(art.title)}</div>`;
      html += `<div class="nb-item" style="font-style:italic;color:var(--muted);margin-bottom:8px;">by ${escHtml(art.author)}</div>`;
      html += `<div class="nb-item scripture">${escHtml(art.thesis)}</div>`;
      html += `<div class="nb-item" style="margin-top:10px;"><strong>Summary</strong></div>`;
      html += `<div class="nb-item">${escHtml(art.summary)}</div>`;
      if(art.points && art.points.length){
        html += `<div class="nb-item" style="margin-top:10px;"><strong>Key Points</strong></div>`;
        art.points.forEach(p=>{html += `<div class="nb-item">• ${escHtml(p)}</div>`;});
      }
      if(art.takeaways && art.takeaways.length){
        html += `<div class="nb-item" style="margin-top:10px;"><strong>Takeaways</strong></div>`;
        art.takeaways.forEach(t=>{html += `<div class="nb-item">• ${escHtml(t)}</div>`;});
      }
      html += `</div>`;
    });
  } else {
    html = `<div class="nb-placeholder">No reading summaries available for this week yet.</div>`;
  }
  document.getElementById('reading-page-body').innerHTML = html;
  document.getElementById('reading-page').classList.add('open');
  window.scrollTo(0,0);
}

function closeReading(){
  document.getElementById('reading-page').classList.remove('open');
}

let noteTimer = null;
function saveNote(lecNum, val){
  notesData['lec-'+lecNum] = val;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(()=>{
    const ind = document.getElementById('notes-saved-indicator');
    if(ind){ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),2000);}
    scheduleSave();
  }, 800);
}

function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const container=document.getElementById('weeks');
  container.innerHTML='';

  DATA.forEach(w=>{
    let wTotal=0,wDone=0,bodyHTML='';
    w.sections.forEach((s,si)=>{
      let secHTML='',hasVisible=false;
      s.tasks.forEach((task,ti)=>{
        const id=tid(w.id,si,ti);
        const isDone=!!checked[id];
        const show=(filter==='all')||(filter===s.type)||(filter==='remaining'&&!isDone);
        wTotal++;if(isDone)wDone++;
        if(!show)return;
        hasVisible=true;

        const pills=[
          `<span class="pill pill-time">${fmtTime(task.t)}</span>`,
          task.due?`<span class="pill pill-due">Due ${task.due}</span>`:'',
          task.pts?`<span class="pill pill-pts">${task.pts} pts</span>`:'',
        ].filter(Boolean).join('');

        // Action buttons
        let actions = '';
        if(task.lec){
          actions += `<a class="notes-link" href="#" onclick="event.preventDefault();openNotes(${task.lec},'${task.n.replace(/'/g,"\\'")}')">📓 Outline &amp; Notes</a>`;
        }
        if(task.lec && AUDIO[task.lec]){
          actions += `<a class="notes-link audio-link" href="${AUDIO[task.lec]}" target="_blank">▶ Play Audio</a>`;
        }

        secHTML+=`<div class="task">
          <div class="task-check${isDone?' checked':''}" onclick="toggle('${id}',this)"></div>
          <div class="task-body">
            <div class="task-name${isDone?' done':''}">${task.n}</div>
            <div class="task-meta">${pills}</div>
            ${actions?`<div class="task-actions">${actions}</div>`:''}
          </div>
        </div>`;
      });
      if(hasVisible)bodyHTML+=`<div class="sec-lbl">${s.label}</div>${secHTML}`;
    });

    // Reading button for DBC weeks with required reading
    if(currentCourse === 'dbc' && DBC_READINGS[w.id] && (filter==='all'||filter==='read')){
      bodyHTML += `<div class="sec-lbl">Reading</div>
        <div class="task" onclick="openReading(${w.id})" style="cursor:pointer;">
          <div class="task-check" style="background:transparent;border-color:var(--green);display:flex;align-items:center;justify-content:center;color:var(--green);font-size:14px;">📚</div>
          <div class="task-body">
            <div class="task-name">Required Reading — Week ${w.id}</div>
            <div class="task-meta"><span class="pill pill-time">${DBC_READINGS[w.id].length} article${DBC_READINGS[w.id].length>1?'s':''}</span></div>
          </div>
        </div>`;
    }

    const pct=wTotal>0?Math.round(wDone/wTotal*100):0;
    const isOpen=openWeeks.has(w.id);
    const div=document.createElement('div');div.className='week';
    div.innerHTML=`
      <div class="week-hdr" onclick="toggleWeek(${w.id})">
        <div class="week-icon">W${w.id}</div>
        <div class="week-info"><div class="week-name">${w.title}</div><div class="week-dates">${w.dates}</div></div>
        <div class="week-right"><div class="week-pct" id="wpct-${w.id}">${pct}%</div><div class="week-count" id="wcnt-${w.id}">${wDone}/${wTotal} done</div></div>
        <div class="chev${isOpen?' open':''}" id="wc-${w.id}">›</div>
      </div>
      <div class="week-prog"><div class="week-prog-fill" id="wfill-${w.id}" style="width:${pct}%"></div></div>
      <div class="week-body${isOpen?' open':''}" id="wb-${w.id}">${bodyHTML||'<div class="empty">No items match this filter.</div>'}</div>`;
    container.appendChild(div);
  });
  updateStats();
}

  currentCourse = course;
  LOCAL_KEY = course === 'hr' ? 'hrCourse_v1' : 'dbcCourse_v1';
  document.querySelectorAll('.course-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

    document.getElementById('course-title').textContent = 'Helping Relationships';
    document.getElementById('course-subtitle').textContent = 'CCEF Biblical Counseling · June–August 2025';
  } else {
    DATA = DBC_DATA;
    NOTEBOOK = DBC_NOTEBOOK;
    AUDIO = DBC_AUDIO;
    document.getElementById('course-title').textContent = 'Dynamics of Biblical Change';
    document.getElementById('course-subtitle').textContent = 'CCEF Biblical Counseling · 10 Weeks';
  }
  checked={};notesData={};filter='all';openWeeks=new Set([1]);

  localLoad();
  loadFromCloud().then(()=>render());
}

  7: {
    thesis: "The \u201cheart\u201d in the course model is not merely the hidden or internal part of a person; it names the vertical dimension of life before God, and biblical change happens as that relationship is brought to Christ and reshaped into faithful horizontal fruit.",
    summary: "This short lecture clarifies how the eight questions and the three trees model map onto each other. The eight questions provide a linear diagnostic tool; the three trees picture gives the same framework in visual form. The key correction is that \u201cheart\u201d should not be read mainly as internal over against external. That distinction is often useful, but it is not the heart of the model. Instead, \u201cheart\u201d means vertical: the person\u2019s active relationship with the Lord. Fruit and thorns name the horizontal expressions of that Godward orientation toward people and the world. This protects counseling from becoming mere self-analysis or behavior management. The focus of change is the living relationship between a person and the Lord through the cross.",
    flow: [
      "0:02\u20131:23 - The eight questions and three trees model are introduced as two versions of one framework.",
      "1:23\u20133:25 - The lecture identifies the common confusion around heart, thorns, and fruit.",
      "3:25\u20136:21 - The central distinction is defined: vertical/horizontal, not merely internal/external.",
      "6:32\u201311:23 - Biblical and everyday examples show how the distinction works in practice.",
      "11:32\u201314:04 - The lecture explains why the nuance matters for real counseling and change.",
    ],
    notes: [
      { heading: "1. Two models, one framework", points: [
        "The lecture assumes students already know the eight questions and the three trees model.",
        "These tools are not alternatives. They are intended to \u201cperfectly map onto each other,\u201d though each has",
        "a different teaching advantage.",
        "The eight questions help students move step by step; the three trees model helps them see the flow of",
        "change as a whole.",
      ]},
      { heading: "2. The mapping problem", points: [
        "Question 2 corresponds to thorns: the sinful responses that come out in life.",
        "Question 3 corresponds to the heart turned away from the Lord: misplaced trust and false worship.",
        "Question 6 corresponds to the heart turned toward the Lord: faith, repentance, prayer, refuge, and",
        "trust.",
        "Question 7 corresponds to fruit: wise and loving responses that express renewed faith.",
        "The confusion comes when \u201cheart\u201d is treated as simply the inner world of thoughts and feelings.",
      ]},
      { heading: "3. Heart is a vertical category", points: [
        "The word heart in this model names the Godward dimension of life.",
        "It asks: What am I doing with the Lord? Am I trusting, seeking, hiding, accusing, ignoring, or turning",
        "toward Him?",
        "This means the model is fundamentally relational. It is not merely psychological.",
      ]},
      { heading: "4. Fruit and thorns are horizontal categories", points: [
        "Fruit and thorns describe how a person moves toward other people and the world.",
        "Horizontal responses may be visible actions, spoken words, silence, withdrawal, bitterness, lust,",
        "prayerful speech to another, or concrete love.",
        "The key question is not only \u201cCan I see it?\u201d but \u201cToward whom is this action directed?\u201d",
        "Lecture Notes: The \u201cHeart\u201d is Vertical, Not Internal",
      ]},
      { heading: "5. Why internal/external is helpful but incomplete", points: [
        "Most vertical realities are internal: desires, trusts, fears, loves, and accusations before God.",
        "Most horizontal realities are external: actions, speech, visible withdrawal, service, or harm.",
        "But the categories do not always match. Some visible acts are vertical, and some hidden acts are",
        "horizontal.",
      ]},
      { heading: "6. Biblical example: Adam and Eve hiding", points: [
        "Adam and Eve\u2019s hiding was a physical, visible action, but it directly expressed their relationship with",
        "God.",
        "Because they were running from the Lord, their external hiding is best understood as a vertical matter:",
        "a Question 3 reality.",
      ]},
      { heading: "7. Biblical example: lust and hatred in Matthew 5", points: [
        "Lust and hatred may happen internally, but they are directed toward another person.",
        "For that reason, they are horizontal thorns even when no one else can see them.",
        "Beneath them, there is also a vertical issue: distrust, entitlement, accusation, or refusal to live under",
        "the Lord\u2019s will.",
      ]},
      { heading: "8. Daily-life examples", points: [
        "Praying out loud in the car is externally audible, but it is vertical because the person is speaking to the",
        "Lord.",
        "Bitterness may be hidden inside, but it is horizontal because it is held against another person.",
        "The lecture\u2019s point is not to make the model complicated, but to keep its relational direction clear.",
      ]},
      { heading: "9. Why the clarification matters", points: [
        "Students should not become anxious about labeling every nuance perfectly. The model is a tool, not",
        "Scripture itself.",
        "The clarification matters because counseling can drift into self-analysis if \u201cheart\u201d is treated as merely",
        "internal.",
        "Biblical change centers on bringing the person to the Lord, to the cross, and into renewed faith.",
        "Lecture Notes: The \u201cHeart\u201d is Vertical, Not Internal",
        "Model Alignment The lecture\u2019s main teaching is summarized in this alignment of the eight questions with the three trees model. Q",
        "Model Term",
        "Meaning",
        "1",
        "Heat",
        "The pressures, troubles, and temptations coming at the person.",
        "2",
        "Thorns",
        "Horizontal sinful responses in thought, word, emotion, action, or avoidance.",
        "3",
        "Heart turned away",
        "Vertical disloyalty: misplaced trust, false worship, hiding, accusation, or unbelief.",
        "4",
        "Bad consequences",
        "The painful results of thorny responses and disordered worship.",
        "5",
        "Christ / cross",
        "God\u2019s revelation, mercy, command, warning, and help in Christ.",
        "6",
        "Heart turned toward",
        "Vertical faith: repentance, trust, prayer, refuge, worship, and seeking the Lord.",
        "7",
        "Fruit",
        "Horizontal wisdom and love flowing from faith.",
        "8",
        "Good consequences",
        "Renewed effects, relationships, and opportunities for further growth.",
        "Distinction Table Term",
        "Meaning",
        "Internal",
        "What is hidden in thoughts, feelings, desires, imagination, or inner experience.",
        "External",
        "What can be seen or heard in speech, posture, silence, or action.",
        "Vertical",
        "What happens before God: trust, unbelief, hiding, seeking, prayer, accusation, or worship.",
        "Horizontal",
        "What happens toward neighbor and world: love, hate, lust, bitterness, service, withdrawal, or mercy.",
        "Core Correction Internal/external describes visibility. Vertical/horizontal describes relational direction. The course model is built around relational direction.",
        "Lecture Notes: The \u201cHeart\u201d is Vertical, Not Internal",
      ]},
    ],
    terms: [
      { term: "Heart", def: "The vertical dimension of life before God: what a person trusts, loves, fears, treasures, or worships." },
      { term: "Vertical", def: "The Godward direction of human life: turning toward or away from the Lord." },
      { term: "Horizontal", def: "The neighbor/world direction of human life: how one acts toward others and circumstances." },
      { term: "Thorns", def: "Sinful horizontal responses flowing from a heart turned away from God." },
      { term: "Fruit", def: "Wise horizontal responses flowing from a heart turned toward God through Christ." },
      { term: "Model", def: "A teaching tool that helps organize reality; useful, but never equal to Scripture itself." },
    ],
    takeaways: [
      "Use the model to see relational direction, not merely visible behavior.",
      "Do not make \u201cheart work\u201d a synonym for private self-analysis.",
      "Some outward actions, like hiding from God or praying aloud, are vertical.",
      "Some inward actions, like lust, hatred, or bitterness, are horizontal.",
      "The goal of counseling is not perfect labeling, but helping people turn to the Lord.",
      "Questions 3 and 6 keep the cross and relationship with God at the center of change.",
    ],
    questions: [
      "How do the eight questions and three trees model fit together?",
      "Why is \u201cheart\u201d easy to misunderstand as merely internal?",
      "What does it mean to call the heart a vertical category?",
      "How does Adam and Eve\u2019s hiding clarify the model?",
      "How do lust and hatred in Matthew 5 clarify the model?",
      "Why might self-analysis become a problem in counseling?",
      "How does the cross remain central in questions 3, 5, and 6?",
      "Where do you need to move from analysis to prayerful turning toward God?",
    ],
  },
  8: {
    thesis: "Suffering becomes a school of wise love when the Father of mercies meets us in our affliction, turns us from self-reliance to trust in the God who raises the dead, and teaches us to give to others the same comfort we have received in Christ.",
    summary: "The lecture opens with How Firm a Foundation, a hymn in which God himself speaks promises to his people. Powlison highlights that the hymn teaches sufferers to listen: God speaks to people who pass through rivers of sorrow, weakness, aging, danger, and death. The class then turns to the first self-counseling project, which uses suffering as the door into biblical change. Students are asked to identify a significant suffering and to watch how God meets, reorients, comforts, and transforms his people in the very place where hardship presses on them. The heart of the lecture is an exposition of 2 Corinthians 1. Paul teaches that God comforts his people in affliction so that they may comfort others. The path to counseling wisdom is not detachment from trouble, but being wisely helped by God in the midst of trouble. Powlison stresses that suffering does not automatically make a person wise. The \u201cwisdom of the flesh\u201d responds to pressure with grumbling, anger, anxiety, confusion, escapism, or despair. God\u2019s purpose is deeper: he teaches us not to rely on ourselves, but on the God who raises the dead.",
    flow: [
      "0:00-8:18 - Opening hymn and prayer: How Firm a Foundation teaches sufferers to listen to God\u2019s",
      "8:29-13:52 - Self-counseling project introduced: Students begin a project on significant suffering",
      "13:58-24:23 - 2 Corinthians 1 and counseling wisdom: Paul\u2019s afflictions become the setting in which",
      "24:40-31:06 - The wisdom of the flesh: Powlison names instinctive reactions to pain: grumbling,",
      "31:16-46:33 - God\u2019s purposeful intervention: Suffering teaches Paul not to rely on himself but on",
      "46:38-52:09 - Comfort and significant suffering: \u201cComfort\u201d means relevant mercy and truth, not",
      "52:11-59:04 - Method implications: Biblical counseling involves candid self-disclosure, common",
    ],
    notes: [
      { heading: "1. The opening hymn teaches sufferers to listen to God\u2019s promises", points: [
        "The hymn is unusual because most of its stanzas are God speaking to his people rather than believers speaking about God. The point is pastoral: sufferers need to hear the voice of the Lord, not merely rehearse their own thoughts. The hymn names real afflictions: rivers of sorrow, aging, weakness, fear, death, and deep need. God\u2019s promises do not erase the reality of suffering; they address sufferers in the middle of it.",
      ]},
      { heading: "2. The first self-counseling project uses suffering as the entry point", points: [
        "Students are asked to identify a significant suffering and use it as a doorway into the dynamics of biblical change. The assignment is not merely reflective; it is meant to become prayerful, concrete, and personally searching. Powlison notes that many graces are only learned through hardship: courage, mercy, forgiveness, patience, steadfastness, and wise love. Suffering becomes a crucible where God exposes false refuge and teaches true refuge.",
      ]},
      { heading: "3. 2 Corinthians 1 teaches that comfort becomes counsel", points: [
        "Paul begins with the \u201cFather of mercies and God of all comfort,\u201d who comforts his people in affliction so they can comfort others. Christian counseling wisdom grows as sufferers are personally helped by God. This is radically different from clinical detachment. Paul\u2019s ability to help is bound up with his own real experience of being afflicted, comforted, delivered, and taught to hope.",
        "Lecture Notes: The Wisdom Found in Christ, Part 1",
      ]},
      { heading: "4. Paul speaks honestly about real affliction", points: [
        "Paul does not speak of suffering in vague generalities. He tells the Corinthians that he was burdened beyond strength, despaired of life itself, and felt the sentence of death. He wants them to know the experiential weight of what happened. This candor is not morbid self-disclosure. It serves love. Paul names his affliction because God used it to make him a wiser comforter of others.",
      ]},
      { heading: "5. Suffering itself does not create wisdom", points: [
        "Pressure and pain can become occasions for foolishness. Powlison calls this the \u201cwisdom of the flesh\u201d: the instinctive way fallen people handle suffering when self-trust is in control. Common forms include grumbling, complaint, anger, fighting, obsessive anxiety, confusion, escapism, addiction, and despair. These responses reveal that hardship has met a heart trying to control life on its own terms.",
      ]},
      { heading: "6. God\u2019s \u201cin order that\u201d reveals purpose in suffering", points: [
        "Paul says the affliction happened \u201cin order that\u201d he would rely not on himself but on God who raises the dead. This phrase is central: suffering is not random or meaningless under God\u2019s sovereign hand. God\u2019s purpose is not merely that Paul survive the event, but that his inner way of living be rearranged. Self-reliance is exposed. Trust in the God of resurrection is learned.",
      ]},
      { heading: "7. God is revealed specifically as the God who raises the dead", points: [
        "Powlison emphasizes that Scripture gives the specific truth needed for the specific trouble. When Paul faces death, the relevant promise is not generic optimism but the living God who raises the dead. This is a model for ministry. Wise counsel does not randomly attach Bible verses to problems; it brings the particular mercies, promises, warnings, and character of God to bear on the particular trouble at hand.",
        "Lecture Notes: The Wisdom Found in Christ, Part 1",
      ]},
      { heading: "8. Comfort is immediate, needful, wise help", points: [
        "The word \u201ccomfort\u201d is richer than a sympathetic arm around the shoulder or a motivational pep talk. It is parakaleo: coming alongside someone with the immediate aid needed for the moment. Comfort includes mercy, truth, encouragement, warning, prayer, perspective, companionship, and practical help. It is relevant grace brought to bear on real pressure and real pain.",
      ]},
      { heading: "9. The Holy Spirit is the change agent", points: [
        "At the end of 2 Corinthians 1, Paul speaks of God establishing believers in Christ, anointing them, sealing them, and giving the Spirit as a guarantee. Powlison stresses that the Holy Spirit writes living truth on human hearts. Human counseling efforts are partial and fallible. The Spirit is the true counselor who makes God\u2019s words personal, powerful, and transformative.",
      ]},
      { heading: "10. Biblical counseling is mutual, candid, and active", points: [
        "Paul\u2019s method differs sharply from detached professional models. He is candid about his own suffering, identifies with the Corinthians in common struggle, takes initiative toward them, and asks for their prayers. There is real asymmetry in wisdom and role, but not a one-way expert/client relationship. The body of Christ is marked by mutual dependence, prayer, honest need, and shared comfort.",

  9: {
    thesis: "The gospel is not only for 'easy cases'; in Christ, the church has meaning, relationship, and wise love for even deeply broken and disordered lives.",
    summary: "Powlison opens by explaining why he deliberately chooses an extreme case. The church often assumes that Scripture can handle ordinary sins and sorrows, but that the most shattered lives belong to psychiatric categories where Christian faith has little to say. He challenges that assumption. The Bible's vision of the human heart, suffering, sin, mercy, and transformation is not shallow. It does not minimize severe brokenness, but it refuses to surrender people to categories that strip away their humanity. The lecture then turns to Powlison's experience in locked psychiatric wards and to the story of John, a young man diagnosed with paranoid schizophrenia. John arrives hostile and betrayed, but Powlison treats him as a man rather than as a diagnosis. Through patient conversation, Powlison names the human patterns beneath the bizarre symptoms: grandiosity and terror, or in biblical terms, pride and fear of man. He then brings the gospel with elemental simplicity: all of us turn to our own way, and Christ invades sealed worlds of darkness. The result is not a simplistic cure story. It is a picture of wise ministry: honest limitations, possible bodily and social factors, the importance of community, and the church's calling to offer meaning, relationship, practical love, and hope in Christ.",
    flow: [
      "0:00-2:56 - Why extreme cases matter: Powlison argues that the Bible must not be treated as useful",
      "3:00-4:46 - Psychiatry's limits: Medication may alleviate symptoms, but human beings need",
      "5:01-8:32 - Powlison's psychiatric background: He worked in locked wards, saw symptom",
      "8:34-15:49 - John arrives: His mother has misled him, he erupts in hostility, and Powlison asks God",
      "16:16-23:58 - Reframing paranoia: Powlison names grandiosity and terror, then translates them",
      "24:34-30:29 - What emerges: As the conversation opens, hatred, sexual fantasy, laziness, loneliness,",
      "30:52-36:20 - Significant factors: Powlison considers possible bodily factors, family manipulation,",
      "36:34-43:34 - The church as context for change: God repopulates John's world through faith,",
    ],
    notes: [
      { heading: "1. The gospel must speak to the most broken lives", points: [
        "Powlison rejects the idea that Christian truth is only for the 'easy cases' while the most extreme",
        "forms of addiction, trauma, manipulation, or psychiatric disorder belong to secular experts alone.",
        "He does not minimize the severity of these troubles. Instead, he insists that Scripture gives",
        "categories deep enough to understand people as sinners, sufferers, image bearers, and possible recipients of mercy.",
        "The lecture asks whether the church can humbly enter the lives of the deeply broken with the",
        "wisdom of Christ rather than fear, avoidance, or reductionistic explanations.",
      ]},
      { heading: "2. People need meaning and relationship", points: [
        "Powlison recalls a psychiatrist who said that medications may alleviate symptoms, but",
        "psychiatry cannot finally give people what they most need: meaning and relationship.",
        "This becomes a doorway into the church's calling. The body of Christ is meant to be a place",
        "where ultimate meaning and truly helpful relationships become visible and concrete.",
        "Christian care does not compete with every medical intervention; it offers something medicine",
        "cannot give: a living God, a new interpretive world, and embodied love.",
        "Lecture Notes: The Wisdom Found in Christ, Part 2",
      ]},
      { heading: "3. Powlison's psychiatric experience shaped his pastoral imagination", points: [
        "Before and during his conversion, Powlison worked in locked psychiatric wards and",
        "encountered severe depression, violence, substance abuse, criminal insanity, and paranoid schizophrenia.",
        "He observed that institutional care could sometimes reduce symptoms or protect people",
        "temporarily, but he rarely saw deep personal transformation.",
        "That experience helped him reject an 'us versus them' view. Even the most disorganized person",
        "remained recognizably human, more like him than different.",
      ]},
      { heading: "4. John arrives as a hostile and betrayed man", points: [
        "John, a man in his late twenties with a long psychiatric history, arrives because his mother has",
        "brought him on a day pass and misled him about where they were going.",
        "When Powlison appears, John explodes in hostility. His mother's manipulation confirms his",
        "paranoid expectation that people are out to get him.",
        "Powlison recognizes the moment as a fork in the road. He can merely collect information and",
        "play it safe, or he can spend the one hour as an act of serious love.",
      ]},
      { heading: "5. Wise love respects the person, not the label", points: [
        "Powlison does not deny the diagnostic label. John has earned the diagnosis honestly through",
        "patterns of paranoia, ideas of reference, conspiracy thinking, and grandiosity.",
        "Yet Powlison speaks to him as a man. He asks permission to give feedback, and John says yes.",
        "This simple moment matters because it honors agency and opens a real conversation.",
        "The category 'paranoid schizophrenic' does not erase personhood. It names a pattern of severe",
        "trouble, but biblical ministry still asks who this person is before God and neighbor.",
        "Lecture Notes: The Wisdom Found in Christ, Part 2",
      ]},
      { heading: "6. 'Normalize the abnormal': grandiosity and terror", points: [
        "Powlison identifies two patterns he has seen in many people with this diagnosis: the person",
        "feels vastly important, and the person is terrified because others do not cooperate with that imagined centrality.",
        "He translates the clinical street-level pattern into biblical categories: grandiosity is a form of",
        "pride; terror is closely related to fear of man.",
        "This move does not trivialize psychosis. It humanizes John by showing that his bizarre world is",
        "an extreme form of dynamics common to all fallen people.",
      ]},
      { heading: "7. The gospel invades the sealed world", points: [
        "Powlison describes John's universe as a hermetically sealed steel ball: every event confirms the",
        "rules of darkness. If someone lies, it proves betrayal; if someone is kind, that may only be a setup.",
        "Into that sealed world, Powlison brings Isaiah 53:6 with childlike simplicity: all we like sheep",
        "have gone astray; each has turned to his own way; the Lord laid our iniquity on Christ.",
        "John responds, 'I've never heard that before. Would you tell me more about it?' The gospel",
        "becomes not an abstraction but the invasion of light into a closed world.",
      ]},
      { heading: "8. The conversation uncovers ordinary human darkness beneath severe", points: [
        "disorder",
        "As the conversation continues, John's madness recedes for a time and a lonely, immature,",
        "self-absorbed, deeply troubled man comes into view.",
        "He speaks of long-standing murderous fantasies rooted in cruel childhood mockery, a distorted",
        "fantasy sexuality, entitlement, laziness, manipulation, and job failure.",
        "These are not irrelevant details. They show how heat, thorns, motives, consequences, and the",
        "need for Christ all remain in play even in an extreme case.",
        "Lecture Notes: The Wisdom Found in Christ, Part 2",
      ]},
      { heading: "9. Ministry can proceed amid partial knowledge", points: [
        "Powlison remains agnostic about possible physiological factors. There may be genetic or bodily",
        "accelerants, but he does not need exhaustive knowledge to love the person in front of him.",

  13: {
    thesis: "James exposes the heart beneath ordinary trials and interpersonal conflict: worldly wisdom turns desires, ambitions, pleasures, pride, and judgment into wars and fightings, but the God who is generous giver, final judge, jealous lover, and purposeful sovereign gives more grace so His people can humble themselves, draw near, and become wise peacemakers.",
    summary: "The lecture begins with Be Thou My Vision, which gives the positive aim of biblical change. Powlison reminds students that looking honestly at sin and the heart is never an end in itself. The goal is a heart that has God as its vision, wisdom, treasure, protection, and hope. The main lecture turns to the book of James because James speaks broadly to the scattered people of God, teaches through both general patterns and concrete examples, and begins with the real hardships of daily life. \u201cVarious trials\u201d include money pressure, differences of wealth and status, illness, and strained relationships. Powlison then focuses on James 3:13-4:12. This passage contrasts the beautiful life of wisdom from above with the disorder created by bitter jealousy and selfish ambition. James\u2019s language about quarrels and fights is broader than anger; conflict may include aggression, fear, appeasement, withdrawal, alliance-building, gossip, and judgment. The core pastoral movement is from blaming the heat to opening the books of the heart. James says wars and fightings arise from passions at war within us. He exposes bad zeal, selfish ambition, cravings, pleasures, worldliness, pride, demonic resemblance, double-mindedness, and the God-playing that judges one\u2019s neighbor. The turning point is James 4:6: \u201cBut He gives more grace.\u201d God does not merely diagnose the heart; He gives wisdom and grace. Powlison presents God as generous giver, fair and final judge, jealous lover of His people, and purposeful sovereign. God\u2019s holy jealousy is not petty possessiveness but intense love for His children\u2019s true welfare and loyal love. The lecture closes by tracing this grace through the whole Bible: the blessing of Numbers 6, the life of David, the Psalms, Isaiah 55, and ultimately Jesus Christ, full of grace and truth. Christ is for us, before us, and in us, forming His people to become grace-givers in the very relationships where conflict once ruled.",

    notes: [
      { heading: "1. The opening hymn gives the positive goal of heart change", points: [
        "\uf0b7 The lecture opens with Be Thou My Vision because biblical self-examination is never meant to terminate on the self. The goal is a heart that loves, worships, seeks, and serves God. \uf0b7 Powlison describes the hymn as a kind of submissive imperative: believers ask God to be their vision, wisdom, presence, shield, and treasure, while yielding themselves to His glory and love. \uf0b7 The hymn also exposes idolatry by contrast. If riches or human approval become the ruling vision, they function as false wisdom, false light, false security, and false refuge. \uf0b7 This prepares the class to examine the heart not morbidly but worshipfully: the turn from God is the mirror image of the turn back to God.",
      ]},
      { heading: "2. James is a uniquely practical book for biblical change", points: [
        "\uf0b7 James addresses the twelve tribes in the dispersion, which Powlison reads as a wide address to the scattered, recovered people of God from all nations. \uf0b7 The letter repeatedly moves from a general paradigm to concrete examples. It names broad categories, then shows how those categories appear in ordinary life. \uf0b7 This makes James pastorally useful because each example invites personal application: even when the specific example is not our own, the larger pattern is.",

      { heading: "3. \u201cVarious trials\u201d are ordinary contexts where wisdom or folly appears", points: [

      { heading: "4. James gives concrete examples of the heat", points: [

        "Lecture Notes: Practical Application: James, Part 1",

      { heading: "5. James 3:13-4:12 contrasts two wisdoms", points: [

      { heading: "6. Conflict is broader than anger", points: [
        "\uf0b7 Powlison notes that James says wars and fightings rather than simply anger. Anger is often central, but conflict includes more than one emotion or strategy. \uf0b7 A person at war may attack, fear, appease, withdraw, build allies, use propaganda, or run. In a family conflict, one person may be dominated by hostility while another is dominated by fear. \uf0b7 This matters pastorally because conflict cannot be reduced to \u201can anger problem.\u201d James\u2019s language gives room to describe the whole concrete pattern of war-making.",
      ]},
      { heading: "7. The heart question opens the books", points: [
        "\uf0b7 When people are asked why they are upset, they naturally point to the heat: the other person, the situation, the provocation, or the hardship. \uf0b7 James asks a deeper question: What causes quarrels and fights among you? His answer is not finally the other person but the passions at war within us. \uf0b7 Powlison uses the image of two closed books colliding. Each book blames the other, but James opens the books and shows what is written inside. \uf0b7 If we participate in the war, we are agents in the war. The issue is not denying the other person\u2019s sin but seeing our own heart before God.",
      ]},
      { heading: "8. James exposes several angles on sinful motivation", points: [
        "\uf0b7 Bitter zeal names a bad zeal for the wrong thing. In conflict it may be the zeal to prove I am right, innocent, superior, or mistreated. \uf0b7 Selfish ambition names the self-exalting agenda of my kingdom, my control, my reputation, my comfort, and my desired outcome. \uf0b7 Cravings and coveting name the grasping heart: I want, need, demand, or cannot live without something that has become functionally ultimate. \uf0b7 Pleasures name what pleases me. This may include comfort, control, approval, being right, not being hassled, winning the argument, or getting the final word.",

      { heading: "9. The deepest problem is Godward betrayal", points: [
        "\uf0b7 James uses searing language because the issue is not merely interpersonal dysfunction. It is spiritual adultery against the God who loves His people. \uf0b7 Friendship with the world means that the heart\u2019s loyalty is aligned with the world\u2019s values, pleasures, selfexaltation, and stains. \uf0b7 God opposes the proud because pride lifts the self into God\u2019s place. The final question, \u201cWho are you to judge your neighbor?\u201d exposes the God-playing that lies beneath judgmentalism. \uf0b7 The language of demonic wisdom and resisting the devil shows the moral congruence between the fallen heart and Satan: grasping, self-exaltation, betrayal, and opposition to God.",
        "Lecture Notes: Practical Application: James, Part 1",
      ]},
      { heading: "10. Secular conflict help cannot reach the deepest \u201cwhy\u201d", points: [
        "\uf0b7 Powlison acknowledges that many self-help or conflict-resolution resources can describe the heat, the thorns, and even useful outward fruit. \uf0b7 They may offer practical techniques such as slowing down, using careful words, or pursuing forgiveness. These can be genuinely useful at the level of action. \uf0b7 What they cannot finally explain is why people fight. Christian faith alone, because God searches hearts, exposes the Godward nature of sinful motives and the true need for grace.",
      ]},

  14: {
    thesis: "James completes the pastoral map of biblical change by showing that pride and sin lead toward death, while God gives grace to the humble; true wisdom shows itself in the meekness of wisdom, living repentance and faith, and a beautiful peacemaking life that is gentle, reasonable, impartial, and fruitful before God and neighbor.",
    summary: "Powlison begins by returning to Question 4, the issue of consequences. James speaks with ultimate seriousness: proud, adulterous, self-exalting life meets God\u2019s opposition, and sin gives birth to death. These final realities also cast shadows in daily life whenever relationships chill, trust breaks, or conflict grows. The lecture then turns to Question 6, the new heart. Scripture does not only make the bad vivid; it makes the good vivid. James names the root of a beautiful life as the meekness of wisdom: strength, desire, will, and capacity brought under the reign, voice, and help of the living God. Powlison emphasizes that repentance and faith are living transactions with God. James 4:6-10 does not give abstract ideals but concrete movements: humble yourself, submit to God, resist the devil, draw near, cleanse your hands, purify your heart, mourn over sin, and receive the Lord\u2019s lifting grace. The lecture also warns against pastoral boilerplate. Even true emphases such as the cross and grace of Christ can become dull code if used mechanically. Wise pastoral care brings the many-sided revelation of God - His judgment, jealousy, mercy, blessing, nearness, and cross - to the specific need of a specific person. Question 7 turns to the visible fruit of wisdom from above. Powlison highlights peacemaking graces such as purity, peaceableness, gentleness, openness to reason, mercy, good fruits, impartiality, and sincerity. Peacemaking may require constructive conflict, but it never becomes destructive war-making. The closing movement considers Question 8, the blessing side of consequences. James points to the crown of life and the Lord\u2019s compassion and mercy, while ordinary stories of relational repair give small foretastes of life: weapons laid down, people coming out of the cave, conversation restored, Scripture shared, and joy beginning to grow.",
    flow: [
      "0:00-2:56 - Question 4 - consequences: James names the ultimate result of proud, adulterous, self-exalting life as God\u2019s",

      "16:06-20:42 - Pastoral flexibility: Powlison warns against turning good truths into boilerplate and shows how",
      "20:58-23:47 - Question 7 - good fruit: James portrays a beautiful life of freshwater words, peacemaking graces, and",
      "23:47-29:05 - Wisdom from above: pure, peaceable, gentle, open to reason, merciful, impartial, sincere, and fruitful",

    notes: [
      { heading: "1. Question 4 names the serious consequences of proud sin", points: [
        "\uf0b7 Powlison begins by returning to the question he accidentally skipped: What are the consequences? James answers with ultimate seriousness. \uf0b7 Adultery, apostasy, proud self-exaltation, and grasping life end under the opposition of God. God opposes the proud, and He is able both to save and to destroy. \uf0b7 James 1 also traces the path from desire to sin to death. Sin is not only unfortunate or dysfunctional; it is deathdealing in God\u2019s world. \uf0b7 James 5 intensifies the warning with vivid language of misery, rot, fire, and slaughter, especially against those who misuse, degrade, or exploit the poor.",
      ]},
      { heading: "2. Consequences are immediate signposts and final realities", points: [
        "\uf0b7 Powlison distinguishes ultimate consequences from smaller present signs. Death is final, but many shadows of death appear immediately in ordinary relationships. \uf0b7 Irritation can chill a relationship. A lie can create distance. A pattern of deceit can eventually leave a life full of broken relationships. \uf0b7 The lecture recalls the earlier Mueslix vignette: even a child could sense that lying brought a chill into a valued friendship. \uf0b7 These immediate breakages are signposts to the ultimate. James orients people by naming the final consequence so the smaller consequences can be understood rightly.",
      ]},
      { heading: "3. Scripture makes the good fruit technicolor", points: [
        "\uf0b7 Powlison observes that in self-counseling and counseling others, people often see the bad with vivid detail while the good remains vague and limp. \uf0b7 Scripture does the opposite. It gives color, texture, and concreteness to wisdom, repentance, love, humility, and grace. \uf0b7 James 3-4 is especially rich because it does not merely expose evil; it paints a vivid picture of the new heart and the beautiful life that grace produces.",
      ]},
      { heading: "4. The meekness of wisdom is the root of a beautiful life", points: [
        "\uf0b7 James names the new-heart reality as \u201cthe meekness of wisdom.\u201d Powlison treats this as a foundational description of the Christian life. \uf0b7 Meekness is not weakness. It is strength, life force, and capacity mastered by another. Powlison recalls the image of war horses under the reign and spur of their master. \uf0b7 He also retells a fighter pilot\u2019s comment that an F-16 is \u201cmeek\u201d because it does exactly what the pilot directs it to do. \uf0b7 This meekness is the opposite of self-exalting, grasping, treacherous, devilish God-playing. It is the life of need, dependence, attentiveness, and submission to the living God.",
        "Lecture Notes: Practical Application: James, Part 2",
      ]},
      { heading: "5. Humility is the doorway into more grace", points: [
        "\uf0b7 James 4:6 says that God opposes the proud but gives grace to the humble. This is the core solution that secular conflict literature cannot reach. \uf0b7 Because worldly help does not name conflict as apostasy from God, it cannot name the deepest remedy: repentance and faith before the God who gives more grace. \uf0b7 Humility is not vague self-dislike. It is the active movement of coming back in need to the One who promises grace. \uf0b7 James 4:6-10 gives a string of concrete actions: submit to God, resist the devil, draw near to God, cleanse your hands, purify your hearts, mourn, and humble yourselves before the Lord.",
      ]},
      { heading: "6. Repentance and faith are living transactions with God", points: [
        "\uf0b7 Powlison stresses that biblical change is transactional. It is not merely identifying themes, stating doctrines, or saying, \u201cI should trust the Lord.\u201d \uf0b7 A person actually brings need, fear, sin, sorrow, and confusion to the God who cares. The example of \u201ccast your cares on Him\u201d requires naming the cares and believing that He cares. \uf0b7 The Psalms model this life of transaction. They bring real sins, sufferings, enemies, anguish, and need to the God who is merciful and powerful. \uf0b7 This vertical solution is always necessary because every human problem has a vertical dimension before God.",
      ]},
      { heading: "7. Psalms and Proverbs show complementary directions of wisdom", points: [
        "\uf0b7 Powlison explains that the Psalms are largely tilted toward renovation in the vertical dimension: meeting God, crying to Him, relying on Him, and finding refuge in Him. \uf0b7 The Proverbs, by contrast, assume core truths such as fear of the Lord and trust in the Lord, then press toward concrete life with people, money, speech, work, honesty, correction, and time. \uf0b7 Together they show the full movement of change: faith toward God and love toward neighbor, worship and wise action, inner renewal and practical fruit.",
      ]},
      { heading: "8. Pastoral care must avoid boilerplate truth", points: [
        "\uf0b7 Powlison affirms the current emphasis on the cross and grace of Christ, but he warns that even the best truth can become code if repeated mechanically. \uf0b7 James speaks of grace through several angles: God\u2019s judgment, God\u2019s holy jealousy, God\u2019s sovereign purpose, God\u2019s giving, and God\u2019s saving compassion. \uf0b7 Pastoral care has a \u201cgigantic flexibility.\u201d A person may need the cross viewed through Numbers 6, the shining face of God, the promise of blessing, or the reality that God turns toward His people in grace and peace. \uf0b7 The goal is not shorthand but fresh relevance, so biblical truth becomes living help in a specific struggle.",
      ]},
      { heading: "9. Wisdom from above produces a peacemaking life", points: [
        "\uf0b7 James cares deeply about a beautiful life, freshwater words, and peacemaking graces. \uf0b7 Powlison clarifies that peacemaking may include constructive anger and constructive conflict. Mercy, patience, and forgiveness are not sentimental niceness; they are displeased with evil and move toward redemptive good. \uf0b7 Peace lovers avoid conflict, war makers create destructive conflict, but peacemakers enter the mess to make peace. \uf0b7 This is why relationships are a mess worth making: love learns how to enter conflict constructively rather than destructively.",
      ]},
      { heading: "10. Pure, peaceable, and gentle wisdom moves rightly toward God and people", points: [
        "\uf0b7 Powlison reads \u201cfirst pure, then peaceable\u201d as a movement that begins before God and then moves toward people. Purity concerns restored relation to God; peaceableness concerns active movement toward others. \uf0b7 Gentleness is one of the rare and beautiful gifts that can make hard ministry possible. It says hard things without dissing, caricaturing, or condemning. \uf0b7 Using the log-and-speck image, Powlison asks what kind of approach would make someone willing to let another person \u201cstick a finger in my eye.\u201d Gentleness is that considerate, trustworthy approach. \uf0b7 Gentleness takes another person\u2019s welfare into the heart rather than treating the person as a problem, threat, enemy, or hassle.",
        "Lecture Notes: Practical Application: James, Part 2",

  15: {
    thesis: "Voices, images, role models, and cultural value systems are a powerful form of heat: they teach people to attach false meaning to real differences and to climb ladders to nowhere, but Scripture reorients the heart by revealing God as Creator, no-partiality Judge, refuge for the needy, and Redeemer who comes down to carry His people into true Christlike life.",
    summary: "The lecture opens with Amazing Grace, which gives a truthful interpretive voice for life. It tells the story of lostness, awakening, trouble, death, and everlasting joy, placing a believer\u2019s small life inside God\u2019s larger history. Powlison uses this to introduce the importance of the voices that teach people how to interpret their lives. The main topic is the heat of voices, images, and role models. Powlison argues that sociocultural influence is one of the most neglected parts of counseling. People live awash in value statements that teach them what is meaningful, shameful, successful, beautiful, important, or worthless. He describes many cultural influences as disinformation: facts or observations arranged so that people draw false conclusions and respond wrongly. Examples include alarmist news, political propaganda, media images, Christian subculture expectations, and even ministry strengths that become \u201cin-house idols.\u201d The lecture\u2019s central case study is physical appearance. A male-pattern-baldness infomercial illustrates a comic but serious false gospel, while the discussion of female beauty standards shows how perfection, body shape, wealth, lifestyle, race, and age create a no-win game of universal stigma. Powlison then broadens the issue to all human differences. People differ in wealth, power, ability, health, appearance, personality, age, education, opportunity, and gifts. The problem is that fallen hearts and cultures turn horizontal differences into vertical ladders of value and stigma. The final movement gives a biblical reorientation. God creates differences, shows no partiality, dignifies need, exposes the temporary nature of status, and gives one true ladder that goes somewhere: likeness to God. Christ Himself comes down into our plight, bears shame and guilt, and carries His people upward by mercy.",
    flow: [
      "0:00-6:20 - Opening hymn and prayer: Amazing Grace gives a true voice about history, identity, hardship, death, and",
      "6:20-11:40 - Voices, images, and role models: Powlison introduces cultural and personal influences as a neglected but",
      "11:40-24:00 - Disinformation and in-house idols: examples include alarmist weather, Christian image norms, ministryspecific guilt, grades, anxiety, competition, obsession, avoidance, and escapism.",
      "24:00-34:40 - The issue of looks: a male-pattern-baldness infomercial becomes a comic but revealing picture of a false",
      "34:40-56:20 - Female beauty and cultural ideals: perfection, shape, lifestyle, race, age, historical variability, and male",
      "56:20-1:08:20 - Human differences and false ladders: ordinary differences are turned into vertical measures of value",
      "1:08:20-1:16:20 - Biblical reorientation: God creates differences, shows no partiality, humbles all people, dignifies the",
      "1:16:20-1:20:15 - The true ladder: the way that goes somewhere is likeness to God, and Christ comes down into our",
    ],
    notes: [
      { heading: "1. Amazing Grace gives a true voice about the meaning of life", points: [
        "\uf0b7 Powlison opens with Amazing Grace because the hymn tells a true story about human life: lostness, blindness, awakening, danger, toil, death, and eternal joy. \uf0b7 The hymn locates small and fleeting lives inside a larger history that begins before the foundation of the world and continues into eternity. \uf0b7 This matters for counseling because people do not merely need facts. They need a truthful interpretive voice that teaches them how to weigh hardship, purpose, mercy, hope, and despair. \uf0b7 No competing cultural voice gives this same truthful account of the unfolding pattern of a redeemed life before God.",
      ]},
      { heading: "2. Sociocultural influences are a major part of the heat", points: [
        "\uf0b7 The lecture focuses on voices, images, and role models - the surrounding influences that shape what people call meaningful, valuable, shameful, successful, or failed. \uf0b7 Powlison argues that biblical counseling often pays attention to physiology and individual spiritual processing while neglecting social experience and cultural values. \uf0b7 These influences are not minor. People live awash in value statements that shape identity, desire, fear, comparison, and shame. \uf0b7 This kind of heat includes family values, peer pressure, institutional expectations, media images, cultural ideals, and the everyday moral atmosphere people breathe.",
      ]},
      { heading: "3. Disinformation gives facts a false meaning", points: [
        "\uf0b7 Powlison describes fallen cultural influence as disinformation: things true enough as far as they go, but arranged to lead people toward false conclusions and wrong actions. \uf0b7 Election ads, alarmist news, and weather reports can take real facts and spin them so that fear, outrage, or manipulation becomes the intended response. \uf0b7 His contrast between a fearful weather broadcast and his grandmother\u2019s \u201cThat\u2019s beautiful\u201d shows how the same fact can be interpreted through a false voice or through worship. \uf0b7 Biblical counseling must therefore ask not only \u201cWhat happened?\u201d but \u201cWhat meaning has this person been taught to attach to what happened?\u201d",
      ]},
      { heading: "4. Even Christian settings can create in-house idols", points: [
        "\uf0b7 Powlison warns that false value systems can arise even around genuine ministry strengths. \uf0b7 An InterVarsity worker struggled with quiet-time guilt, a Campus Crusade worker with evangelism guilt, and a Navigator worker with Bible-memory guilt. \uf0b7 Quiet time, evangelism, and Scripture memory are good gifts, but they become distorted when they function as moral ladders that define Christian worth or failure. \uf0b7 The same dynamic can happen with grades in a seminary classroom. Learning, love, and godliness can be displaced by anxiety, competition, cheating, obsessive work, laziness, escapism, or despair.",
        "Lecture Notes: Influences on the Heart, Part 1",
      ]},
      { heading: "5. Looks reveal how a false gospel captures the heart", points: [
        "\uf0b7 Powlison uses a male-pattern-baldness infomercial as a comic picture of a false gospel: once I was lost, then hair restoration saved me, and now my sales, confidence, and romance are restored. \uf0b7 The humor is not aimed at the struggler but at the idol. Scripture often mocks idols to break the spell of what captivates us. \uf0b7 The issue is not that hair, attractiveness, or appearance facts are unreal. The issue is that fallen hearts turn those facts into ultimate measures of worth, shame, confidence, or despair. \uf0b7 The heart believes the lie, and then anxiety, obsession, comparison, depression, performance, or self-protection become predictable thorns.",
      ]},
      { heading: "6. Beauty standards stigmatize everyone", points: [
        "\uf0b7 Powlison then turns to female beauty as a more loaded and pervasive example. The culture creates standards of perfection, body shape, wealth, lifestyle, race, and age. \uf0b7 Each standard narrows the field of those who can appear successful. Defect, disability, motherhood, hard work, poverty, ethnic features, and aging are all cursed by the false system. \uf0b7 Even those who seem to succeed are trapped by historical and cultural variability. What counts as beautiful changes by decade, culture, class, and social setting. \uf0b7 The final result is universal loss. Every woman, if she lives long enough, is placed on a down escalator by the culture\u2019s age-biased ideal.",
      ]},
      { heading: "7. The same image system distorts men and women together", points: [
        "\uf0b7 The same magazine-cover image teaches women what to aspire to and men what to desire. \uf0b7 This creates a mutual dance of distortion: women are tempted toward performance and comparison, while men are tempted to evaluate possible companions through the same false image grid. \uf0b7 Powlison illustrates this with single men whose stated spiritual desires for marriage were often shaped in practice by a cultural image of the ideal woman. \uf0b7 Scripture speaks directly and sharply: 1 Peter 3 warns against over-prioritizing outward beauty, Proverbs compares beauty without discretion to a gold ring in a pig\u2019s snout, and Proverbs 31 says charm is deceitful and beauty is vain.",
      ]},
      { heading: "8. Human differences are horizontal realities before God", points: [
        "\uf0b7 The lecture broadens from appearance to all kinds of human differences: small and great, rich and poor, strong and weak, beautiful and plain, able and disabled, master and slave, old and young, healthy and sick, male and female. \uf0b7 Other differences include intelligence, aesthetic sense, athleticism, emotional attunement, social sensitivity, education, ethnicity, wealth, family background, and opportunity. \uf0b7 These differences are real. The problem is not the existence of differences but the fallen tendency to turn them into vertical measures of good and bad, value and stigma. \uf0b7 This is where many so-called self-esteem struggles live: people measure themselves by ladders that someone has erected from ordinary differences.",
      ]},
      { heading: "9. Ladders to nowhere produce comparison, shame, and despair", points: [
        "\uf0b7 Powlison calls false value systems \u201cladders to nowhere.\u201d They may rank people, but they do not get anyone anywhere worth going. \uf0b7 A family may value wit; a school may value grades; a sports culture may value performance; a financial culture may value net worth. Each can become a false ladder. \uf0b7 People then compare themselves with others, feel superior or inferior, and interpret gain or loss as identitymaking or identity-destroying. \uf0b7 Powlison mentions suicide after financial crashes and athletic failure as tragic examples of what can happen when a person\u2019s identity is built on a ladder to nowhere.",
      ]},
      { heading: "10. Scripture knocks the ladders back down to earth", points: [
        "\uf0b7 The biblical response begins with God as Creator and sovereign Lord. He makes human beings different and gives diverse gifts, limits, histories, opportunities, and weaknesses.",
        "Lecture Notes: Influences on the Heart, Part 1",
        "\uf0b7 No creational or providential difference is finally a vertical issue of value and stigma. To make it such is to believe a lie. \uf0b7 God also shows no partiality. Ephesians 6 warns masters that status gives them no special standing, while Colossians 3 warns slaves that low status does not excuse faithlessness. \uf0b7 Before God, all are equally accountable, equally needy, and equally addressed by His call to faith and obedience.",
      ]},
    ],
    terms: [
      { term: "Voices, images, role models", def: "The surrounding messages and examples that teach people how to interpret life, worth, identity, success, failure, beauty, and shame." },
      { term: "Misleading counsel", def: "False or distorted guidance that gives real facts a false meaning and pushes the heart toward wrong conclusions and actions. Prepared from the uploaded transcript" },
      { term: "Disinformation", def: "A message that is true enough to seem plausible but arranged to mislead interpretation, emotions, and behavior." },
      { term: "In-house idol", def: "A good Christian practice or ministry strength that becomes a false law defining worth, success, or failure." },
      { term: "Value / stigma", def: "The sociological language Powlison uses for what a culture treats as high and honorable versus low and shameful." },
      { term: "Human differences", def: "The varied creational and providential realities in which people differ: wealth, ability, health, appearance, age, status, personality, and opportunity." },
      { term: "Verticalizing", def: "Turning a horizontal human difference into a vertical measure of good and bad, superiority and inferiority." },
      { term: "Self-esteem issue", def: "A struggle created by measuring oneself according to a false standard or comparison ladder." },
      { term: "Ladder to nowhere", def: "A false value system that ranks people but cannot give life, identity, righteousness, or lasting hope." },
      { term: "No partiality", def: "God\u2019s refusal to favor the powerful or excuse the lowly; every person stands before Him as accountable and needy." },
      { term: "Refugee / needy identity", def: "The biblical reversal in which being weak, poor, needy, and dependent becomes a place of honest relationship with God." },
      { term: "The true ladder", def: "The way that actually goes somewhere: likeness to God in Christ, made possible because Christ descends to redeem and carry His people by mercy." },
    ],
    takeaways: [
      "\uf0b7 Counseling should pay close attention to sociocultural heat, not only the body and the individual\u2019s inner",
      "\uf0b7 People are shaped by value statements all day long. Ask what voices, images, and role models are teaching the",
      "person to believe.",
      "\uf0b7 Facts are not self-interpreting. False voices can take real facts and attach false meaning, emotional pressure, and",
      "distorted action.",
      "\uf0b7 Good Christian practices can become in-house idols when they define worth, success, or failure in ways Scripture",
      "\uf0b7 Mocking the idol can be pastorally useful when it exposes how absurd and destructive the lie really is, without",

      "\uf0b7 Appearance, grades, success, wealth, talent, and status are real differences, but they are not ultimate measures of",
